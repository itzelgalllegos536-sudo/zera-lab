const NOMINA_EMPLEADOS_DEFAULT = ['Rafael', 'Montserrat', 'Aram', 'Fidel', 'Kevin', 'Juan/Abril'];

function NominaModule() {
  useZeraSync(); // sigue cambios de salarios, reglas, comisiones, producción
  // ---- Estado de salarios base (editable + persistente) ----
  const [salarios, setSalarios] = React.useState(() => {
    const saved = localStorage.getItem('salariosBase');
    return saved ? JSON.parse(saved) : {
      'Rafael': 0,
      'Montserrat': 0,
      'Aram': 0,
      'Fidel': 0,
      'Kevin': 0,
      'Juan/Abril': 0
    };
  });
  const guardarSalarios = (nuevo) => {
    setSalarios(nuevo);
    localStorage.setItem('salariosBase', JSON.stringify(nuevo));
  };

  // ---- Reglas de comisiones (editable + persistente) ----
  const [reglas, setReglas] = React.useState(() => {
    const saved = localStorage.getItem('reglasComisiones');
    return saved ? JSON.parse(saved) : [
      { id: 1, empleado: 'Fidel', tipoTrabajoIncluye: 'porcelana', monto: 5, moneda: 'USD', activa: true }
    ];
  });
  const guardarReglas = (nuevo) => {
    setReglas(nuevo);
    localStorage.setItem('reglasComisiones', JSON.stringify(nuevo));
  };

  // ---- Tipo de cambio (compartido con Cobros) ----
  const [tipoCambio, setTipoCambio] = React.useState(() => {
    const saved = parseFloat(localStorage.getItem('tipoCambioUSDMXN'));
    return isNaN(saved) || saved <= 0 ? 17.5 : saved;
  });

  // ---- Selección de semana (por defecto: semana actual) ----
  const [semanaSeleccionada, setSemanaSeleccionada] = React.useState(() => {
    const hoy = new Date();
    const diaSemana = hoy.getDay(); // 0=domingo, 1=lunes...
    const diff = diaSemana === 0 ? -6 : 1 - diaSemana; // lunes de la semana actual
    const lunes = new Date(hoy);
    lunes.setDate(hoy.getDate() + diff);
    lunes.setHours(0, 0, 0, 0);
    return lunes.toISOString().split('T')[0];
  });

  const rangoSemana = React.useMemo(() => {
    const inicio = new Date(semanaSeleccionada);
    inicio.setHours(0, 0, 0, 0);
    const fin = new Date(inicio);
    fin.setDate(inicio.getDate() + 6);
    fin.setHours(23, 59, 59, 999);
    return { inicio, fin };
  }, [semanaSeleccionada]);

  const moverSemana = (deltaDias) => {
    const d = new Date(semanaSeleccionada);
    d.setDate(d.getDate() + deltaDias);
    setSemanaSeleccionada(d.toISOString().split('T')[0]);
  };

  // ---- Cargar comisiones del periodo ----
  const comisionesGeneradas = React.useMemo(() => {
    const all = JSON.parse(localStorage.getItem('comisionesGeneradas') || '[]');
    return all.filter(c => {
      const f = new Date(c.fechaISO || c.fecha);
      return f >= rangoSemana.inicio && f <= rangoSemana.fin;
    });
  }, [rangoSemana, reglas]); // reglas trigger update

  // ---- Trabajos completados en la semana (para reporte por técnico) ----
  const trabajosCompletadosSemana = React.useMemo(() => {
    const ordenes = JSON.parse(localStorage.getItem('produccionOrdenes') || '[]');
    return ordenes.filter(o => {
      if (o.estado !== 'calidad' && o.estado !== 'enviado' && o.estado !== 'finalizado') return false;
      // Buscar fecha de cuando llegó a calidad en historial
      const fase = (o.historial || []).find(h => h.fase === 'calidad' || h.fase === 'enviado' || h.fase === 'finalizado');
      if (!fase) return false;
      // historial.fecha puede ser un string es-MX; intentar parsear
      try {
        const partes = fase.fecha.split(' ');
        const fechaParte = partes[0];
        let f;
        if (fechaParte.includes('/')) {
          // DD/MM/YYYY
          const [d, m, y] = fechaParte.split('/');
          f = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
        } else if (fechaParte.includes('-')) {
          f = new Date(fechaParte);
        } else {
          return false;
        }
        return f >= rangoSemana.inicio && f <= rangoSemana.fin;
      } catch {
        return false;
      }
    });
  }, [rangoSemana]);

  // ---- Cálculos por empleado ----
  const empleadosConDatos = React.useMemo(() => {
    const todos = new Set([
      ...Object.keys(salarios),
      ...comisionesGeneradas.map(c => c.empleado),
      ...trabajosCompletadosSemana.map(o => o.asignado_a).filter(Boolean)
    ]);

    return Array.from(todos).map(nombre => {
      const baseSalario = parseFloat(salarios[nombre]) || 0;
      const misComisiones = comisionesGeneradas.filter(c => c.empleado.toLowerCase() === nombre.toLowerCase());
      const totalComisionesMXN = misComisiones.reduce((s, c) => s + (c.montoTotalMXN || 0), 0);
      const misTrabajos = trabajosCompletadosSemana.filter(o => (o.asignado_a || '').toLowerCase() === nombre.toLowerCase());
      return {
        nombre,
        salarioBase: baseSalario,
        comisiones: misComisiones,
        totalComisionesMXN,
        trabajos: misTrabajos,
        totalPagar: baseSalario + totalComisionesMXN
      };
    }).sort((a, b) => b.totalPagar - a.totalPagar);
  }, [salarios, comisionesGeneradas, trabajosCompletadosSemana]);

  const totalNomina = empleadosConDatos.reduce((s, e) => s + e.totalPagar, 0);
  const totalComisiones = empleadosConDatos.reduce((s, e) => s + e.totalComisionesMXN, 0);
  const totalBase = empleadosConDatos.reduce((s, e) => s + e.salarioBase, 0);

  // ---- UI helpers ----
  const [empleadoExpandido, setEmpleadoExpandido] = React.useState(null);
  const [vistaActual, setVistaActual] = React.useState('reporte'); // reporte | salarios | reglas
  const [nuevoEmpleado, setNuevoEmpleado] = React.useState('');
  const [nuevoSalario, setNuevoSalario] = React.useState('');
  const [nuevaRegla, setNuevaRegla] = React.useState({ empleado: '', tipoTrabajoIncluye: '', monto: 0, moneda: 'USD' });

  const fmtSemana = () => {
    return `${rangoSemana.inicio.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' })} – ${rangoSemana.fin.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' })}`;
  };

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const labelInputStyle = { display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px' };
  const inputBoxStyle = { width: '100%', padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: 13, boxSizing: 'border-box' };

  // ---- handlers ----
  const updateSalario = (nombre, monto) => {
    guardarSalarios({ ...salarios, [nombre]: parseFloat(monto) || 0 });
  };
  const agregarEmpleado = () => {
    if (!nuevoEmpleado.trim()) { alert('Escribe el nombre del empleado'); return; }
    guardarSalarios({ ...salarios, [nuevoEmpleado.trim()]: parseFloat(nuevoSalario) || 0 });
    setNuevoEmpleado('');
    setNuevoSalario('');
  };
  const quitarEmpleado = (nombre) => {
    if (!confirm(`¿Quitar a ${nombre} de la lista de salarios?`)) return;
    const copia = { ...salarios };
    delete copia[nombre];
    guardarSalarios(copia);
  };

  const agregarRegla = () => {
    if (!nuevaRegla.empleado.trim() || !nuevaRegla.tipoTrabajoIncluye.trim() || !nuevaRegla.monto) {
      alert('Completa empleado, tipo de trabajo y monto');
      return;
    }
    guardarReglas([...reglas, {
      id: Date.now(),
      empleado: nuevaRegla.empleado.trim(),
      tipoTrabajoIncluye: nuevaRegla.tipoTrabajoIncluye.trim().toLowerCase(),
      monto: parseFloat(nuevaRegla.monto) || 0,
      moneda: nuevaRegla.moneda,
      activa: true
    }]);
    setNuevaRegla({ empleado: '', tipoTrabajoIncluye: '', monto: 0, moneda: 'USD' });
  };
  const toggleRegla = (id) => {
    guardarReglas(reglas.map(r => r.id === id ? { ...r, activa: !r.activa } : r));
  };
  const eliminarRegla = (id) => {
    if (!confirm('¿Eliminar esta regla de comisión?')) return;
    guardarReglas(reglas.filter(r => r.id !== id));
  };

  const actualizarTipoCambio = (valor) => {
    const num = parseFloat(valor) || 0;
    setTipoCambio(num);
    localStorage.setItem('tipoCambioUSDMXN', String(num));
  };

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Nómina y Comisiones" subtitle={`Semana ${fmtSemana()} · Total: $${totalNomina.toLocaleString('es-MX', { maximumFractionDigits: 0 })} MXN`} color="var(--mod-nomina)" icon="💵" />

      {/* TABS */}
      <div style={{ display: 'flex', gap: 4, background: 'var(--bg-card)', borderRadius: 'var(--radius-md)', padding: 4, marginBottom: 20, flexWrap: 'wrap' }}>
        {[
          { id: 'reporte', label: '📊 Reporte semanal' },
          { id: 'salarios', label: '💵 Salarios base' },
          { id: 'reglas', label: '⚙️ Reglas de comisión' }
        ].map(v => (
          <button key={v.id} onClick={() => setVistaActual(v.id)} style={{
            padding: '10px 16px', borderRadius: 'var(--radius-sm)',
            background: vistaActual === v.id ? 'var(--mod-nomina)' : 'transparent',
            border: 'none', color: vistaActual === v.id ? '#fff' : 'var(--text-muted)',
            cursor: 'pointer', fontSize: 13, fontWeight: vistaActual === v.id ? 700 : 500, transition: 'all 0.15s'
          }}>{v.label}</button>
        ))}
      </div>

      {/* ============ TAB REPORTE SEMANAL ============ */}
      {vistaActual === 'reporte' && (
        <>
          {/* Selector de semana */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 14, marginBottom: 16, gap: 12, flexWrap: 'wrap' }}>
            <button onClick={() => moverSemana(-7)} style={{ padding: '8px 14px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-primary)', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>◀ Semana anterior</button>
            <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{fmtSemana()}</div>
            <button onClick={() => moverSemana(7)} style={{ padding: '8px 14px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-primary)', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>Semana siguiente ▶</button>
          </div>

          {/* Resumen */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
            <div style={cardStyle}>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Total salarios base</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--text-primary)' }}>${totalBase.toLocaleString('es-MX')}</div>
            </div>
            <div style={cardStyle}>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Total comisiones</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--success)' }}>${totalComisiones.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{comisionesGeneradas.length} comisión{comisionesGeneradas.length !== 1 ? 'es' : ''} generada{comisionesGeneradas.length !== 1 ? 's' : ''}</div>
            </div>
            <div style={cardStyle}>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Total nómina</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--mod-nomina)' }}>${totalNomina.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
            </div>
            <div style={cardStyle}>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Trabajos completados</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--accent-blue)' }}>{trabajosCompletadosSemana.length}</div>

          </div>

          {/* Lista por empleado */}
          {empleadosConDatos.length === 0 ? (
            <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
              <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Sin datos para esta semana. Configura salarios base o espera a que se completen trabajos.</div>
            </div>
          ) : (
            empleadosConDatos.map(e => {
              const expandido = empleadoExpandido === e.nombre;
              return (
                <div key={e.nombre} style={cardStyle}>
                  <div onClick={() => setEmpleadoExpandido(expandido ? null : e.nombre)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', gap: 12, flexWrap: 'wrap' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1, minWidth: 0 }}>
                      <div style={{ width: 40, height: 40, borderRadius: '50%', background: 'linear-gradient(135deg, var(--mod-nomina), #4338CA)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, fontWeight: 800, color: '#fff' }}>{e.nombre[0]}</div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)' }}>{e.nombre}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{e.trabajos.length} trabajo{e.trabajos.length !== 1 ? 's' : ''} · {e.comisiones.length} comisión{e.comisiones.length !== 1 ? 'es' : ''}</div>
                      </div>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, minmax(80px, 1fr))', gap: 12, textAlign: 'center', flex: '0 1 380px' }}>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Base</div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>${e.salarioBase.toLocaleString('es-MX')}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--success)' }}>Comisiones</div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: e.totalComisionesMXN > 0 ? 'var(--success)' : 'var(--text-muted)' }}>${e.totalComisionesMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--mod-nomina)' }}>Total</div>
                        <div style={{ fontSize: 18, fontWeight: 900, color: 'var(--mod-nomina)' }}>${e.totalPagar.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{expandido ? '▾' : '▸'}</div>
                  </div>

                  {expandido && (
                    <div style={{ borderTop: '1px solid var(--border-subtle)', marginTop: 14, paddingTop: 14 }}>
                      {/* Trabajos hechos */}
                      {e.trabajos.length > 0 && (
                        <div style={{ marginBottom: 14 }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-muted)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>🦷 Trabajos completados</div>
                          <div style={{ display: 'grid', gap: 6 }}>
                            {e.trabajos.map((t, idx) => (
                              <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 12px', background: 'var(--bg-input)', borderRadius: 8, fontSize: 12 }}>

                              </div>
                            ))}

                          <div style={{ display: 'grid', gap: 6 }}>
                            {e.comisiones.map((c, idx) => (
                              <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 12px', background: 'rgba(52,211,153,0.08)', borderRadius: 8, fontSize: 12, borderLeft: '3px solid var(--success)' }}>

                                <span style={{ color: 'var(--success)', fontWeight: 700 }}>${c.montoTotalMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })} MXN</span>
                              </div>

                          </div>

                      {e.trabajos.length === 0 && e.comisiones.length === 0 && (

                      )}
                    </div>
                  )}
                </div>
              );
            })
          )}
        </>
      )}

      {/* ============ TAB SALARIOS BASE ============ */}
      {vistaActual === 'salarios' && (

          <div style={{ ...cardStyle, marginBottom: 20 }}>

            </div>
            <div style={{ display: 'grid', gap: 10 }}>
              {Object.entries(salarios).map(([nombre, monto]) => (
                <div key={nombre} style={{ display: 'grid', gridTemplateColumns: '1fr 180px 40px', gap: 10, alignItems: 'center' }}>

                    <input type="number" value={monto} onChange={(e) => updateSalario(nombre, e.target.value)} placeholder="0" style={{ ...inputBoxStyle, paddingLeft: 26 }} />

                  <button onClick={() => quitarEmpleado(nombre)} style={{ padding: 8, background: 'rgba(239,68,68,0.15)', border: 'none', color: '#EF4444', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: 14 }}>🗑️</button>

            <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 10 }}>➕ Agregar empleado nuevo</div>

          </div>
        </>
      )}
    </div>
  );
}

// PORTAL DOCTORES LOGIN — Acceso para doctores (vía Gmail OAuth)
// ============================================================
function PortalDoctoresLoginModule({ currentUser, setCurrentUser }) {
  const [loginEmail, setLoginEmail] = useState('');
  const [sincronizando, setSincronizando] = useState(false);

  const doctoresRegistrados = ['dr.martinez@dental.com', 'dra.rodriguez@dental.com', 'dr.garcia@dental.com', 'dra.fernandez@dental.com'];

  const loginConGoogle = () => {
    if (!loginEmail || !loginEmail.includes('@')) {
      alert('Ingresa un email válido');
      return;
    }

    setSincronizando(true);
    setTimeout(() => {
      const nombreDoctor = loginEmail.split('@')[0].replace(/\./g, ' ').toUpperCase();
      setCurrentUser({ id: loginEmail, name: nombreDoctor, email: loginEmail, role: 'doctor' });
      alert(`✅ Bienvenido, ${nombreDoctor}!\n\nTus órdenes y cobros están siendo sincronizados desde Gmail...`);
      setSincronizando(false);
    }, 2000);
  };

  return (
    <div style={{ animation:'fadeIn 0.3s', minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'linear-gradient(135deg, var(--mod-doctores), #6366F1)', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:'var(--radius-lg)', padding:40, maxWidth:500, boxShadow:'0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:60, marginBottom:16 }}>🦷</div>
          <div style={{ fontSize:28, fontWeight:900, color:'var(--text-primary)', marginBottom:8 }}>ZERA LAB</div>
          <div style={{ fontSize:14, color:'var(--text-muted)' }}>Portal para Doctores</div>
        </div>

        <div style={{ marginBottom:24 }}>
          <label style={{ fontSize:13, fontWeight:700, color:'var(--text-secondary)', display:'block', marginBottom:8 }}>Inicia con tu email (Gmail):</label>
          <input
            type="email"
            value={loginEmail}
            onChange={e=>setLoginEmail(e.target.value)}
            onKeyPress={e=>e.key==='Enter'&&loginConGoogle()}
            placeholder="tu.email@clinica.com"
            style={{ width:'100%', padding:'14px', borderRadius:'var(--radius-md)', border:'1px solid var(--border-subtle)', fontSize:14, marginBottom:16, boxSizing:'border-box' }}
            disabled={sincronizando}
          />
          <button onClick={loginConGoogle} disabled={sincronizando} style={{
            width:'100%', padding:'14px', background:sincronizando?'var(--text-muted)':'var(--mod-doctores)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:sincronizando?'not-allowed':'pointer', fontSize:15, fontWeight:700
          }}>
            {sincronizando ? '⏳ Sincronizando...' : '🔑 Iniciar sesión con Google'}
          </button>
        </div>

        <div style={{ background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.3)', borderRadius:'var(--radius-md)', padding:16, fontSize:12, color:'var(--text-secondary)', lineHeight:'1.6' }}>
          <strong>¿Cómo funciona?</strong><br/>
          1️⃣ Ingresa tu email de Gmail<br/>
          2️⃣ La app sincroniza tus órdenes desde el lab<br/>
          3️⃣ Ves estado de tus trabajos en tiempo real<br/>
          4️⃣ Recibe escaneos por Gmail automáticamente
        </div>

        <div style={{ marginTop:20, textAlign:'center', fontSize:11, color:'var(--text-muted)' }}>
          Tus datos se sincronizan desde Google Drive. Nunca almacenamos tus credenciales.
        </div>
      </div>
    </div>
  );
}

  );
}

      tecnicos: 'Rafael, Montserrat, Aram, Fidel, Kevin',
      viaticos_semanal: 500,
      pagador: 'Papá',

function LoginScreen({ onLogin, onDoctorLogin }) {
  const [selectedUser, setSelectedUser] = useState(null);
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');

  const handlePin = (digit) => {
    if (pin.length >= 4) return;
    const newPin = pin + digit;
    setPin(newPin);
    setError('');
    if (newPin.length === 4) {
      if (selectedUser && selectedUser.pin === newPin) onLogin(selectedUser);
      else { setError('PIN incorrecto'); setTimeout(() => setPin(''), 400); }
    }
  };
  const clearPin = () => { setPin(''); setError(''); };

  return (
    <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg-primary)' }}>

function Dashboard({ currentUser, onNavigate }) {
  const role = ROLE_DASHBOARD[currentUser.id] || { stats:[], greeting:'Bienvenido' };
  useZeraSync('checkinData');
  const [selectedOrder, setSelectedOrder] = useState(null);

  // Helper compartido: día de la semana corto (Lun 28, Mar 29, etc.)
  const diaCortoHoy = () => {
    const hoy = new Date();
    const nombres = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    return `${nombres[hoy.getDay()]} ${hoy.getDate()}`;
  };

  // Lee el check-in de hoy del usuario actual desde checkinData
  const checkinHoy = React.useMemo(() => {
    const data = JSON.parse(localStorage.getItem('checkinData') || '[]');
    return data.find(c => c.nombre === currentUser.name && c.dia === diaCortoHoy());
  }, []);

  const [checkedIn, setCheckedIn] = useState(!!checkinHoy?.entrada);

  const handleCheckin = () => {
    const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    const data = JSON.parse(localStorage.getItem('checkinData') || '[]');
    const dia = diaCortoHoy();
    const existente = data.find(c => c.nombre === currentUser.name && c.dia === dia);
    if (existente) {
      existente.entrada = hora;
    } else {
      data.push({ id: Date.now(), nombre: currentUser.name, dia, entrada: hora, salida: null, horas: '0:00', gps: false, fecha: new Date().toISOString() });
    }
    localStorage.setItem('checkinData', JSON.stringify(data));
    setCheckedIn(true);
    alert(`✅ Check-in registrado para ${currentUser.name} a las ${hora}`);
  };

  // ÓRDENES Y ESTADÍSTICAS REALES (desde localStorage / Supabase)
  const ordenesReales = React.useMemo(() => JSON.parse(localStorage.getItem('produccionOrdenes') || '[]'), []);
  const cobrosReales = React.useMemo(() => JSON.parse(localStorage.getItem('cobrosRegistro') || '[]'), []);
  const registroReales = React.useMemo(() => JSON.parse(localStorage.getItem('registroTrabajos') || '[]'), []);
  const contaduriaReales = React.useMemo(() => JSON.parse(localStorage.getItem('contaduria') || '[]'), []);

  const statsReales = React.useMemo(() => {
    const activas = ordenesReales.filter(o => o.estado !== 'entregado' && o.estado !== 'enviado');
    const enProduccion = ordenesReales.filter(o => o.estado && !['recepcion', 'entregado', 'enviado', 'entregar'].includes(o.estado));
    const listas = ordenesReales.filter(o => o.estado === 'entregar');
    const pagosPendientes = cobrosReales.filter(c => c.estado === 'pendiente');
    const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5;
    const totalPendiente = pagosPendientes.reduce((s, c) => {
      const m = (c.montoFinal ?? c.monto) || 0;
      return s + (c.moneda === 'USD' ? m * tc : m);
    }, 0);
    const facturasPend = contaduriaReales.filter(c => c.estado === 'pendiente');
    return {
      ordenes: { label: 'Órdenes activas', value: activas.length, change: `${registroReales.length} registradas`, color: 'var(--mod-ordenes)' },
      produccion: { label: 'En producción', value: enProduccion.length, change: '', color: 'var(--mod-produccion)' },
      listas: { label: 'Listas p/entregar', value: listas.length, change: '', color: 'var(--success)' },
      pagos: { label: 'Pagos pendientes', value: pagosPendientes.length, change: `$${totalPendiente.toLocaleString('es-MX', { maximumFractionDigits: 0 })}`, color: 'var(--mod-cobros)' },
      contaduria: { label: 'Facturas pendientes', value: facturasPend.length, change: '', color: 'var(--mod-finanzas)' },
      mis_trabajos: { label: 'Mis trabajos', value: ordenesReales.filter(o => (o.asignado_a || '').toLowerCase() === (currentUser.name || '').toLowerCase()).length, change: '', color: 'var(--mod-produccion)' },
      entregas: { label: 'Entregas pendientes', value: listas.length, change: '', color: 'var(--warning)' },
      alertas: { label: 'Alertas', value: 0, change: 'sin alertas', color: 'var(--warning)' },
      checkin: { label: 'Check-in hoy', value: checkedIn ? '✓' : '—', change: checkedIn ? 'ok' : 'pendiente', color: 'var(--mod-checkin)' }
    };
  }, [ordenesReales, cobrosReales, registroReales, contaduriaReales, currentUser.name, checkedIn]);

  // Órdenes más recientes (últimas 3 que aún no se han entregado)
  const recentOrders = ordenesReales
    .filter(o => o.estado !== 'entregado' && o.estado !== 'enviado')
    .sort((a, b) => (b.id || 0) - (a.id || 0))
    .slice(0, 3);

  if (selectedOrder) {
    return (

// Indicador de sincronización + errores
function SyncIndicator({ status }) {
  const [errores, setErrores] = React.useState([]);
  const [verErrores, setVerErrores] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      setErrores(prev => [...prev.slice(-9), { ...e.detail, time: Date.now() }]);
    };
    window.addEventListener('zera-sync-error', handler);
    return () => window.removeEventListener('zera-sync-error', handler);
  }, []);

  const color = status === 'connected' ? '#34D399' : status === 'offline' ? '#EF4444' : '#F59E0B';
  const fondo = status === 'connected' ? 'rgba(52,211,153,0.15)' : status === 'offline' ? 'rgba(239,68,68,0.15)' : 'rgba(245,158,11,0.15)';
  const borde = status === 'connected' ? 'rgba(52,211,153,0.4)' : status === 'offline' ? 'rgba(239,68,68,0.4)' : 'rgba(245,158,11,0.4)';
  const hayErrores = errores.length > 0;

  return (
    <>
      <div onClick={() => hayErrores && setVerErrores(!verErrores)} style={{
        position: 'fixed', bottom: 12, right: 12, padding: '6px 12px',
        background: hayErrores ? 'rgba(239,68,68,0.25)' : fondo,
        border: `1px solid ${hayErrores ? 'rgba(239,68,68,0.5)' : borde}`,
        borderRadius: 20, fontSize: 11, fontWeight: 600,
        color: hayErrores ? '#EF4444' : color,
        display: 'flex', alignItems: 'center', gap: 6, zIndex: 100,
        cursor: hayErrores ? 'pointer' : 'default'
      }}>
        <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'currentColor', animation: status === 'connecting' ? 'pulse 1.5s infinite' : 'none' }} />
        {hayErrores ? `⚠ ${errores.length} error${errores.length > 1 ? 'es' : ''} de sync` : (status === 'connected' ? 'En vivo' : status === 'offline' ? 'Sin conexión' : 'Conectando...')}
      </div>
      {verErrores && hayErrores && (
        <div style={{ position: 'fixed', bottom: 50, right: 12, width: 360, maxHeight: 300, overflow: 'auto', background: 'var(--bg-card)', border: '1px solid #EF4444', borderRadius: 8, padding: 12, zIndex: 101, boxShadow: '0 8px 24px rgba(0,0,0,0.4)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <strong style={{ color: '#EF4444', fontSize: 12 }}>Errores de sincronización</strong>
            <button onClick={() => { setErrores([]); setVerErrores(false); }} style={{ background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: 12 }}>Limpiar</button>
          </div>
          {errores.map((e, i) => (
            <div key={i} style={{ fontSize: 10, color: 'var(--text-secondary)', marginBottom: 4, padding: 4, background: 'rgba(239,68,68,0.05)', borderRadius: 4 }}>
              <strong>{e.key}:</strong> {e.msg}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

            {scanHistory.map(s => (
              <div key={s.id} style={{ background:'var(--bg-card)', borderRadius:'var(--radius-md)', padding: isMobile ? 12 : 14, marginBottom: isMobile ? 6 : 8, display:'flex', justifyContent:'space-between', alignItems: isMobile ? 'flex-start' : 'center', border:'1px solid var(--border-subtle)', gap: isMobile ? 8 : 0, flexWrap: isMobile ? 'wrap' : 'nowrap' }}>
                <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: isMobile ? 13 : 14, fontWeight:600, overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.paciente}</div><div style={{ fontSize: isMobile ? 11 : 13, color:'var(--text-muted)' }}>{s.fecha} a las {s.hora || 'por confirmar'}</div></div>
                <Badge color={s.estado==='confirmado'?'var(--success)':'var(--warning)'}>{s.estado==='confirmado'?'✅ Confirmado':'⏳ Pendiente'}</Badge>
              </div>
            ))}
          </div>
        )}

        {tab === 'pagos' && (
          <div>
            <h2 style={{ fontSize: isMobile ? 16 : 20, fontWeight:800, marginBottom:4 }}>Mis pagos</h2>
            <p style={{ fontSize: isMobile ? 12 : 14, color:'var(--text-muted)', marginBottom: isMobile ? 12 : 16 }}>Saldo pendiente total: <strong style={{ color:'var(--danger)', fontSize: isMobile ? 16 : 18 }}>${saldoPendiente.toLocaleString()}</strong></p>
            {pagos.map((p,i) => (
              <div key={i} style={{ background:'var(--bg-card)', borderRadius:'var(--radius-md)', padding: isMobile ? 12 : 16, marginBottom: isMobile ? 6 : 8, display:'flex', justifyContent:'space-between', alignItems: isMobile ? 'flex-start' : 'center', border:'1px solid var(--border-subtle)', borderLeft:`4px solid ${p.pagado>=p.monto?'var(--success)':'var(--danger)'}`, gap: isMobile ? 8 : 0, flexWrap: isMobile ? 'wrap' : 'nowrap' }}>
                <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: isMobile ? 13 : 14, fontWeight:600, overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.paciente}</div><div style={{ fontSize: isMobile ? 11 : 13, color:'var(--text-muted)', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.trabajo}</div></div>
                <div style={{ textAlign:'right', whiteSpace: 'nowrap' }}>
                  <div style={{ fontSize: isMobile ? 16 : 18, fontWeight:800, color:p.pagado>=p.monto?'var(--success)':'var(--danger)' }}>${(p.monto-p.pagado).toLocaleString()}</div>
                  <div style={{ fontSize: isMobile ? 10 : 12, color:'var(--text-muted)' }}>{p.pagado>=p.monto?'Pagado':'Pendiente'}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [session, setSession] = useState(null);
  const [doctors, setDoctors] = useState(SAMPLE_DOCTORS); // null | {type:'team',user} | {type:'doctor',doctor}
  const [activeModule, setActiveModule] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [currentDoctor, setCurrentDoctor] = useState(null); // Para el portal de doctores (login interno)
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  const [syncStatus, setSyncStatus] = useState('connecting');

  // Detectar cambios de tamaño de pantalla
  useEffect(() => {
    const handleResize = () => {
      const mobile = window.innerWidth < 768;
      setIsMobile(mobile);
      if (mobile) setCollapsed(true); // Colapsar sidebar en móvil
    };
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  // Inicializar sincronización con Supabase al cargar
  useEffect(() => {
    DBSync.init()
      .then(() => setSyncStatus('connected'))
      .catch((e) => {
        console.error('Error inicializando sync:', e);
        setSyncStatus('offline');
      });
    return () => DBSync.stop();
  }, []);

  const handleLogin = (user) => setSession({ type: 'team', user });
  const handleDoctorLogin = (doctor) => setSession({ type: 'doctor', doctor });
  const handleLogout = () => { setSession(null); setActiveModule('dashboard'); };

  if (!session) return <LoginScreen onLogin={handleLogin} onDoctorLogin={handleDoctorLogin} />;
  if (session.type === 'doctor') return <DoctorPortal doctor={session.doctor} onLogout={handleLogout} />;

  const currentUser = session.user;
  const mod = MODULES.find(m => m.id === activeModule) || MODULES[0];

  const renderContent = () => {
    switch(activeModule) {
      case 'dashboard': return <Dashboard currentUser={currentUser} onNavigate={setActiveModule} />;
      case 'ordenes': return <OrdenesModule onNavigate={setActiveModule} />;
      case 'produccion': return <ProduccionIntegradaModule onNavigate={setActiveModule} />;
      // case 'evidencia': REMOVIDO - integrado en Producción
      case 'checkin': return <CheckinModule currentUser={currentUser} onNavigate={setActiveModule} />;
      case 'mensajeria': return <MensajeriaModule onNavigate={setActiveModule} />;
      case 'cobros':
      case 'notas':
      case 'nomina':
      case 'tarifas':
      case 'corte':
      case 'finanzas':
        return <FinanzasModule currentUser={currentUser} onNavigate={setActiveModule} />;
      case 'doctores-admin': return <DoctoresAdminModule onNavigate={setActiveModule} />;
      case 'contaduria': return <ContaduriaModule onNavigate={setActiveModule} />;
      case 'lab-externo': return <LabExternoModule onNavigate={setActiveModule} />;
      case 'inventario': return <InventarioModule onNavigate={setActiveModule} />;
      case 'config-ia': return <ConfiguracionIAModule onNavigate={setActiveModule} />;
      case 'notas-ia': return <NotasIAModule currentUser={currentUser} onNavigate={setActiveModule} />;
      case 'doctores': return currentDoctor ? <PortalDoctoresPersonalModule currentUser={currentDoctor} onNavigate={setActiveModule} /> : <PortalDoctoresLoginModule currentUser={currentDoctor} setCurrentUser={setCurrentDoctor} onNavigate={setActiveModule} />;
      case 'config': return <ConfigModule onNavigate={setActiveModule} />;
      default: return <Dashboard currentUser={currentUser} onNavigate={setActiveModule} />;
    }
  };

  const mainPadding = isMobile ? 12 : 28;
  const mainPaddingSmall = window.innerWidth < 480 ? 8 : mainPadding;

  return (
    <div style={{ display:'flex', height:'100vh', width:'100%' }}>
      <Sidebar activeModule={activeModule} onSelect={setActiveModule} collapsed={collapsed} onToggle={() => setCollapsed(!collapsed)} currentUser={currentUser} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', width:'100%' }}>
        <Header module={mod} currentUser={currentUser} onLogout={handleLogout} onSidebarToggle={() => setCollapsed(!collapsed)} collapsed={collapsed} isMobileView={isMobile} onNavigate={setActiveModule} />
        <main style={{ flex:1, overflow:'auto', padding: window.innerWidth < 480 ? mainPaddingSmall : mainPadding, paddingRight: window.innerWidth < 480 ? 8 : 28 }}>{renderContent()}</main>
      </div>
      {/* Indicador de sincronización en la esquina inferior derecha */}
      <SyncIndicator status={syncStatus} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
