:root {

  --bg-card-hover: #22222E;

  --border-subtle: #2A2A35;
  --border-medium: #3A3A48;
  --border-active: #5B8DEF;
  --text-primary: #F0F0F5;
  --text-secondary: #A0A0B8;
  --text-muted: #6B6B80;
  --text-accent: #7EB0FF;
  --accent-blue: #5B8DEF;
  --accent-blue-hover: #4A7DE0;
  --accent-blue-glow: rgba(91,141,239,0.15);
  --accent-blue-soft: rgba(91,141,239,0.08);
  --metallic-silver: #B8B8CC;
  --metallic-gold: #C9A96E;
  --metallic-gold-soft: rgba(201,169,110,0.12);
  --success: #34D399;
  --warning: #FBBF24;
  --danger: #F87171;
  --info: #60A5FA;

  --mod-produccion: #F59E0B;
  --mod-evidencia: #8B5CF6;

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
#root { height: 100vh; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
@keyframes pulse-glow { 0%,100% { box-shadow: 0 0 8px var(--accent-blue-glow); } 50% { box-shadow: 0 0 20px var(--accent-blue-glow); } }
@keyframes pulse-danger { 0%,100% { box-shadow: 0 0 12px rgba(248,113,113,0.5); } 50% { box-shadow: 0 0 4px rgba(248,113,113,0.2); } }
@keyframes pulse-warn { 0%,100% { box-shadow: 0 0 10px rgba(251,191,36,0.4); } 50% { box-shadow: 0 0 3px rgba(251,191,36,0.15); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
select, input, textarea {
  font-family: inherit;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
select:focus, input:focus, textarea:focus { border-color: var(--accent-blue); }
select option { background: var(--bg-card); }
.kanban-late { animation: pulse-danger 1.2s infinite; }
.kanban-today { animation: pulse-warn 1.5s infinite; }
.kanban-col-hover { border: 2px dashed var(--accent-blue) !important; background: var(--accent-blue-soft) !important; }
.kanban-drag { opacity: 0.5; transform: scale(0.95); }
.chart-container { position: relative; width: 100%; max-height: 300px; }
.chart-container canvas { width: 100% !important; }
@media print {
  body { background: #fff !important; color: #000 !important; overflow: visible !important; }
  .no-print { display: none !important; }
}
/* ============ RESPONSIVE MOBILE ============ */
@media (max-width: 768px) {
  #root { display: flex; flex-direction: column; }
  body { overflow-y: auto; overflow-x: hidden; }
  .sidebar { display: none !important; }
  .main-container { margin-left: 0 !important; }
  .top-bar { height: 50px; }
  .top-bar button { padding: 8px 12px; font-size: 12px; }
  .grid-2col { display: grid !important; grid-template-columns: 1fr !important; gap: 12px !important; }
  .grid-3col { display: grid !important; grid-template-columns: 1fr !important; gap: 10px !important; }
  .section-header { padding: 12px 16px !important; margin-bottom: 12px !important; }
  .section-header h2 { font-size: 18px !important; }
  .subsection { padding: 10px 12px !important; }
  .subsection h3 { font-size: 14px !important; }
  .btn { padding: 10px 14px !important; font-size: 12px !important; }
  .card { padding: 12px !important; margin-bottom: 8px !important; }
  input, select, textarea { padding: 8px 10px !important; font-size: 13px !important; }
  .tabs { gap: 4px !important; }
  .tab-btn { padding: 8px 12px !important; font-size: 11px !important; }
  .kanban-col { min-width: 280px !important; }
}
@media (max-width: 480px) {
  .section-header h2 { font-size: 16px !important; }
  .subsection h3 { font-size: 12px !important; }
  .card { padding: 8px !important; font-size: 12px !important; }
  .kanban-col { min-width: 240px !important; }
  .grid-2col { grid-template-columns: 1fr !important; }
}
</style>

// --- Section Header con COLOR por módulo ---
function SectionHeader({ title, subtitle, color, icon, children }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24, padding:'18px 24px', background:`linear-gradient(135deg, ${color}18 0%, transparent 70%)`, borderRadius:'var(--radius-lg)', borderLeft:`4px solid ${color}` }}>
      <div>
        <h2 style={{ fontSize:24, fontWeight:800, color:'var(--text-primary)', display:'flex', alignItems:'center', gap:10 }}>
          {icon && <span style={{ fontSize:28 }}>{icon}</span>}
          {title}
        </h2>
        {subtitle && <p style={{ fontSize:14, color:'var(--text-secondary)', marginTop:4 }}>{subtitle}</p>}
      </div>
      {children && <div style={{ display:'flex', gap:8 }}>{children}</div>}
    </div>
  );
}

// --- Subsection header con fondo de color para diferenciar ---
function SubSection({ title, color, children, description }) {
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ padding:'12px 18px', background:`${color}15`, borderRadius:'var(--radius-md) var(--radius-md) 0 0', borderBottom:`2px solid ${color}` }}>
        <h3 style={{ fontSize:16, fontWeight:700, color }}>{title}</h3>
        {description && <p style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>{description}</p>}
      </div>
      <div style={{ padding:16, background:'var(--bg-card)', borderRadius:'0 0 var(--radius-md) var(--radius-md)', border:'1px solid var(--border-subtle)', borderTop:'none' }}>
        {children}
      </div>
    </div>
  );
}

      {/* Contorno exterior del diente grande */}
      <path d="M 30 25 Q 25 30 25 45 L 25 75 Q 25 90 50 105 Q 75 90 75 75 L 75 45 Q 75 30 70 25 Q 65 20 50 20 Q 35 20 30 25 Z"
            fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />

      {/* Diente interior/resaltado */}
      <path d="M 38 32 Q 35 37 35 48 L 35 75 Q 35 85 50 95 Q 65 85 65 75 L 65 48 Q 65 37 62 32 Q 60 28 50 28 Q 40 28 38 32 Z"
            fill="currentColor" opacity="0.85" />

      {/* Raíz/Implante interior */}
      <g fill="currentColor" opacity="0.6">
        <rect x="46" y="75" width="8" height="15" rx="2" />
        <circle cx="50" cy="72" r="5" />
        <line x1="48" y1="85" x2="45" y2="95" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
        <line x1="50" y1="85" x2="50" y2="96" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
        <line x1="52" y1="85" x2="55" y2="95" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
      </g>

      {/* Highlight/brillo */}
      <ellipse cx="42" cy="40" rx="6" ry="10" fill="currentColor" opacity="0.25" />
    </svg>
  );
}

function LogoPlaceholder({ size = 'md' }) {
  return <LogoSVG size={size} />;
}

function Btn({ children, variant='primary', onClick, style:sx, disabled }) {
  const bg = variant==='primary' ? 'var(--accent-blue)' : variant==='danger' ? 'var(--danger)' : 'transparent';
  const c = variant==='ghost' ? 'var(--text-secondary)' : '#fff';
  const bd = variant==='ghost' ? '1px solid var(--border-subtle)' : 'none';
  return <button onClick={onClick} disabled={disabled} style={{
    padding:'12px 22px', borderRadius:'var(--radius-md)', background:bg, color:c, border:bd,
    cursor:disabled?'not-allowed':'pointer', fontSize:14, fontWeight:700, transition:'all 0.15s',
    opacity: disabled ? 0.5 : 1, ...sx
  }}>{children}</button>;
}

// ============================================================
// ODONTOGRAMA
// ============================================================
function Odontograma({ selectedTeeth, onToothClick, workType, restorations, onRestorationChange }) {
  const [rangeStart, setRangeStart] = useState(null);
  const [toothColors, setToothColors] = useState({});
  const [selectedShade, setSelectedShade] = useState('A2');
  const [selectedRestoration, setSelectedRestoration] = useState('corona-completa');

  const handleToothClick = (num) => {
    if (rangeStart === null) {
      setRangeStart(num);
    } else if (rangeStart === num) {
      setRangeStart(null);
    } else {
      const min = Math.min(rangeStart, num);
      const max = Math.max(rangeStart, num);
      for (let t = min; t <= max; t++) {
        if (!selectedTeeth.includes(t)) onToothClick(t);
      }
      setRangeStart(null);
    }
  };

  const applyToSelected = () => {
    if (selectedTeeth.length === 0) return;
    selectedTeeth.forEach(t => {
      onRestorationChange?.(t, selectedRestoration);
      setToothColors({...toothColors, [t]: SHADE_GUIDES.find(s => s.id === selectedShade)?.rgb});
    });
  };

  const Tooth = ({ num }) => {
    const sel = selectedTeeth.includes(num);
    const isStart = rangeStart === num;
    const resto = restorations?.[num];
    const bgColor = toothColors[num] || '#f5f5dc';
    return (
      <div onClick={() => handleToothClick(num)} title={`Diente ${num}`} style={{
        width:36, height:40, borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', flexDirection:'column',
        fontSize:10, fontWeight:sel?700:500, cursor:'pointer', transition:'all 0.1s', userSelect:'none',
        background: bgColor,
        border: isStart ? `2px solid var(--warning)` : sel ? `2px solid var(--accent-blue)` : '1px solid var(--border-subtle)',
        color: 'var(--text-primary)',
      }}>
        <div style={{ fontSize:11, fontWeight:800, lineHeight:1 }}>{num}</div>
        {resto && <div style={{ fontSize:14, lineHeight:1 }}>{RESTORATION_TYPES.find(r=>r.id===resto)?.icon}</div>}
      </div>
    );
  };

  const Quadrant = ({ teeth, label }) => (
    <div style={{ display:'flex', gap:2, justifyContent:'center' }}>
      {teeth.map(n => <Tooth key={n} num={n} />)}
    </div>
  );

  return (
    <div style={{ background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', padding:14 }}>
      <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>🦷 Odontograma - Selecciona dientes</div>

      {/* Grid semicircular compacto */}
      <div style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-md)', padding:12, marginBottom:12 }}>
        <div style={{ marginBottom:8 }}>
          <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', textAlign:'center', marginBottom:4 }}>SUPERIOR</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Quadrant teeth={UPPER_RIGHT} label="UR" />
            <Quadrant teeth={UPPER_LEFT} label="UL" />
          </div>
        </div>
        <div style={{ borderTop:'2px solid var(--border-subtle)', paddingTop:8 }}>
          <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', textAlign:'center', marginBottom:4 }}>INFERIOR</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Quadrant teeth={LOWER_RIGHT} label="LR" />
            <Quadrant teeth={LOWER_LEFT} label="LL" />
          </div>
        </div>
      </div>

      {/* Panel de controles compacto */}
      {selectedTeeth.length > 0 && (
        <div style={{ background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)', padding:12 }}>
          <div style={{ fontSize:12, fontWeight:700, marginBottom:10, color:'var(--accent-blue)' }}>
            ✓ Dientes: {selectedTeeth.sort((a,b)=>a-b).join(', ')}
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
            {/* Tipo de restauración */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Tipo</label>
              <select value={selectedRestoration} onChange={e => setSelectedRestoration(e.target.value)}
                style={{ fontSize:11, padding:'6px', width:'100%', borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)' }}>
                {RESTORATION_TYPES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
              </select>
            </div>

            {/* Color dental */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Color</label>
              <select value={selectedShade} onChange={e => setSelectedShade(e.target.value)}
                style={{ fontSize:11, padding:'6px', width:'100%', borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)' }}>
                <optgroup label="A"><option value="A1">A1</option><option value="A2">A2</option><option value="A3">A3</option><option value="A3.5">A3.5</option><option value="A4">A4</option></optgroup>
                <optgroup label="B"><option value="B1">B1</option><option value="B2">B2</option><option value="B3">B3</option><option value="B4">B4</option></optgroup>
                <optgroup label="C"><option value="C1">C1</option><option value="C2">C2</option><option value="C3">C3</option><option value="C4">C4</option></optgroup>
                <optgroup label="D"><option value="D1">D1</option><option value="D2">D2</option><option value="D3">D3</option><option value="D4">D4</option></optgroup>
              </select>
            </div>
          </div>

          <button onClick={applyToSelected} style={{ width:'100%', padding:'8px', background:'var(--accent-blue)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', fontWeight:700, fontSize:12, cursor:'pointer' }}>
            Aplicar
          </button>
        </div>
      )}
    </div>
  );
}

function WorkTypeSelector({ selected, onSelect }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:8 }}>

// ============================================================
// NUEVA ORDEN FORM
// ============================================================
function NuevaOrdenForm({ onBack, onSave, orders = [] }) {
  const [doctorSearch, setDoctorSearch] = useState('');
  const [doctor, setDoctor] = useState('');
  const [showDoctorList, setShowDoctorList] = useState(false);
  const [pacientes, setPacientes] = useState([{ nombre:'', trabajos:[{ tipo:'', dientes:[], unidades:1, restorations:{} }] }]);
  const [origen, setOrigen] = useState('');
  const [tipoImpresion, setTipoImpresion] = useState('');
  const [notaFisica, setNotaFisica] = useState('');
  const [fechaEntrega, setFechaEntrega] = useState('');
  const [observaciones, setObservaciones] = useState('');
  const [esRepeticion, setEsRepeticion] = useState(false);
  const [notas, setNotas] = useState('');

  const activePaciente = 0;
  const activeTrabajo = 0;
  const currentTrabajo = pacientes[activePaciente]?.trabajos[activeTrabajo];

  const selectedDoctor = doctor ? SAMPLE_DOCTORS.find(d => d.id == doctor) : null;
  const doctorUnpaidNotes = selectedDoctor ? (selectedDoctor.notas_totales - selectedDoctor.notas_pagadas) : 0;
  const doctorFrozen = doctorUnpaidNotes >= 5;

  const filteredDoctors = doctorSearch.length > 0
    ? SAMPLE_DOCTORS.filter(d => d.nombre.toLowerCase().includes(doctorSearch.toLowerCase()) || d.clinica.toLowerCase().includes(doctorSearch.toLowerCase()))
    : [];

  const toggleTooth = (num) => {
    const t = {...currentTrabajo};
    t.dientes = t.dientes.includes(num) ? t.dientes.filter(d=>d!==num) : [...t.dientes, num];
    t.unidades = t.dientes.length;
    const np = [...pacientes];
    np[activePaciente].trabajos[activeTrabajo] = t;
    setPacientes(np);
  };
  const setWorkType = (tipo) => {
    const np = [...pacientes];
    np[activePaciente].trabajos[activeTrabajo].tipo = tipo;
    setPacientes(np);
  };
  const setRestoration = (tooth, restoType) => {
    const np = [...pacientes];
    if (!np[activePaciente].trabajos[activeTrabajo].restorations) {
      np[activePaciente].trabajos[activeTrabajo].restorations = {};
    }
    np[activePaciente].trabajos[activeTrabajo].restorations[tooth] = restoType;
    setPacientes(np);
  };

  const handleSaveWithConfirmation = () => {
    if (doctorFrozen) {
      alert(`⚠️ El doctor ${selectedDoctor.nombre} tiene ${doctorUnpaidNotes} notas sin pagar. Máximo permitido: 4. Debes cobrar antes de crear nuevas órdenes.`);
      return;
    }
    if (!doctor || !pacientes[0].nombre || !origen || !fechaEntrega) {
      alert('Por favor, completa todos los campos requeridos');
      return;
    }
    alert(`✅ Orden registrada\n• Doctor: ${selectedDoctor.nombre}\n• Paciente: ${pacientes[0].nombre}\n• Entrega: ${fechaEntrega}${esRepeticion ? '\n🔄 Repetición' : ''}\n\nNotas guardadas.`);
    onBack();
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:22, padding:4 }}>←</button>
        <SectionHeader title="Nueva Orden de Trabajo" subtitle="Llena todos los datos del pedido" color="var(--mod-ordenes)" icon="📋" />
      </div>

      {doctorFrozen && (
        <InfoCard icon="🚫" title="Doctor congelado" description={`${selectedDoctor.nombre} tiene ${doctorUnpaidNotes} notas sin pagar (límite: 4). Debes cobrar antes de crear nuevas órdenes.`} color="var(--danger)" />
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div>
          <SubSection title="Datos generales" color="var(--mod-ordenes)">
            <Field label="Doctor">
              <div style={{ position:'relative', marginBottom:0 }}>
                <input
                  type="text"
                  placeholder="Busca por nombre o clínica..."
                  value={doctorSearch}
                  onChange={e => { setDoctorSearch(e.target.value); setShowDoctorList(true); }}
                  onFocus={() => setShowDoctorList(true)}
                  style={{ marginBottom:0 }}
                />
                {showDoctorList && (doctorSearch.length > 0 || !doctor) && (
                  <div style={{ position:'absolute', top:'100%', left:0, right:0, background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'0 0 var(--radius-md) var(--radius-md)', maxHeight:200, overflowY:'auto', zIndex:10, marginTop:-1 }}>
                    {filteredDoctors.map(d => (
                      <div key={d.id} onClick={() => { setDoctor(d.id); setDoctorSearch(''); setShowDoctorList(false); }} style={{ padding:'12px 14px', cursor:'pointer', borderBottom:'1px solid var(--border-subtle)', transition:'background 0.1s' }} onMouseEnter={e => e.currentTarget.style.background='var(--bg-card-hover)'} onMouseLeave={e => e.currentTarget.style.background=''}>
                        <div style={{ fontSize:14, fontWeight:600, marginBottom:2 }}>{d.nombre}</div>
                        <div style={{ fontSize:12, color:'var(--text-muted)' }}>{d.clinica}</div>
                      </div>
                    ))}
                    {filteredDoctors.length===0 && doctorSearch.length>0 && <div style={{ padding:'12px 14px', color:'var(--text-muted)', fontSize:13 }}>No encontrado</div>}
                  </div>
                )}
              </div>
            </Field>
            {doctor && (
              <div style={{ padding:12, background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)', marginBottom:12, borderLeft:`3px solid var(--accent-blue)` }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>{selectedDoctor.nombre}</div>
                <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{selectedDoctor.clinica}</div>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:6 }}>Notas pendientes de pago: {doctorUnpaidNotes}</div>
              </div>
            )}
            <Field label="Nombre del paciente"><input value={pacientes[0].nombre} onChange={e=>{const p=[...pacientes]; p[0].nombre=e.target.value; setPacientes(p);}} placeholder="Ej: María García" /></Field>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <Field label="# Nota física"><input value={notaFisica} onChange={e=>setNotaFisica(e.target.value)} placeholder="Ej: 1247" /></Field>
              <Field label="Fecha de entrega">
                <input type="date" value={fechaEntrega} onChange={e=>{setFechaEntrega(e.target.value);}} min={new Date(new Date().toISOString().split('T')[0]).toISOString().split('T')[0]} />
                {fechaEntrega && (
                  <div style={{ marginTop:6, padding:8, background:'rgba(52,211,153,0.15)', borderRadius:'var(--radius-sm)', fontSize:12, color:'var(--success)' }}>
                    {(() => {
                      const days = Math.ceil((new Date(fechaEntrega) - new Date()) / 86400000);
                      return `Entrega en ${days} días`;
                    })()}
                  </div>
                )}
              </Field>
            </div>
            <Field label="¿Repetición?">
              <div style={{ display:'flex', gap:8 }}>
                {[true, false].map(val => (
                  <button key={val} onClick={() => setEsRepeticion(val)} style={{ flex:1, padding:10, borderRadius:'var(--radius-md)', background: esRepeticion === val ? 'var(--accent-blue)' : 'var(--bg-input)', border: esRepeticion === val ? 'none' : '1px solid var(--border-subtle)', color: esRepeticion === val ? '#fff' : 'var(--text-secondary)', cursor:'pointer', fontSize:13, fontWeight:600 }}>
                    {val ? '✓ Sí' : 'No'}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Origen de impresión"><select value={origen} onChange={e=>setOrigen(e.target.value)}><option value="">— Selecciona —</option>{ORIGIN_OPTIONS.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}</select></Field>
            <Field label="Tipo de impresión"><select value={tipoImpresion} onChange={e=>setTipoImpresion(e.target.value)}><option value="">— Selecciona —</option><option>Física</option><option>Escaneo</option></select></Field>
          </SubSection>
          <SubSection title="Tipo de trabajo" color="#F472B6" description="Selecciona qué se va a hacer">
            <WorkTypeSelector selected={currentTrabajo?.tipo} onSelect={setWorkType} />
          </SubSection>
        </div>
        <div>
          <SubSection title="Selecciona los dientes y restauraciones" color="#A78BFA">
            <Odontograma selectedTeeth={currentTrabajo?.dientes || []} onToothClick={toggleTooth} workType={currentTrabajo?.tipo} restorations={currentTrabajo?.restorations} onRestorationChange={setRestoration} />
          </SubSection>
          <SubSection title="Unidades" color="#10B981">
            <Field label="Cantidad de unidades">
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6, marginBottom:8 }}>
                {INVENTORY_UNITS.map(u => (
                  <button key={u} onClick={() => {const np=[...pacientes]; np[0].trabajos[0].unidades=u; setPacientes(np);}} style={{ padding:8, borderRadius:'var(--radius-sm)', background: currentTrabajo?.unidades === u ? 'var(--accent-blue)' : 'var(--bg-input)', border: currentTrabajo?.unidades === u ? 'none' : '1px solid var(--border-subtle)', color: currentTrabajo?.unidades === u ? '#fff' : 'var(--text-secondary)', cursor:'pointer', fontSize:12, fontWeight:700 }}>{u}</button>
                ))}
              </div>
              <input type="number" min="1" max="50" value={currentTrabajo?.unidades || 0} onChange={e => {const np=[...pacientes]; np[0].trabajos[0].unidades=parseInt(e.target.value) || 1; setPacientes(np);}} />
            </Field>
          </SubSection>
          <SubSection title="Notas y observaciones" color="var(--mod-config)">
            <Field label="Observaciones especiales"><textarea value={observaciones} onChange={e=>setObservaciones(e.target.value)} rows={2} placeholder="Indicaciones especiales del doctor, color, material, etc." /></Field>
            <Field label="Notas internas"><textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={2} placeholder="Notas para el lab (no se envía al doctor)" /></Field>
          </SubSection>
          <div style={{ display:'flex', gap:12, marginTop:16 }}>
            <button onClick={onBack} style={{ flex:1, padding:14, borderRadius:'var(--radius-md)', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', color:'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:600 }}>Cancelar</button>
            <button onClick={handleSaveWithConfirmation} disabled={doctorFrozen || !doctor || !pacientes[0].nombre || !origen || !fechaEntrega} style={{ flex:2, padding:14, borderRadius:'var(--radius-md)', background: doctorFrozen ? 'var(--border-subtle)' : 'var(--mod-ordenes)', border:'none', color:'#fff', cursor: doctorFrozen ? 'not-allowed' : 'pointer', fontSize:14, fontWeight:700, opacity: doctorFrozen ? 0.5 : 1 }}>✅ Guardar con notas</button>
          </div>
        </div>
      </div>
    </div>
  );
}

              <div><span style={{ color:'var(--text-muted)' }}>Entrada:</span> <strong>{orden.fecha_entrada}</strong></div>
              <div><span style={{ color:'var(--text-muted)' }}>Entrega:</span> <strong>{orden.fecha_entrega}</strong></div>
              <div><span style={{ color: daysLeft <= 0 ? 'var(--danger)' : daysLeft <= 3 ? 'var(--warning)' : 'var(--text-muted)' }}>Plazo:</span> <strong style={{ color: daysLeft <= 0 ? 'var(--danger)' : daysLeft <= 3 ? 'var(--warning)' : 'inherit' }}>{daysLeft > 0 ? `${daysLeft} días` : 'VENCIDO'}</strong></div>
              <div><span style={{ color:'var(--text-muted)' }}>Origen:</span> <strong>{ORIGIN_OPTIONS.find(o=>o.id===orden.origen)?.label}</strong></div>
              <div><span style={{ color:'var(--text-muted)' }}>¿Repetición?:</span> <strong>{orden.es_repeticion ? '✓ Sí' : 'No'}</strong></div>
            </div>
          </SubSection>
          <SubSection title="Doctor" color="var(--mod-doctores)">
            <div style={{ fontSize:14 }}>
              <div style={{ marginBottom:8 }}><strong>{orden.doctor.nombre}</strong></div>
              <div style={{ fontSize:12, color:'var(--text-secondary)', marginBottom:4 }}>{orden.doctor.clinica}</div>
              <div style={{ fontSize:12, color:'var(--text-secondary)' }}>📱 {orden.doctor.telefono}</div>
            </div>
          </SubSection>
        </div>
        <SubSection title="Pacientes y trabajos" color="#F472B6">
          {orden.pacientes.map((p,i) => (
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ fontSize:15, fontWeight:700, marginBottom:6 }}>{p.nombre}</div>
              {p.trabajos.map((t,j) => {
                const wt = WORK_TYPES.find(w=>w.id===t.tipo);
                return (
                  <div key={j} style={{ display:'flex', alignItems:'center', gap:8, padding:8, background:'var(--bg-primary)', borderRadius:'var(--radius-sm)', marginBottom:4 }}>
                    <div style={{ width:8, height:8, borderRadius:'50%', background:wt?.color }} />
                    <span style={{ fontSize:13, fontWeight:600 }}>{wt?.label}</span>
                    <span style={{ fontSize:12, color:'var(--text-muted)' }}>×{t.unidades} — dientes: {t.dientes.join(', ')}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </SubSection>
      </div>
    </div>
  );
}

// RECEPCIÓN DE TRABAJO FÍSICO

function RecepcionTrabajoView({ onBack, orders }) {
  const [searchFolio, setSearchFolio] = useState('');
  const [matched, setMatched] = useState(null);
  const [recepcion, setRecepcion] = useState({ notaFisica:'', condicion:'buena', observaciones:'' });
  const historial = [
    { id:1, folio:'ZL-0001', doctor:'Dr. Martínez', paciente:'María García', llegada:'24 May 10:15', condicion:'buena', matchOT:true },
    { id:2, folio:'ZL-0002', doctor:'Dra. Rodríguez', paciente:'Pedro Ruiz', llegada:'23 May 14:30', condicion:'buena', matchOT:true },
    { id:3, folio:'SIN-FOLIO', doctor:'Desconocido', paciente:'—', llegada:'22 May 09:00', condicion:'revisar', matchOT:false },
  ];
  const buscarOrden = () => {
    const found = orders.find(o => o.numero.toLowerCase() === searchFolio.toLowerCase() || o.nota_fisica === searchFolio);
    setMatched(found || 'not_found');
  };
  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:22 }}>←</button>
        <SectionHeader title="Recepción de Trabajo" subtitle="Registra la llegada del trabajo y vincúlalo a una orden" color="var(--mod-ordenes)" icon="📦" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div>
          <SubSection title="Paso 1: Buscar la orden" color="var(--mod-ordenes)" description="Escribe el folio o número de nota">
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              <input value={searchFolio} onChange={e=>setSearchFolio(e.target.value)} placeholder="Folio ZL-XXXX o # nota" onKeyDown={e=>e.key==='Enter'&&buscarOrden()} style={{ flex:1 }} />
              <Btn onClick={buscarOrden}>Buscar</Btn>
            </div>
            {matched && matched !== 'not_found' && (
              <InfoCard icon="✅" title="Orden encontrada" description={`${matched.numero} — ${matched.doctor.nombre} — ${matched.pacientes[0]?.nombre} — Entrega: ${matched.fecha_entrega}`} color="var(--success)" />
            )}
            {matched === 'not_found' && (
              <InfoCard icon="⚠️" title="No encontrada" description="Se registrará como trabajo sin folio. Podrás vincularlo después." color="var(--warning)" />
            )}
          </SubSection>
          <SubSection title="Paso 2: Verificar condición" color="#10B981">
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              {[['buena','✅ Todo bien'],['revisar','⚠️ Hay que revisar'],['dañado','❌ Llegó dañado']].map(([k,l]) => (
                <button key={k} onClick={()=>setRecepcion({...recepcion, condicion:k})} style={{ flex:1, padding:14, borderRadius:'var(--radius-md)', background:recepcion.condicion===k?'var(--accent-blue-soft)':'var(--bg-input)', border:recepcion.condicion===k?'2px solid var(--accent-blue)':'1px solid var(--border-subtle)', color:recepcion.condicion===k?'var(--text-accent)':'var(--text-secondary)', cursor:'pointer', fontSize:13, fontWeight:recepcion.condicion===k?700:400 }}>{l}</button>
              ))}
            </div>
            <Field label="Nota física"><input value={recepcion.notaFisica} onChange={e=>setRecepcion({...recepcion, notaFisica:e.target.value})} placeholder="#" /></Field>
            <textarea value={recepcion.observaciones} onChange={e=>setRecepcion({...recepcion, observaciones:e.target.value})} rows={2} placeholder="Observaciones..." />
            <button onClick={()=>alert('Trabajo registrado exitosamente')} style={{ marginTop:12, width:'100%', padding:14, background:'var(--mod-ordenes)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:15, fontWeight:700 }}>Registrar recepción</button>
          </SubSection>
        </div>
        <SubSection title="Últimas recepciones" color="var(--mod-mensajeria)">
          {historial.map(h => (
            <div key={h.id} style={{ padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', marginBottom:8, border:`1px solid ${h.matchOT?'var(--success)':'var(--warning)'}30` }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                <span style={{ fontSize:14, fontWeight:700, color:h.matchOT?'var(--success)':'var(--warning)' }}>{h.folio}</span>
                <Badge color={h.matchOT?'var(--success)':'var(--warning)'} bg={h.matchOT?'rgba(52,211,153,0.12)':'rgba(251,191,36,0.12)'}>{h.matchOT?'Vinculado':'Sin vincular'}</Badge>
              </div>
              <div style={{ fontSize:13, color:'var(--text-secondary)' }}>{h.doctor} — {h.paciente}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Llegada: {h.llegada}</div>
            </div>
          ))}
          <InfoCard icon="📋" title="3 órdenes pendientes" description="Hay órdenes con estatus 'recibido' que aún no tienen registro de llegada física." color="var(--info)" />
        </SubSection>
      </div>
    </div>
  );
}

// ============================================================
// ÓRDENES MODULE - SCANNER DE IA (foto orden física → Producción)
// ============================================================
function OrdenesModule() {
  const [aiStep, setAiStep] = useState('upload');
  const [aiResult, setAiResult] = useState(null);
  const [uploadedOrders, setUploadedOrders] = useState([]);
  const [showManual, setShowManual] = useState(false);
  const [manualData, setManualData] = useState({ doctor:'', paciente:'', trabajo:'', color:'', unidades:1, horaLlegada:'', fechaEntrega:'', esGarantia:false, escaneo:false });
  const fileRef = useRef(null);

  const handleOrderUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setAiStep('scanning');
    setTimeout(() => {
      const now = new Date();
      const newOrder = {
        id: Date.now(),
        doctor: 'Dr. Martínez López',
        paciente: 'María García',
        trabajo: 'Corona Zirconia',
        color: 'A2',
        unidades: 2,
        horaLlegada: new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' }),
        fechaEntrega: new Date(Date.now() + 3*86400000).toISOString().split('T')[0],
        confianza: 96,
        timestamp: now.toLocaleString('es-MX'),
        timestampFull: `${now.toLocaleDateString('es-MX')} ${now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`
      };
      setAiResult(newOrder);
      setAiStep('result');
    }, 1500);
  };

  const confirmarOrden = (orden) => {
    const ordenConMetadata = {
      ...orden,
      fechaSubida: new Date().toLocaleString('es-MX'),
      fechaSubidaDetalle: `${new Date().toLocaleDateString('es-MX')} ${new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`
    };
    setUploadedOrders([ordenConMetadata, ...uploadedOrders]);

    // Si hay escaneo, registrar el gasto en localStorage
    if (orden.escaneo) {
      const gastosEscaneo = JSON.parse(localStorage.getItem('gastosEscaneo') || '[]');
      gastosEscaneo.push({
        id: Date.now(),
        ordenId: orden.id,
        doctor: orden.doctor,
        trabajo: orden.trabajo,
        unidades: orden.unidades,
        costoUnidad: 10,
        costoTotal: orden.unidades * 10,
        fecha: new Date().toLocaleString('es-MX'),
        persona: 'Juan/Abril'
      });
      localStorage.setItem('gastosEscaneo', JSON.stringify(gastosEscaneo));
    }

    // Guardar orden completa en localStorage para sincronizar con otros módulos
    const ordenesAll = JSON.parse(localStorage.getItem('ordenesRegistradas') || '[]');
    ordenesAll.push(ordenConMetadata);
    localStorage.setItem('ordenesRegistradas', JSON.stringify(ordenesAll));

    setAiStep('upload');
    setAiResult(null);
    setShowManual(false);
    setManualData({ doctor:'', paciente:'', trabajo:'', color:'', unidades:1, horaLlegada:'', fechaEntrega:'', esGarantia:false, escaneo:false });

    let mensaje = `✅ Orden de ${orden.doctor} enviada automáticamente a Producción\n\n📋 ${orden.paciente} - ${orden.trabajo} (${orden.unidades})\n⏰ Llegó: ${orden.horaLlegada}\n📅 Entrega: ${orden.fechaEntrega}`;
    if (orden.esGarantia) mensaje += `\n🔄 Marcada como GARANTÍA`;
    if (orden.escaneo) mensaje += `\n📱 Escaneo: Juan/Abril (-$${orden.unidades * 10})`;
    alert(mensaje);
  };

  const confirmarManual = () => {
    if (!manualData.doctor || !manualData.paciente || !manualData.trabajo || !manualData.horaLlegada || !manualData.fechaEntrega) {
      alert('⚠️ Por favor completa todos los campos obligatorios');
      return;
    }
    const now = new Date();
    const newOrder = {
      id: Date.now(),
      doctor: manualData.doctor,
      paciente: manualData.paciente,
      trabajo: manualData.trabajo,
      color: manualData.color,
      unidades: manualData.unidades,
      horaLlegada: manualData.horaLlegada,
      fechaEntrega: manualData.fechaEntrega,
      confianza: 100,
      esManual: true,
      esGarantia: manualData.esGarantia,
      escaneo: manualData.escaneo,
      timestamp: now.toLocaleString('es-MX'),
      timestampFull: `${now.toLocaleDateString('es-MX')} ${now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`
    };
    confirmarOrden(newOrder);
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Órdenes" subtitle="Fotografía la orden del Dr → IA la procesa → Automáticamente a Producción" color="var(--mod-ordenes)" icon="📋" />

      <InfoCard icon="📌" title="¿Cómo funciona?" description="1️⃣ Fotografía la orden que llenó el Doctor 2️⃣ La IA extrae automáticamente: Dr, paciente, trabajo, color, hora de llegada y fecha de entrega 3️⃣ Confirma los datos 4️⃣ Se envía automáticamente a Producción" color="var(--mod-ordenes)" />

      <div style={{ display:'flex', gap:12, marginBottom:20 }}>
        <button onClick={() => { setShowManual(false); setAiStep('upload'); setAiResult(null); }} style={{ flex:1, padding:'14px 20px', background:!showManual?'var(--mod-ordenes)':'var(--bg-card)', border:!showManual?'2px solid var(--mod-ordenes)':'1px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:!showManual?'#fff':'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:700 }}>📸 Modo IA (Fotografía)</button>
        <button onClick={() => { setShowManual(true); setAiStep('upload'); setAiResult(null); }} style={{ flex:1, padding:'14px 20px', background:showManual?'var(--mod-ordenes)':'var(--bg-card)', border:showManual?'2px solid var(--mod-ordenes)':'1px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:showManual?'#fff':'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:700 }}>✍️ Llenado Manual</button>
      </div>

      {/* PASO 1: UPLOAD (IA) */}
      {!showManual && aiStep === 'upload' && (
        <SubSection title="Paso 1: Fotografía la orden" color="var(--mod-ordenes)">
          <div style={{ border:'2px dashed var(--mod-ordenes)', borderRadius:'var(--radius-lg)', padding:50, textAlign:'center', background:'rgba(139,92,246,0.04)', cursor:'pointer', transition:'all 0.2s' }}
            onClick={() => fileRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.background = 'rgba(139,92,246,0.12)'; e.currentTarget.style.borderColor = 'var(--mod-ordenes)'; }}
            onDragLeave={(e) => { e.currentTarget.style.background = 'rgba(139,92,246,0.04)'; e.currentTarget.style.borderColor = 'var(--mod-ordenes)'; }}
            onDrop={(e) => { e.preventDefault(); if (e.dataTransfer.files[0]) handleOrderUpload({ target: { files: e.dataTransfer.files } }); }}
          >
            <input ref={fileRef} type="file" accept="image/*" onChange={handleOrderUpload} style={{ display:'none' }} />
            <div style={{ fontSize:48, marginBottom:12 }}>📸</div>
            <div style={{ fontSize:18, fontWeight:700, color:'var(--mod-ordenes)', marginBottom:4 }}>Toma una foto de la orden</div>
            <div style={{ fontSize:14, color:'var(--text-secondary)' }}>o arrastra la imagen aquí</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:12 }}>La IA leerá automáticamente: Dr, paciente, trabajo, color, hora de llegada, fecha entrega</div>
          </div>
        </SubSection>
      )}

      {/* FORMULARIO MANUAL */}
      {showManual && aiStep === 'upload' && (
        <SubSection title="Llenado Manual de Orden" color="var(--mod-ordenes)">
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20 }}>
            <Field label="Doctor *"><input value={manualData.doctor} onChange={e=>setManualData({...manualData, doctor:e.target.value})} placeholder="Dr. Nombre Apellido" /></Field>
            <Field label="Paciente *"><input value={manualData.paciente} onChange={e=>setManualData({...manualData, paciente:e.target.value})} placeholder="Nombre paciente" /></Field>
            <Field label="Tipo de trabajo *"><input value={manualData.trabajo} onChange={e=>setManualData({...manualData, trabajo:e.target.value})} placeholder="ej: Corona Zirconia, Puente, etc" /></Field>
            <Field label="Color"><input value={manualData.color} onChange={e=>setManualData({...manualData, color:e.target.value})} placeholder="ej: A2, B1, etc" /></Field>
            <Field label="Unidades *"><input type="number" value={manualData.unidades} onChange={e=>setManualData({...manualData, unidades:Number(e.target.value)})} min="1" /></Field>
            <Field label="Hora de llegada *"><input type="time" value={manualData.horaLlegada} onChange={e=>setManualData({...manualData, horaLlegada:e.target.value})} /></Field>
            <Field label="Fecha de entrega *"><input type="date" value={manualData.fechaEntrega} onChange={e=>setManualData({...manualData, fechaEntrega:e.target.value})} /></Field>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20, padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
              <input type="checkbox" checked={manualData.esGarantia} onChange={e=>setManualData({...manualData, esGarantia:e.target.checked})} style={{ cursor:'pointer', width:18, height:18 }} />
              <label style={{ cursor:'pointer', fontSize:14, fontWeight:600 }}>
                🔄 Garantía/Repetición
                <div style={{ fontSize:12, color:'var(--text-muted)', fontWeight:400, marginTop:2 }}>No se cobra, pero se registra como gasto</div>
              </label>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
              <input type="checkbox" checked={manualData.escaneo} onChange={e=>setManualData({...manualData, escaneo:e.target.checked})} style={{ cursor:'pointer', width:18, height:18 }} />
              <label style={{ cursor:'pointer', fontSize:14, fontWeight:600 }}>
                📱 Escaneo (Juan/Abril)
                <div style={{ fontSize:12, color:'var(--text-muted)', fontWeight:400, marginTop:2 }}>Se resta $10 del ingreso</div>
              </label>
            </div>
          </div>

          <div style={{ padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', marginBottom:16, fontSize:12, color:'var(--text-muted)' }}>
            ℹ️ Los campos con * son obligatorios
          </div>
          <div style={{ display:'flex', gap:12, justifyContent:'flex-end' }}>
            <button onClick={() => setShowManual(false)} style={{ padding:'12px 24px', background:'var(--bg-card)', border:'2px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:700 }}>Cancelar</button>
            <button onClick={confirmarManual} style={{ padding:'12px 28px', background:'var(--mod-ordenes)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:14, fontWeight:700 }}>✅ Guardar y enviar a Producción</button>
          </div>
        </SubSection>
      )}

      {/* PASO 2: SCANNING (IA) */}
      {!showManual && aiStep === 'scanning' && (
        <SubSection title="Paso 2: Analizando orden..." color="var(--mod-ordenes)">
          <div style={{ textAlign:'center', padding:40 }}>
            <div style={{ fontSize:48, marginBottom:16, animation:'pulse 1.5s infinite' }}>🔍</div>
            <div style={{ fontSize:18, fontWeight:700, color:'var(--mod-ordenes)', marginBottom:4 }}>Leyendo la orden con IA...</div>
            <div style={{ fontSize:13, color:'var(--text-muted)' }}>Extrayendo datos del doctor, paciente, trabajo y fechas</div>
            <div style={{ width:300, height:8, background:'var(--bg-input)', borderRadius:4, margin:'24px auto', overflow:'hidden' }}>
              <div style={{ width:'100%', height:'100%', background:'var(--mod-ordenes)', borderRadius:4, animation:'slideRight 1.5s infinite' }} />
            </div>
          </div>
        </SubSection>
      )}

      {/* PASO 3: RESULTADO */}
      {aiStep === 'result' && aiResult && (
        <SubSection title="Paso 3: Verificar y confirmar" color="var(--mod-ordenes)">
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20 }}>
            {/* DATOS EXTRAÍDOS */}
            <div style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-lg)', padding:20, border:'2px solid var(--mod-ordenes)' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-muted)', marginBottom:14, textTransform:'uppercase' }}>👤 Información del orden</div>

              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>DOCTOR</div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--mod-ordenes)' }}>{aiResult.doctor}</div>
              </div>

              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>PACIENTE</div>
                <div style={{ fontSize:15, fontWeight:700 }}>{aiResult.paciente}</div>
              </div>

              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>TIPO DE TRABAJO</div>
                <div style={{ fontSize:15, fontWeight:700 }}>{aiResult.trabajo}</div>
              </div>

              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>COLOR</div>
                <div style={{ fontSize:15, fontWeight:700, padding:'6px 12px', background:'rgba(139,92,246,0.15)', borderRadius:'6px', display:'inline-block' }}>{aiResult.color}</div>
              </div>

              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>UNIDADES</div>
                <div style={{ fontSize:15, fontWeight:700 }}>{aiResult.unidades}</div>
              </div>
            </div>

            {/* TIEMPOS Y CONFIANZA */}
            <div style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-lg)', padding:20, border:'2px solid #34D399' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-muted)', marginBottom:14, textTransform:'uppercase' }}>⏰ Tiempos y confianza</div>

              <div style={{ marginBottom:12, padding:12, background:'rgba(52,211,153,0.08)', borderRadius:'var(--radius-md)', border:'1px solid rgba(52,211,153,0.2)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:2, fontWeight:600 }}>⏰ HORA QUE DICE LA ORDEN (Llegada)</div>
                <div style={{ fontSize:16, fontWeight:700, color:'#34D399', marginBottom:4 }}>{aiResult.horaLlegada}</div>
                <div style={{ fontSize:9, color:'var(--text-muted)' }}>Hora en la que el Dr registró la orden</div>
              </div>

              <div style={{ marginBottom:12, padding:12, background:'rgba(94,234,212,0.08)', borderRadius:'var(--radius-md)', border:'1px solid rgba(94,234,212,0.2)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:2, fontWeight:600 }}>📅 FECHA DE ENTREGA PROMETIDA</div>
                <div style={{ fontSize:16, fontWeight:700, color:'#34D399', marginBottom:4 }}>{aiResult.fechaEntrega}</div>
                <div style={{ fontSize:9, color:'var(--text-muted)' }}>Cuándo debe estar listo</div>
              </div>

              <div style={{ marginBottom:12, padding:12, background:'rgba(139,92,246,0.08)', borderRadius:'var(--radius-md)', border:'1px solid rgba(139,92,246,0.2)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:2, fontWeight:600 }}>⏳ HORA REAL DE SUBIDA</div>
                <div style={{ fontSize:14, fontWeight:700, color:'#8B5CF6' }}>{aiResult.timestampFull || aiResult.timestamp}</div>
                <div style={{ fontSize:9, color:'var(--text-muted)' }}>Cuándo se registró en el sistema</div>
              </div>

              <div style={{ marginBottom:12, padding:16, background:'rgba(52,211,153,0.15)', borderRadius:'var(--radius-md)', border:'2px solid rgba(52,211,153,0.3)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>CONFIANZA IA</div>
                <div style={{ fontSize:24, fontWeight:900, color:'#34D399' }}>{aiResult.confianza}%</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>{aiResult.confianza >= 90 ? '✅ Muy confiable' : aiResult.confianza >= 75 ? '⚠️ Revisar manualmente' : '❌ Tomar nueva foto'}</div>
              </div>

              {aiResult.esManual && <div style={{ fontSize:11, fontWeight:600, color:'var(--mod-ordenes)', padding:8, background:'rgba(139,92,246,0.1)', borderRadius:'var(--radius-md)', textAlign:'center' }}>✍️ Datos ingresados manualmente</div>}

              {(aiResult.esGarantia || aiResult.escaneo) && (
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:12 }}>
                  {aiResult.esGarantia && <div style={{ fontSize:11, fontWeight:600, color:'#F97316', padding:8, background:'rgba(249,115,22,0.1)', borderRadius:'var(--radius-md)', textAlign:'center' }}>🔄 GARANTÍA</div>}
                  {aiResult.escaneo && <div style={{ fontSize:11, fontWeight:600, color:'#0EA5E9', padding:8, background:'rgba(14,165,233,0.1)', borderRadius:'var(--radius-md)', textAlign:'center' }}>📱 ESCANEO (-$10)</div>}
                </div>
              )}
            </div>
          </div>

          <div style={{ display:'flex', gap:12, justifyContent:'flex-end' }}>
            <button onClick={() => { setAiStep('upload'); setAiResult(null); }} style={{ padding:'12px 24px', background:'var(--bg-card)', border:'2px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:700 }}>📸 Otra foto</button>
            <button onClick={() => confirmarOrden(aiResult)} style={{ padding:'12px 28px', background:'var(--mod-ordenes)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:14, fontWeight:700 }}>✅ Confirmar y enviar a Producción</button>
          </div>
        </SubSection>
      )}

      {/* HISTORIAL DE ÓRDENES CARGADAS */}
      {uploadedOrders.length > 0 && (
        <SubSection title={`Órdenes registradas hoy (${uploadedOrders.length})`} color="var(--mod-ordenes)">
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:12 }}>
            {uploadedOrders.map((orden) => (
              <div key={orden.id} style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-lg)', padding:16, borderLeft:'4px solid var(--mod-ordenes)', border:'1px solid var(--border-subtle)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:'var(--text-muted)', marginBottom:4 }}>ORDEN #{orden.id.toString().slice(-4)}</div>
                    <div style={{ fontSize:15, fontWeight:700, color:'var(--mod-ordenes)' }}>{orden.doctor}</div>
                  </div>
                  <div style={{ padding:'4px 8px', background:'rgba(52,211,153,0.15)', borderRadius:'6px', fontSize:11, fontWeight:700, color:'#34D399' }}>✅ Enviada</div>
                </div>

                <div style={{ fontSize:14, fontWeight:600, marginBottom:8 }}>{orden.paciente}</div>
                <div style={{ fontSize:13, color:'var(--text-secondary)', marginBottom:14 }}>{orden.trabajo} — {orden.unidades}x — Color: {orden.color || '—'}</div>

                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10 }}>
                  <div style={{ fontSize:11, color:'var(--text-muted)' }}>
                    <div style={{ fontSize:9, fontWeight:700, marginBottom:2, color:'var(--text-muted)' }}>⏰ LLEGADA</div>
                    <div style={{ fontWeight:600, fontSize:13 }}>{orden.horaLlegada}</div>
                  </div>
                  <div style={{ fontSize:11, color:'var(--text-muted)' }}>
                    <div style={{ fontSize:9, fontWeight:700, marginBottom:2, color:'var(--text-muted)' }}>📅 ENTREGA</div>
                    <div style={{ fontWeight:600, fontSize:13 }}>{orden.fechaEntrega}</div>
                  </div>
                </div>

                <div style={{ padding:8, background:'rgba(139,92,246,0.08)', borderRadius:'var(--radius-md)', borderTop:'1px solid rgba(139,92,246,0.2)', paddingTop:10 }}>
                  <div style={{ fontSize:8, color:'var(--text-muted)', marginBottom:2 }}>🕐 REGISTRADO EN SISTEMA</div>
                  <div style={{ fontSize:10, fontWeight:600, color:'#8B5CF6' }}>{orden.fechaSubidaDetalle || orden.timestampFull || orden.timestamp}</div>
                </div>

                {(orden.esGarantia || orden.escaneo) && (
                  <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
                    {orden.esGarantia && <div style={{ fontSize:9, fontWeight:700, color:'#F97316', padding:'4px 8px', background:'rgba(249,115,22,0.1)', borderRadius:'4px' }}>🔄 GARANTÍA</div>}
                    {orden.escaneo && <div style={{ fontSize:9, fontWeight:700, color:'#0EA5E9', padding:'4px 8px', background:'rgba(14,165,233,0.1)', borderRadius:'4px' }}>📱 ESCANEO</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        </SubSection>
      )}

      {uploadedOrders.length === 0 && aiStep === 'upload' && (
        <div style={{ textAlign:'center', padding:40, background:'rgba(139,92,246,0.04)', borderRadius:'var(--radius-lg)' }}>
          <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
          <div style={{ fontSize:15, fontWeight:700, color:'var(--text-secondary)' }}>No hay órdenes registradas aún</div>
          <div style={{ fontSize:13, color:'var(--text-muted)', marginTop:4 }}>Las órdenes que proceses aparecerán aquí</div>
        </div>
      )}

      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
        @keyframes slideRight {
          0% { width: 0%; }
          100% { width: 100%; }
        }
      `}</style>
    </div>
  );
}


// ============================================================
// PRODUCCIÓN — KANBAN (colores fuertes, sin tiempos ni viáticos)
// ============================================================
// ============================================================
// MÓDULO PRODUCCIÓN INTEGRADO
// ============================================================

const PRODUCTION_PHASES = [
  { id: 'recepcion',      label: '📥 RECEPCIÓN',        desc: 'Entrada y asignación de folio',  color: '#60A5FA' },
  { id: 'modelos',        label: '🖨️ MODELOS',         desc: 'Fabricación/resina/yeso',       color: '#F59E0B' },
  { id: 'escaneo-diseño', label: '🔍 ESCANEO & DISEÑO', desc: 'Escaneo e diseño CAD',         color: '#8B5CF6' },
  { id: 'trabajo-fisico', label: '🔧 TRABAJO FÍSICO',   desc: 'Perfilado, colado, ajuste',    color: '#EC4899' },
  { id: 'fresado',        label: '⚙️ FRESADO',         desc: 'Fresado CAD/CAM',              color: '#06B6D4' },
  { id: 'sinterizado',    label: '🔥 SINTERIZADO',     desc: 'Sintetización de piezas',      color: '#10B981' },
  { id: 'porcelana',      label: '🎨 PORCELANA',       desc: 'Aplicación de porcelana',      color: '#F472B6' },
  { id: 'calidad',        label: '✅ CALIDAD',         desc: 'Control final e inspección',   color: '#34D399' },
];

function ProduccionIntegradaModule() {
  const ordenesGuardadas = localStorage.getItem('produccionOrdenes');
  const INITIAL_ORDERS = ordenesGuardadas ? JSON.parse(ordenesGuardadas) : [
    { id: 1, folio: 'ZL-0001', doctor: 'Dr. Martínez López', paciente: 'María García', trabajo: 'Corona Zirconia', dientes: '11, 12', unidades: 2, estado: 'recepcion', asignado_a: null, historial: [{ fase: 'recepcion', fecha: '2026-05-27 09:30', usuario: 'Itzel', notas: 'Ingresado manualmente' }], fotos_evidencia: [], notas_trabajos: '' },
    { id: 2, folio: 'ZL-0002', doctor: 'Dra. Rodríguez', paciente: 'Pedro Ruiz', trabajo: 'Puente Metal-Cerámica', dientes: '24, 25, 26', unidades: 3, estado: 'modelos', asignado_a: 'Rafael', historial: [{ fase: 'recepcion', fecha: '2026-05-26 08:00', usuario: 'Itzel', notas: 'Ingresado' }, { fase: 'modelos', fecha: '2026-05-26 14:30', usuario: 'Rafael', notas: 'Modelos en yeso completados' }], fotos_evidencia: [], notas_trabajos: 'Cliente VIP' }
  ];

  const [ordenes, setOrdenes] = React.useState(INITIAL_ORDERS);
  const [selectedOrder, setSelectedOrder] = React.useState(null);
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [showFormularioRecepcion, setShowFormularioRecepcion] = React.useState(false);
  const [formData, setFormData] = React.useState({ folio: '', doctor: '', paciente: '', trabajo: '', dientes: '', unidades: 1, foto_orden: null, foto_base64: null });
  const [procesandoOCR, setProcesandoOCR] = React.useState(false);

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    setProcesandoOCR(true);
    const reader = new FileReader();
    reader.onload = async (event) => {
      const base64 = event.target.result;
      setFormData(prev => ({ ...prev, foto_base64: base64, foto_orden: file.name }));

      try {
        const { data: { text } } = await Tesseract.recognize(base64, 'spa');
        const textoExtraido = text.toUpperCase();

        // Buscar patrones en el texto para rellenar automáticamente
        let folio = formData.folio;
        let doctor = formData.doctor;
        let paciente = formData.paciente;
        let trabajo = formData.trabajo;

        // Buscar folio (ZL-XXXX pattern)
        const folioMatch = textoExtraido.match(/ZL-?\d{4,}/);
        if (folioMatch) folio = folioMatch[0];

        // Buscar doctor (Dr. o Dra.)
        const doctorMatch = textoExtraido.match(/(?:DR\.?|DRA\.?)\s+([A-ZÁÉÍÓÚ][A-Z\s]{3,20}?)(?=\n|$|PACIENTE|DIENTE)/);
        if (doctorMatch) doctor = doctorMatch[1].trim();

        // Buscar paciente
        const pacienteMatch = textoExtraido.match(/PACIENTE[:\s]+([A-ZÁÉÍÓÚ][A-Z\s]{3,30}?)(?=\n|DIENTE|TRABAJO|$)/);
        if (pacienteMatch) paciente = pacienteMatch[1].trim();

        // Buscar tipo de trabajo
        const trabajoMatch = textoExtraido.match(/(?:TRABAJO|TIPO)[:\s]+([A-ZÁÉÍÓÚ][A-Z\s]{3,30}?)(?=\n|DIENTE|$)/);
        if (trabajoMatch) trabajo = trabajoMatch[1].trim();

        setFormData(prev => ({
          ...prev,
          folio: folio || prev.folio,
          doctor: doctor || prev.doctor,
          paciente: paciente || prev.paciente,
          trabajo: trabajo || prev.trabajo
        }));

        alert('✅ Foto procesada. Campos rellenados automáticamente.');
      } catch (err) {
        console.error('Error en OCR:', err);
        alert('⚠️ No se pudo procesar la foto. Intenta con una imagen más clara.');
      } finally {
        setProcesandoOCR(false);
      }
    };
    reader.readAsDataURL(file);
  };

  const handleDragStart = (e, order) => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('orderId', order.id); };
  const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

  const handleDrop = (e, nuevoEstado) => {
    e.preventDefault();
    const orderId = parseInt(e.dataTransfer.getData('orderId'));
    const orden = ordenes.find(o => o.id === orderId);
    if (orden && orden.estado !== nuevoEstado) {
      const ahora = new Date();
      const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const usuarioActual = localStorage.getItem('usuarioActual') || 'Sistema';
      const nuevasOrdenes = ordenes.map(o => {
        if (o.id === orderId) {
          return { ...o, estado: nuevoEstado, asignado_a: usuarioActual, historial: [...o.historial, { fase: nuevoEstado, fecha: fecha, usuario: usuarioActual, notas: `Movido a ${PRODUCTION_PHASES.find(p => p.id === nuevoEstado)?.label}` }] };
        }
        return o;
      });
      setOrdenes(nuevasOrdenes);
      localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));
    }
  };

  const handleAgregarOrden = () => {
    if (!formData.folio || !formData.doctor || !formData.paciente) { alert('Completa folio, doctor y paciente'); return; }
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const usuarioActual = localStorage.getItem('usuarioActual') || 'Sistema';
    const fotosEvidencia = formData.foto_base64 ? [{ nombre: formData.foto_orden, data: formData.foto_base64, fecha: fecha }] : [];
    const nuevoOrden = { id: Math.max(...ordenes.map(o => o.id), 0) + 1, folio: formData.folio, doctor: formData.doctor, paciente: formData.paciente, trabajo: formData.trabajo, dientes: formData.dientes, unidades: formData.unidades, estado: 'recepcion', asignado_a: usuarioActual, historial: [{ fase: 'recepcion', fecha: fecha, usuario: usuarioActual, notas: formData.foto_orden ? `Orden ingresada con foto: ${formData.foto_orden}` : 'Ingresado manualmente' }], fotos_evidencia: fotosEvidencia, notas_trabajos: '' };
    const nuevasOrdenes = [...ordenes, nuevoOrden];
    setOrdenes(nuevasOrdenes);
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));
    setFormData({ folio: '', doctor: '', paciente: '', trabajo: '', dientes: '', unidades: 1, foto_orden: null, foto_base64: null });
    setShowFormularioRecepcion(false);
  };

  const openDrawer = (order) => { setSelectedOrder(order); setDrawerOpen(true); };
  const closeDrawer = () => { setDrawerOpen(false); setTimeout(() => setSelectedOrder(null), 300); };
  const getOrdenesPorFase = (faseId) => ordenes.filter(o => o.estado === faseId);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', gap: '16px', padding: '20px', background: 'var(--bg-primary)', overflow: 'hidden' }}>
      <SectionHeader title="Producción" subtitle="Arrastra órdenes entre fases | Haz clic en Paciente/Doctor para detalles" color="var(--mod-produccion)" icon="🏭">
        <button onClick={() => setShowFormularioRecepcion(!showFormularioRecepcion)} style={{ padding: '8px 16px', background: 'var(--mod-produccion)', color: '#fff', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 600 }}>➕ Nueva Orden</button>
      </SectionHeader>

      {showFormularioRecepcion && (
        <div style={{ background: 'var(--bg-card)', padding: '20px', borderRadius: 'var(--radius-lg)', border: '2px solid var(--mod-produccion)', marginBottom: '16px' }}>
          <h3 style={{ marginBottom: '12px', color: 'var(--text-primary)' }}>📥 Registrar Nueva Orden</h3>

          {/* Sección de Foto */}
          <div style={{ marginBottom: '16px', padding: '12px', background: 'var(--bg-input)', borderRadius: 'var(--radius-md)', border: '2px dashed var(--mod-produccion)' }}>
            <label style={{ display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 600, color: 'var(--mod-produccion)' }}>📸 Foto de Orden (IA procesará automáticamente)</label>
            <input
              type="file"
              accept="image/*"
              onChange={handleFileUpload}
              disabled={procesandoOCR}
              style={{ padding: '8px', width: '100%', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', cursor: procesandoOCR ? 'not-allowed' : 'pointer' }}
            />
            {procesandoOCR && <div style={{ color: 'var(--info)', fontSize: '12px', marginTop: '8px' }}>⏳ Procesando OCR...</div>}
            {formData.foto_orden && <div style={{ color: 'var(--success)', fontSize: '12px', marginTop: '8px' }}>✅ {formData.foto_orden}</div>}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', marginBottom: '12px' }}>
            <input type="text" placeholder="Folio" value={formData.folio} onChange={(e) => setFormData({...formData, folio: e.target.value})} style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
            <input type="text" placeholder="Doctor" value={formData.doctor} onChange={(e) => setFormData({...formData, doctor: e.target.value})} style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
            <input type="text" placeholder="Paciente" value={formData.paciente} onChange={(e) => setFormData({...formData, paciente: e.target.value})} style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
            <input type="text" placeholder="Tipo trabajo" value={formData.trabajo} onChange={(e) => setFormData({...formData, trabajo: e.target.value})} style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
            <input type="text" placeholder="Dientes" value={formData.dientes} onChange={(e) => setFormData({...formData, dientes: e.target.value})} style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
            <input type="number" placeholder="Unidades" value={formData.unidades} onChange={(e) => setFormData({...formData, unidades: parseInt(e.target.value)})} min="1" style={{ padding: '10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff' }} />
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={handleAgregarOrden} style={{ padding: '10px 16px', background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 600, flex: 1 }}>✅ Guardar</button>
            <button onClick={() => setShowFormularioRecepcion(false)} style={{ padding: '10px 16px', background: 'var(--bg-card-hover)', color: '#fff', border: '1px solid var(--border-medium)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 600 }}>✕</button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', gap: '16px', flex: 1, overflow: 'auto', paddingRight: '8px', minHeight: 0 }}>
        {PRODUCTION_PHASES.map(phase => (
          <div key={phase.id} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, phase.id)} style={{ flex: '0 0 280px', background: 'var(--bg-card)', borderRadius: 'var(--radius-lg)', border: `2px solid ${phase.color}`, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}>
            <div style={{ background: `${phase.color}20`, borderBottom: `2px solid ${phase.color}`, padding: '12px', minHeight: 0 }}>
              <div style={{ fontSize: '14px', fontWeight: 700, color: phase.color }}>{phase.label}</div>
              <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '4px' }}>{phase.desc}</div>
              <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '6px' }}>{getOrdenesPorFase(phase.id).length} órdenes</div>
            </div>
            <div style={{ flex: 1, overflow: 'auto', padding: '12px', display: 'flex', flexDirection: 'column', gap: '10px', minHeight: 0 }}>
              {getOrdenesPorFase(phase.id).map(orden => (
                <div key={orden.id} draggable onDragStart={(e) => handleDragStart(e, orden)} onClick={() => openDrawer(orden)} style={{ background: 'var(--bg-secondary)', border: `2px solid ${phase.color}40`, borderRadius: 'var(--radius-md)', padding: '12px', cursor: 'grab', transition: 'all 0.2s' }} onMouseEnter={(e) => e.target.style.transform = 'translateY(-2px)'} onMouseLeave={(e) => e.target.style.transform = 'none'}>
                  <div style={{ fontSize: '13px', fontWeight: 700, color: 'var(--text-primary)' }}>{orden.folio}</div>
                  <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '4px' }}>👨‍⚕️ {orden.doctor}</div>
                  <div style={{ fontSize: '12px', color: 'var(--text-secondary)', cursor: 'pointer' }}>👤 {orden.paciente}</div>
                  <div style={{ fontSize: '12px', color: phase.color, marginTop: '6px', fontWeight: 600 }}>{orden.trabajo}</div>
                  {orden.asignado_a && <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '6px', background: 'var(--bg-input)', padding: '4px 8px', borderRadius: '4px' }}>👨‍🔧 {orden.asignado_a}</div>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {drawerOpen && selectedOrder && (
        <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, left: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'flex-end', zIndex: 1000 }}>
          <div style={{ width: '450px', height: '100%', background: 'var(--bg-primary)', borderLeft: '3px solid var(--mod-produccion)', display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
            <div style={{ background: 'var(--mod-produccion)', color: '#fff', padding: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div><div style={{ fontSize: '18px', fontWeight: 700 }}>{selectedOrder.folio}</div><div style={{ fontSize: '13px', opacity: 0.9, marginTop: '4px' }}>{selectedOrder.paciente}</div></div>
              <button onClick={closeDrawer} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: '#fff', fontSize: '20px', cursor: 'pointer', width: '40px', height: '40px', borderRadius: '50%' }}>✕</button>
            </div>
            <div style={{ padding: '20px', flex: 1, overflowY: 'auto' }}>
              <div style={{ marginBottom: '24px' }}>
                <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '12px' }}>📋 INFORMACIÓN</h3>
                <div style={{ display: 'grid', gap: '10px', fontSize: '13px' }}>

function CheckinModule({ currentUser }) {
  const [checkinLocation, setCheckinLocation] = useState(null);
  const [checkinTime, setCheckinTime] = useState(null);
  const [gpsEnabled, setGpsEnabled] = useState(false);

  const allTecnicos = ['Rafael','Aram','Fidel','Kevin','Montserrat'];
  const isAdmin = currentUser && (currentUser.id === 'itzel' || currentUser.id === 'montserrat');
  const tecnicos = isAdmin ? allTecnicos : allTecnicos.filter(t => t.toLowerCase() === (currentUser?.name || '').toLowerCase());
  const dias = ['Lun 19','Mar 20','Mié 21','Jue 22','Vie 23','Sáb 24'];
  const getRecord = (nombre, dia) => CHECKIN_DATA.find(c => c.nombre === nombre && c.dia === dia);
  const totalHoras = (nombre) => {
    const records = CHECKIN_DATA.filter(c => c.nombre === nombre && c.horas !== '0:00');
    return records.reduce((sum, r) => { const [h,m] = r.horas.split(':').map(Number); return sum + h + m/60; }, 0).toFixed(1);
  };

  const handleGpsCheckin = () => {
    if (navigator.geolocation) {
      setGpsEnabled(true);
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          const distance = Math.sqrt(Math.pow(latitude - 32.5149, 2) + Math.pow(longitude - (-117.0382), 2)) * 111; // aprox km
          const isNearLab = distance < 2; // dentro de 2km del lab
          setCheckinLocation({ lat: latitude, lon: longitude, near: isNearLab, distance: distance.toFixed(1) });
          setCheckinTime(new Date().toLocaleTimeString());
          alert(`✅ Check-in registrado a las ${new Date().toLocaleTimeString()}\n${isNearLab ? '📍 Ubicación: Laboratorio ✓' : `📍 Ubicación: ${distance.toFixed(1)}km del laboratorio (⚠️ revisar)`}`);
        },
        () => {
          alert('No se pudo obtener la ubicación. Usa el check-in manual.');
          setGpsEnabled(false);
        }
      );
    } else {
      alert('GPS no disponible en este navegador');
    }
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Asistencia y Check-in" subtitle={isAdmin ? 'Vista completa de todo el equipo' : `Tus registros, ${currentUser?.name}`} color="var(--mod-checkin)" icon="📍" />

      {!isAdmin && (
        <div style={{ marginBottom:20 }}>
          <SubSection title="Check-in" color="var(--mod-checkin)">
            <button onClick={handleGpsCheckin} disabled={gpsEnabled} style={{ width:'100%', padding:16, borderRadius:'var(--radius-md)', background: gpsEnabled ? 'var(--success)' : 'var(--mod-checkin)', border:'none', color:'#fff', cursor: gpsEnabled ? 'not-allowed' : 'pointer', fontSize:15, fontWeight:700, marginBottom:8 }}>
              {gpsEnabled ? '✅ Check-in registrado' : '📍 Check-in'}
            </button>
            {checkinTime && (
              <div style={{ padding:12, background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)' }}>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>Hora: <strong>{checkinTime}</strong></div>
                {checkinLocation && (
                  <div style={{ fontSize:12, marginTop:4 }}>
                    <div style={{ marginBottom:2 }}>📍 Distancia: {checkinLocation.distance}km del laboratorio</div>
                    <div style={{ color: checkinLocation.near ? 'var(--success)' : 'var(--warning)' }}>
                      {checkinLocation.near ? '✓ Dentro' : '⚠️ Fuera'}
                    </div>
                  </div>
                )}
              </div>
            )}
          </SubSection>
        </div>
      )}

      <InfoCard icon="📌" title="Sistema de check-in" description="Registra tu entrada y salida del laboratorio. El sistema verifica tu ubicación para mantener un registro de asistencia preciso." color="var(--mod-checkin)" />

      {tecnicos.map(nombre => (
        <div key={nombre} style={{ marginBottom:16 }}>
          <SubSection title={`${nombre} — ${totalHoras(nombre)}h esta semana`} color="var(--mod-checkin)">
            <div style={{ display:'grid', gridTemplateColumns:`repeat(${dias.length}, 1fr)`, gap:8 }}>
              {dias.map(dia => {
                const r = getRecord(nombre, dia);
                return (
                  <div key={dia} style={{ padding:12, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', textAlign:'center', border:r?.excepcion?'1px solid var(--warning)':'1px solid var(--border-subtle)' }}>
                    <div style={{ fontSize:12, fontWeight:700, color:'var(--text-muted)', marginBottom:6 }}>{dia}</div>
                    {r ? (
                      <>
                        <div style={{ fontSize:14, fontWeight:700, color:'var(--success)' }}>{r.entrada}</div>
                        <div style={{ fontSize:12, color:'var(--text-muted)' }}>→ {r.salida}</div>
                        <div style={{ fontSize:13, fontWeight:700, marginTop:4, color:'var(--text-primary)' }}>{r.horas}</div>
                        <div style={{ fontSize:14, marginTop:2 }}>{r.gps?'📍✅':'📍❌'}</div>
                        {r.excepcion && <div style={{ fontSize:10, color:'var(--warning)', marginTop:4, fontWeight:600 }}>{r.excepcion}</div>}
                      </>
                    ) : <div style={{ fontSize:12, color:'var(--text-muted)', padding:'12px 0' }}>—</div>}
                  </div>
                );
              })}
            </div>
          </SubSection>
        </div>
      ))}
    </div>
  );
}
