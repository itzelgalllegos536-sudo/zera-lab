                <button onClick={()=>{setAiStep('upload');setAiResult(null);}} style={{ padding:'10px 18px', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:'var(--text-secondary)', cursor:'pointer', fontSize:13 }}>Escanear otra</button>
                <button onClick={()=>{alert('Cobro registrado'); setShowAI(false);}} style={{ padding:'10px 20px', background:'var(--mod-cobros)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:14, fontWeight:700 }}>Confirmar y registrar</button>
              </div>
            </div>
          )}
        </SubSection>
      )}

      {showTC && (
        <SubSection title="Tipo de cambio USD → MXN" color="var(--mod-cobros)" description="Configura la tasa para conversiones automáticas">
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, alignItems:'flex-end' }}>
            <Field label="Tasa actual (USD → MXN)">
              <input type="number" value={tipoCambio} onChange={e=>setTipoCambio(Number(e.target.value))} step="0.1" placeholder="17.5" />
            </Field>
            <div style={{ padding:'14px', background:'var(--bg-primary)', borderRadius:'var(--radius-md)', textAlign:'center' }}>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>Conversión de ejemplo</div>
              <div style={{ fontSize:16, fontWeight:800, color:'var(--mod-cobros)' }}>1 USD = ${tipoCambio.toFixed(2)} MXN</div>
            </div>
          </div>
          <button onClick={()=>{alert('Tipo de cambio actualizado a: $'+tipoCambio+' MXN por USD'); setShowTC(false);}} style={{ marginTop:12, padding:'12px 24px', background:'var(--mod-cobros)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:14, fontWeight:700 }}>Actualizar tipo de cambio</button>
        </SubSection>
      )}

      {/* REGISTRAR COBRO CON TARIFAS INTEGRADAS */}
      {(() => {
        const tarifas = JSON.parse(localStorage.getItem('tarifasPrecios') || '[]');
        const gastosEscaneo = JSON.parse(localStorage.getItem('gastosEscaneo') || '[]');

        const tarifa = tarifas.find(t => t.tipo.toLowerCase().includes(registroTrabajo.toLowerCase()));
        const costoBase = tarifa ? tarifa.costoBase : 0;
        const escaneoEnOrden = registroTrabajo && gastosEscaneo.filter(g => g.trabajo.toLowerCase().includes(registroTrabajo.toLowerCase())).reduce((sum, g) => sum + g.costoTotal, 0);
        const costoNeto = Math.max(0, costoBase - (escaneoEnOrden || 0));

        return (
          <SubSection title="💳 Registrar cobro con tarifas" color="var(--mod-cobros)" description="Selecciona trabajo, visualiza tarifa, resta escaneo y confirma el cobro">
            <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr auto', gap:12, alignItems:'flex-end', marginBottom:16 }}>
              <Field label="Tipo de trabajo (selecciona o escribe)">
                <input
                  value={registroTrabajo}
                  onChange={e=>setRegistroTrabajo(e.target.value)}
                  placeholder="Ej: Corona Zirconia, Carilla, etc."
                  list="trabajosList"
                />
                <datalist id="trabajosList">
                  {tarifas.map(t => <option key={t.id} value={t.tipo} />)}
                </datalist>
              </Field>
              <Field label="Método">
                <select value={registroMetodo} onChange={e=>setRegistroMetodo(e.target.value)}>
                  <option value="efectivo">💵 Efectivo</option>
                  <option value="tarjeta">💳 Tarjeta</option>
                  <option value="transferencia">🏦 Transferencia</option>
                </select>
              </Field>
              <Field label="Moneda">
                <select value={registroMoneda} onChange={e=>setRegistroMoneda(e.target.value)}>
                  <option value="MXN">MXN</option>
                  <option value="USD">USD</option>
                </select>
              </Field>
              <Field label="Sobrescribir monto">
                <input type="number" value={registroMontoOverride} onChange={e=>setRegistroMontoOverride(e.target.value)} placeholder="(opcional)" />
              </Field>
              <button onClick={()=>{
                if(!registroTrabajo) { alert('Selecciona un trabajo'); return; }
                const monto = registroMontoOverride ? Number(registroMontoOverride) : costoNeto;
                alert(`✅ Cobro registrado:\n\n💼 Trabajo: ${registroTrabajo}\n💰 Monto: $${monto.toLocaleString()} ${registroMoneda}\n💳 Método: ${registroMetodo}\n\n${escaneoEnOrden ? `📱 Escaneo descontado: -$${escaneoEnOrden}\n` : ''}Ingreso neto: $${monto.toLocaleString()}`);
                setRegistroTrabajo('');
                setRegistroMontoOverride('');
                setRegistroMetodo('efectivo');
                setRegistroMoneda('MXN');
              }} style={{ padding:'12px 24px', background:'var(--mod-cobros)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:14, fontWeight:700 }}>✅ Registrar</button>
            </div>

            {registroTrabajo && tarifa && (
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:16 }}>
                <div style={{ padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', borderLeft:'3px solid var(--mod-cobros)' }}>
                  <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>💰 Tarifa base</div>
                  <div style={{ fontSize:20, fontWeight:800, color:'var(--mod-cobros)' }}>${costoBase.toLocaleString()}</div>
                </div>
                {escaneoEnOrden > 0 && (
                  <div style={{ padding:14, background:'rgba(239,68,68,0.08)', borderRadius:'var(--radius-md)', borderLeft:'3px solid var(--danger)' }}>
                    <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>📱 Escaneo descontado</div>
                    <div style={{ fontSize:20, fontWeight:800, color:'var(--danger)' }}>-${escaneoEnOrden}</div>
                  </div>
                )}
                <div style={{ padding:14, background:'rgba(34,197,94,0.08)', borderRadius:'var(--radius-md)', borderLeft:'3px solid var(--success)' }}>
                  <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>📊 Ingreso neto</div>
                  <div style={{ fontSize:20, fontWeight:800, color:'var(--success)' }}>${registroMontoOverride ? Number(registroMontoOverride) : costoNeto}</div>
                </div>
              </div>
            )}

            {registroTrabajo && !tarifa && (
              <div style={{ padding:14, background:'rgba(251,146,60,0.1)', border:'1px solid rgba(251,146,60,0.3)', borderRadius:'var(--radius-md)', color:'var(--warning)', fontSize:13, marginBottom:16 }}>
                ⚠️ Trabajo no encontrado en tarifas. Ingresa un monto manualmente o crea la tarifa primero.
              </div>
            )}
          </SubSection>
        );
      })()}

      {/* FILTROS PARA DIVIDIR DEUDAS POR DOCTOR Y FECHA */}

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr auto', gap:12, alignItems:'flex-end' }}>
          <Field label="Doctor">
            <select value={filterDoctor} onChange={e=>setFilterDoctor(e.target.value)} style={{ width:'100%' }}>
              <option value="todos">📋 Todos los doctores</option>
              {[...new Set(COBROS_DATA.filter(c=>c.doctor).map(c=>c.doctor))].sort().map(doc => (
                <option key={doc} value={doc}>{doc}</option>
              ))}
            </select>
          </Field>
          <Field label="Desde (fecha)">
            <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{ width:'100%' }} />
          </Field>
          <Field label="Hasta (fecha)">
            <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{ width:'100%' }} />
          </Field>
          <button onClick={()=>{setFilterDoctor('todos');setFilterDateFrom('');setFilterDateTo('');}} style={{ padding:'12px 20px', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-md)', color:'var(--text-secondary)', cursor:'pointer', fontSize:13, fontWeight:700 }}>🔄 Limpiar</button>
        </div>
      </SubSection>

      {/* STATS SEPARADOS POR MONEDA */}
      {(() => {
        const allCobros = [...COBROS_DATA, ...archivedFromProduccion];
        const cobradomxn = allCobros.filter(c=>c.metodo!=='pendiente'&&c.orden&&c.moneda==='MXN').reduce((s,c)=>s+c.monto,0);
        const cobradousd = allCobros.filter(c=>c.metodo!=='pendiente'&&c.orden&&c.moneda==='USD').reduce((s,c)=>s+c.monto,0);
        const pendientemxn = allCobros.filter(c=>c.metodo==='pendiente'&&c.moneda==='MXN').reduce((s,c)=>s+c.monto,0);
        const pendienteusd = allCobros.filter(c=>c.metodo==='pendiente'&&c.moneda==='USD').reduce((s,c)=>s+c.monto,0);

        return (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))', gap:12, marginBottom:20 }}>
            <div style={{ background:'linear-gradient(135deg, #10B98108, transparent)', border:'1px solid #10B98130', borderRadius:'var(--radius-lg)', padding:'18px 22px' }}>
              <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:6, fontWeight:600 }}>💰 Cobrado en MXN</div>
              <div style={{ fontSize:28, fontWeight:900, color:'var(--success)' }}>{'$'+cobradomxn.toLocaleString()}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:8 }}>Pagos completados</div>
            </div>

            <div style={{ background:'linear-gradient(135deg, #F8751308, transparent)', border:'1px solid #F8751330', borderRadius:'var(--radius-lg)', padding:'18px 22px' }}>
              <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:6, fontWeight:600 }}>💵 Cobrado en USD</div>
              <div style={{ fontSize:28, fontWeight:900, color:'var(--info)' }}>{'$'+cobradousd.toLocaleString()}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:8 }}>Pagos completados</div>
            </div>

            <div style={{ background:'linear-gradient(135deg, #FBBF2408, transparent)', border:'1px solid #FBBF2430', borderRadius:'var(--radius-lg)', padding:'18px 22px' }}>
              <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:6, fontWeight:600 }}>⏳ Pendiente MXN</div>
              <div style={{ fontSize:28, fontWeight:900, color:'var(--warning)' }}>{'$'+pendientemxn.toLocaleString()}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:8 }}>Esperando pago</div>
            </div>

            <div style={{ background:'linear-gradient(135deg, #FBBF2408, transparent)', border:'1px solid #FBBF2430', borderRadius:'var(--radius-lg)', padding:'18px 22px' }}>
              <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:6, fontWeight:600 }}>⏳ Pendiente USD</div>
              <div style={{ fontSize:28, fontWeight:900, color:'var(--warning)' }}>{'$'+pendienteusd.toLocaleString()}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:8 }}>Esperando pago</div>
            </div>
          </div>
        );
      })()}

      {/* LISTA FILTRADA DE DEUDAS */}
      {(() => {
        const allCobros = [...COBROS_DATA, ...archivedFromProduccion];
        const uniqueDoctors = [...new Set(allCobros.filter(c=>c.doctor).map(c=>c.doctor))].sort();

        // Actualizar opciones de doctor en el select
        const filtered = allCobros.filter(c => {
          const doctorMatch = filterDoctor === 'todos' || c.doctor === filterDoctor;
          const dateMatch = !filterDateFrom && !filterDateTo ? true : true;
          return doctorMatch && dateMatch;
        });

        return (
          <div>
            <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:12, fontWeight:600, paddingLeft:20 }}>
              📊 Mostrando {filtered.length} de {allCobros.length} registros
              {archivedFromProduccion.length > 0 && <span style={{ color:'var(--success)', marginLeft:8 }}>({archivedFromProduccion.length} desde Producción)</span>}
            </div>
            {filtered.length === 0 ? (
              <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:40, textAlign:'center', border:'1px solid var(--border-subtle)' }}>
                <div style={{ fontSize:40, marginBottom:12 }}>🔍</div>
                <div style={{ fontSize:15, fontWeight:700, color:'var(--text-secondary)' }}>No hay deudas que coincidan</div>
                <div style={{ fontSize:13, color:'var(--text-muted)', marginTop:4 }}>Intenta cambiar los filtros de doctor o fecha</div>
              </div>
            ) : (
              <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', overflow:'hidden', border:'1px solid var(--border-subtle)' }}>
                {filtered.map((c,i) => (
                  <div key={c.orden||'archived-'+i} style={{ display:'flex', alignItems:'center', padding:'16px 20px', borderBottom:i < filtered.length-1 ? '1px solid var(--border-subtle)' : 'none', gap:16, background:(!c.orden || c.estado==='completado')?'rgba(34,197,94,0.03)':'transparent' }}>
                    <div style={{ width:4, height:36, borderRadius:2, background:c.estado==='completado'?'var(--success)':c.metodo==='efectivo'?'var(--success)':c.metodo==='tarjeta'?'var(--info)':'var(--danger)', flexShrink:0 }} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:c.orden?'var(--mod-ordenes)':'var(--success)', display:'flex', alignItems:'center', gap:8 }}>
                        {c.orden||'📦 DESDE PRODUCCIÓN'}
                        {c.estado==='completado' && <span style={{ fontSize:12, fontWeight:600, color:'var(--success)', background:'rgba(34,197,94,0.15)', padding:'2px 8px', borderRadius:'4px' }}>✅ Completado</span>}
                      </div>
                      <div style={{ fontSize:13, color:'var(--text-muted)' }}>{c.doctor||'Desconocido'} — {c.paciente||'Sin paciente'}</div>
                      {c.fechaArchivado && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>📦 Archivado: {c.fechaArchivado}</div>}
                    </div>
                    <div style={{ fontSize:13, color:'var(--text-secondary)' }}>{c.trabajo||'—'}</div>
                    <div style={{ fontSize:16, fontWeight:800 }}>${c.monto.toLocaleString()} {c.moneda}</div>
                    <Badge color={c.estado==='completado'?'var(--success)':c.metodo==='efectivo'?'var(--success)':c.metodo==='tarjeta'?'var(--info)':'var(--danger)'}>{c.estado==='completado'?'✅ Completado':c.metodo==='efectivo'?'💵 Efectivo':c.metodo==='tarjeta'?'💳 Tarjeta':'⏳ Pendiente'}</Badge>
                    <span style={{ fontSize:16 }}>{c.nota_firmada?'📄✅':'📄❌'}</span>
                    <span style={{ fontSize:16 }}>{c.confirmado?'✅':'⚠️'}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

];

function LabExternoModule() {
  const [view, setView] = useState('list');
  const TIPOS_EXTERNOS = ['Fresado', 'Sinterizado', 'Corona externa (emergencia)'];
  const [trabajos, setTrabajos] = useState([
    { id: 1, orden: 'ZL-0001', tipo: 'Fresado', estatus: 'en-proceso', asignado: 'Kevin', fecha: '2026-05-28' },
    { id: 2, orden: 'ZL-0005', tipo: 'Sinterizado', estatus: 'en-proceso', asignado: 'Aram', fecha: '2026-05-27' },
    { id: 3, orden: 'ZL-0007', tipo: 'Corona externa (emergencia)', estatus: 'pendiente', asignado: 'Montserrat', fecha: '2026-05-26' },
  ]);
  const [nuevoTipo, setNuevoTipo] = useState('Fresado');

  useEffect(() => {
    const labExternoList = JSON.parse(localStorage.getItem('labExternoSinterizado') || '[]');
    if (labExternoList.length > 0) {
      const newTrabajos = labExternoList.map((item, idx) => ({
        id: Math.max(...trabajos.map(t=>t.id), 0) + idx + 1,
        orden: item.orden,
        tipo: 'Sinterizado',
        estatus: 'pendiente',
        asignado: 'Asignar',
        fecha: item.fechaEntrega || new Date(Date.now()+2*86400000).toISOString().split('T')[0]
      }));
      setTrabajos([...trabajos, ...newTrabajos]);
      localStorage.removeItem('labExternoSinterizado');
    }
  }, []);

  const markComplete = (id) => {
    setTrabajos(trabajos.map(t => t.id === id ? { ...t, estatus: 'terminado' } : t));
    alert('✅ Trabajo marcado como terminado');
  };

  const addNuevo = () => {
    const newId = Math.max(...trabajos.map(t=>t.id), 0) + 1;
    setTrabajos([...trabajos, { id: newId, orden: `ZL-${String(newId).padStart(4,'0')}`, tipo: nuevoTipo, estatus: 'pendiente', asignado: 'Asignar', fecha: new Date(Date.now()+2*86400000).toISOString().split('T')[0] }]);
    alert('✅ Trabajo agregado');
  };

  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Lab Externo" subtitle="Fresado, sinterizado y coronas de emergencia" color="var(--mod-lab)" icon="🔬" />

      {view === 'list' && (
        <div>
          <InfoCard icon="📌" title="Tipos de trabajo externo" description="Fresado (zirconia), Sinterizado (para casos urgentes) y Corona externa (emergencia)." color="var(--mod-lab)" />
          <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:20, marginBottom:20 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 150px', gap:12, alignItems:'flex-end' }}>
              <select value={nuevoTipo} onChange={e=>setNuevoTipo(e.target.value)}>
                {TIPOS_EXTERNOS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <Btn onClick={addNuevo}>+ Agregar trabajo</Btn>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 12 }}>
            {trabajos.map(t => (
              <div key={t.id} style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius-lg)', padding: 20, borderLeft: `4px solid ${t.estatus === 'terminado' ? 'var(--success)' : 'var(--warning)'}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontSize: 16, fontWeight: 700 }}>{t.orden}</span>
                  <Badge color={t.estatus === 'terminado' ? 'var(--success)' : 'var(--warning)'}>{t.estatus}</Badge>
                </div>
                <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 4 }}>{t.tipo}</div>
                <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 12 }}>Asignado: {t.asignado} | Fecha: {t.fecha}</div>
                <button onClick={() => t.estatus !== 'terminado' && markComplete(t.id)}
                  disabled={t.estatus === 'terminado'}
                  style={{ width: '100%', padding: 12, background: t.estatus === 'terminado' ? 'var(--bg-input)' : 'var(--mod-lab)', color: t.estatus === 'terminado' ? 'var(--text-muted)' : '#fff', border: 'none', borderRadius: 'var(--radius-md)', cursor: t.estatus === 'terminado' ? 'default' : 'pointer', fontWeight: 700 }}>
                  {t.estatus === 'terminado' ? '✅ Terminado' : 'Marcar terminado'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

                  <input type="number" value={editValues.stock} onChange={e => setEditValues({...editValues, stock: Number(e.target.value)})} />
                  <input value={editValues.unidad} onChange={e => setEditValues({...editValues, unidad: e.target.value})} />
                  <button onClick={saveEdit} style={{ padding: 8, background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 700 }}>Guardar</button>
                </>
              ) : (
                <>
                  <span>{item.nombre}</span>
                  <span style={{ textAlign: 'center' }}>{item.stock}</span>
                  <span style={{ textAlign: 'center' }}>{item.unidad}</span>
                  <button onClick={() => handleEdit(item)} style={{ padding: 6, background: 'var(--accent-blue)', color: '#fff', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>Editar</button>
                </>
              )}
            </div>
          ))}
          <button onClick={() => alert('+ Agregar artículo a ' + cat.name)} style={{ width: '100%', padding: 12, background: 'var(--bg-input)', border: '1px dashed var(--border-medium)', borderRadius: 'var(--radius-md)', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 14, fontWeight: 600 }}>+ Agregar artículo</button>
        </SubSection>
      ))}
    </div>
  );
}

// TARIFAS — Lista de Precios Editable (Sincroniza con Cobros)
// ============================================================
function TarifasModule() {
  const [tarifas, setTarifas] = useState(() => {
    const saved = localStorage.getItem('tarifasPrecios');
    return saved ? JSON.parse(saved) : [
      { id: 1, tipo: 'Corona Zirconia', costoBase: 850, moneda: 'MXN' },
      { id: 2, tipo: 'Carilla', costoBase: 3000, moneda: 'MXN' },
      { id: 3, tipo: 'Puente (por unidad)', costoBase: 900, moneda: 'MXN' },
      { id: 4, tipo: 'Encerado diagnóstico (por unidad)', costoBase: 400, moneda: 'MXN' },
      { id: 5, tipo: 'Escaneo (Juan/Abril - por unidad)', costoBase: 10, moneda: 'MXN' },
      { id: 6, tipo: 'Fresado', costoBase: 500, moneda: 'MXN' },
      { id: 7, tipo: 'Metal', costoBase: 600, moneda: 'MXN' },
    ];
  });
  const [editingId, setEditingId] = useState(null);
  const [editValues, setEditValues] = useState({});
  const [nuevoTipo, setNuevoTipo] = useState('');
  const [nuevoCosto, setNuevoCosto] = useState('');

  const handleEdit = (tarifa) => {
    setEditingId(tarifa.id);
    setEditValues({ ...tarifa });
  };

  const saveEdit = () => {
    const actualizado = tarifas.map(t => t.id === editingId ? editValues : t);
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
    setEditingId(null);
  };

  const agregarTarifa = () => {
    if (!nuevoTipo.trim() || !nuevoCosto) { alert('Completa tipo y costo'); return; }
    const nueva = {
      id: Math.max(...tarifas.map(t=>t.id), 0) + 1,
      tipo: nuevoTipo,
      costoBase: Number(nuevoCosto),
      moneda: 'MXN'
    };
    const actualizado = [...tarifas, nueva];
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
    setNuevoTipo('');
    setNuevoCosto('');
    alert('✅ Tarifa agregada');
  };

  const eliminarTarifa = (id) => {
    const actualizado = tarifas.filter(t => t.id !== id);
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Tarifas" subtitle="Lista de precios editable — Se sincroniza con Cobros y Finanzas" color="var(--mod-finanzas)" icon="💰">
        <Btn onClick={() => alert('📊 Exportar tarifas')}>📥 Exportar</Btn>
      </SectionHeader>

      <SubSection title="Agregar nueva tarifa" color="var(--mod-finanzas)" description="Define el tipo de trabajo y su costo base">
        <div style={{ display:'grid', gridTemplateColumns:'1fr 150px 120px', gap:12, alignItems:'flex-end' }}>
          <Field label="Tipo de trabajo">
            <input value={nuevoTipo} onChange={e=>setNuevoTipo(e.target.value)} placeholder="Ej: Corona de emergencia" />
          </Field>
          <Field label="Costo base">
            <input type="number" value={nuevoCosto} onChange={e=>setNuevoCosto(e.target.value)} placeholder="$0" />
          </Field>
          <Btn onClick={agregarTarifa}>+ Agregar</Btn>
        </div>
      </SubSection>

      <SubSection title="Tarifas actuales" color="var(--mod-finanzas)" description={`${tarifas.length} tipos de trabajo configurados`}>
        <div style={{ display:'grid', gridTemplateColumns:'2fr 120px 100px 80px', gap:12, marginBottom:12, fontSize:12, fontWeight:700, color:'var(--text-muted)' }}>
          <div>Tipo de Trabajo</div><div>Costo Base</div><div>Moneda</div><div>Acciones</div>
        </div>
        {tarifas.map(tarifa => (
          <div key={tarifa.id} style={{ display:'grid', gridTemplateColumns:'2fr 120px 100px 80px', gap:12, alignItems:'center', padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', marginBottom:8, borderLeft:editingId===tarifa.id?'3px solid var(--mod-finanzas)':'3px solid transparent' }}>
            {editingId === tarifa.id ? (
              <>
                <input value={editValues.tipo} onChange={e=>setEditValues({...editValues, tipo:e.target.value})} />
                <input type="number" value={editValues.costoBase} onChange={e=>setEditValues({...editValues, costoBase:Number(e.target.value)})} />
                <select value={editValues.moneda} onChange={e=>setEditValues({...editValues, moneda:e.target.value})}>
                  <option value="MXN">MXN</option>
                  <option value="USD">USD</option>
                </select>
                <button onClick={saveEdit} style={{ padding:8, background:'var(--success)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontWeight:700, fontSize:13 }}>💾 Guardar</button>
              </>
            ) : (
              <>
                <span style={{ fontWeight:600 }}>{tarifa.tipo}</span>
                <span style={{ textAlign:'center', fontSize:14, fontWeight:700, color:'var(--mod-finanzas)' }}>${tarifa.costoBase.toLocaleString()}</span>
                <span style={{ textAlign:'center', fontSize:12 }}>{tarifa.moneda}</span>
                <div style={{ display:'flex', gap:4 }}>
                  <button onClick={()=>handleEdit(tarifa)} style={{ padding:6, background:'var(--mod-finanzas)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontSize:12, fontWeight:600, flex:1 }}>✏️</button>
                  <button onClick={()=>eliminarTarifa(tarifa.id)} style={{ padding:6, background:'var(--danger)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontSize:12, fontWeight:600, flex:1 }}>🗑️</button>
                </div>
              </>
            )}
          </div>
        ))}
      </SubSection>

      <InfoCard icon="ℹ️" title="¿Cómo funciona?" description="Estas tarifas se usan automáticamente en Cobros. Cuando registres un trabajo, selecciona la tarifa y aparecerá el costo. Todo es editable — puedes cambiar precios en cualquier momento sin afectar trabajos anteriores." color="var(--mod-finanzas)" />
    </div>
  );
}

// ============================================================
// NOTAS PARA IA — Auto-guardado y análisis
// ============================================================
function NotasIAModule() {
  const [nota, setNota] = useState('');
  const [historial, setHistorial] = useState(JSON.parse(localStorage.getItem('notasIA') || '[]'));
  const [analizando, setAnalizando] = useState(false);
  const [ultimaGuardada, setUltimaGuardada] = useState(new Date().toLocaleTimeString());

  useEffect(() => {
    if (!nota) return;
    const timer = setTimeout(() => {
      localStorage.setItem('notasEnEdicion', nota);
      setUltimaGuardada(new Date().toLocaleTimeString());
    }, 1000);
    return () => clearTimeout(timer);
  }, [nota]);

  const analizarConIA = () => {
    if (!nota.trim()) { alert('Escribe una nota primero'); return; }
    setAnalizando(true);
    setTimeout(() => {
      const nuevaNoIAta = {
        id: Date.now(),
        original: nota,
        analisis: `✅ Análisis IA (${new Date().toLocaleTimeString()}): ${nota.substring(0,50)}... [Procesada: suma, totales, recomendaciones detectadas]`,
        fecha: new Date().toLocaleDateString(),
        hora: new Date().toLocaleTimeString()
      };
      const actualizado = [nuevaNoIAta, ...historial];
      setHistorial(actualizado);
      localStorage.setItem('notasIA', JSON.stringify(actualizado));
      setNota('');
      setAnalizando(false);
      alert('✅ Nota analizada y guardada automáticamente');
    }, 1500);
  };

  const eliminarNota = (id) => {
    const actualizado = historial.filter(n => n.id !== id);
    setHistorial(actualizado);
    localStorage.setItem('notasIA', JSON.stringify(actualizado));
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Notas para IA" subtitle="Análisis automático y almacenamiento" color="#8B5CF6" icon="🤖" />

      <InfoCard icon="💾" title="Auto-guardado" description={`Última guardada: ${ultimaGuardada}`} color="#8B5CF6" />

      <SubSection title="Escribir nueva nota" color="#8B5CF6">
        <textarea
          value={nota}
          onChange={e => setNota(e.target.value)}
          placeholder="Escribe aquí... (se guarda automáticamente en 1 segundo)"

    if (!loginEmail || !loginEmail.includes('@')) {

          <label style={{ fontSize:13, fontWeight:700, color:'var(--text-secondary)', display:'block', marginBottom:8 }}>Inicia con tu email (Gmail):</label>

function ConfigModule() {
  const [cfg, setCfg] = useState({ tecnicos:'Rafael, Montserrat, Aram, Fidel', viaticos_semanal:500, pagador:'Papá', retencion_pct:10, precio_maquila:350, tc_usd:17.5 });

          <input ref={fileRef} type="file" accept="image/*" onChange={handleFileChange} style={{ display:'none' }} />

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px' }}>

          <Field label="Viáticos semanales ($MXN)"><input type="number" value={cfg.viaticos_semanal} onChange={e=>updateCfg('viaticos_semanal',Number(e.target.value))} /></Field>

// LOGIN
// ============================================================
function LoginScreen({ onLogin, onDoctorLogin }) {
  const [selectedUser, setSelectedUser] = useState(null);
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');

  const handlePin = (digit) => {
    if (pin.length >= 4) return;
    const newPin = pin + digit;
    setPin(newPin);
    setError('');
    if (newPin.length === 4) {
      if (selectedUser && selectedUser.pin === newPin) onLogin(selectedUser);
      else { setError('PIN incorrecto'); setTimeout(() => setPin(''), 400); }
    }
  };
  const clearPin = () => { setPin(''); setError(''); };

  return (
    <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--bg-primary)' }}>
      <div style={{ width:400, textAlign:'center', animation:'fadeIn 0.4s' }}>
        <LogoPlaceholder size="lg" />
        <div style={{ fontSize:26, fontWeight:900, letterSpacing:'1px', marginTop:16, marginBottom:4 }}>ZERA LAB</div>
        <div style={{ fontSize:14, color:'var(--text-muted)', marginBottom:32, letterSpacing:'2px' }}>SISTEMA DE GESTIÓN</div>

        <div style={{ marginBottom:28 }}>
          <div style={{ fontSize:14, color:'var(--text-secondary)', marginBottom:16 }}>Ingresa tu PIN</div>
        </div>

        {!selectedUser && (
          <div>
            <div style={{ fontSize:14, color:'var(--text-secondary)', marginBottom:16 }}>Selecciona tu nombre</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {USERS.map(u => (
                <button key={u.id} onClick={() => setSelectedUser(u)} style={{
                  padding:'16px', borderRadius:'var(--radius-md)', background:'var(--bg-card)', border:'1px solid var(--border-subtle)',
                  cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:12, textAlign:'left',
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent-blue)';e.currentTarget.style.background='var(--bg-card-hover)';e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(91, 141, 239, 0.2)'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border-subtle)';e.currentTarget.style.background='var(--bg-card)';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none'}}
                >
                  <div style={{ width:44, height:44, borderRadius:'50%', background:'linear-gradient(135deg, var(--accent-blue), #3A5BA0)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:800, color:'#fff', flexShrink:0 }}>{u.avatar}</div>
                  <div><div style={{ fontSize:15, fontWeight:700, color:'var(--text-primary)' }}>{u.name}</div></div>
                </button>
              ))}
            </div>
          </div>
        )}

        {selectedUser && (
          <div style={{ animation:'fadeIn 0.3s' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:12, marginBottom:20 }}>
              <div style={{ width:52, height:52, borderRadius:'50%', background:'linear-gradient(135deg, var(--accent-blue), #3A5BA0)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:800, color:'#fff' }}>{selectedUser.avatar}</div>
              <div style={{ textAlign:'left' }}><div style={{ fontSize:18, fontWeight:700 }}>{selectedUser.name}</div></div>
              <button onClick={()=>{setSelectedUser(null);setPin('');setError('')}} style={{ marginLeft:8, background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:20 }}>×</button>
            </div>

            <div style={{ fontSize:14, color:'var(--text-secondary)', marginBottom:16 }}>Ingresa tu PIN</div>
            <div style={{ display:'flex', gap:14, justifyContent:'center', marginBottom:8 }}>
              {[0,1,2,3].map(i => <div key={i} style={{ width:18, height:18, borderRadius:'50%', background:pin.length>i?'var(--accent-blue)':'var(--border-medium)', transition:'all 0.15s', boxShadow:pin.length>i?'0 0 8px var(--accent-blue-glow)':'none' }} />)}
            </div>
            {error && <div style={{ fontSize:13, color:'var(--danger)', marginBottom:8 }}>{error}</div>}

            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, marginTop:20 }}>
              {[[1,2,3],[4,5,6],[7,8,9]].map((row,ri) => (
                <div key={ri} style={{ display:'flex', gap:16 }}>
                  {row.map(d => (
                    <button key={d} onClick={() => handlePin(String(d))} style={{ width:72, height:72, borderRadius:'50%', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)', fontSize:26, fontWeight:700, cursor:'pointer', transition:'all 0.15s' }}
                      onMouseEnter={e=>{e.currentTarget.style.background='var(--bg-card-hover)';e.currentTarget.style.borderColor='var(--accent-blue)'}}
                      onMouseLeave={e=>{e.currentTarget.style.background='var(--bg-card)';e.currentTarget.style.borderColor='var(--border-subtle)'}}
                    >{d}</button>
                  ))}
                </div>
              ))}
              <div style={{ display:'flex', gap:16 }}>
                <div style={{ width:72 }}></div>
                <button onClick={() => handlePin('0')} style={{ width:72, height:72, borderRadius:'50%', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)', fontSize:26, fontWeight:700, cursor:'pointer' }}>0</button>
                <button onClick={clearPin} style={{ width:72, height:72, borderRadius:'50%', background:'transparent', border:'1px solid var(--border-subtle)', color:'var(--text-muted)', fontSize:18, cursor:'pointer' }}>⌫</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================
function Dashboard({ currentUser, onNavigate }) {
  const role = ROLE_DASHBOARD[currentUser.id] || { stats:[], greeting:'Bienvenido' };
  const [checkedIn, setCheckedIn] = useState(false);
  const [selectedOrder, setSelectedOrder] = useState(null);

  const handleCheckin = () => {
    setCheckedIn(true);
    setTimeout(() => alert(`✅ Check-in registrado para ${currentUser.name} a las ${new Date().toLocaleTimeString()}`), 100);
  };

  const recentOrders = SAMPLE_ORDERS.slice(0, 3);

  if (selectedOrder) {
    return (
      <OrdenDetalleExpanded
        orden={selectedOrder}
        onDuplicate={() => {
          alert(`✅ Orden duplicada: ${selectedOrder.numero}`);
          setSelectedOrder(null);
        }}
        onBack={() => setSelectedOrder(null)}
      />
    );
  }

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ background:'linear-gradient(135deg, var(--accent-blue-soft) 0%, transparent 60%)', borderRadius:'var(--radius-lg)', padding:'28px 32px', marginBottom:24, borderLeft:'4px solid var(--accent-blue)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <h1 style={{ fontSize:28, fontWeight:900, marginBottom:4 }}>Hola, {currentUser.name}</h1>
          <p style={{ fontSize:16, color:'var(--text-secondary)' }}>{role.greeting}</p>
        </div>
        <button onClick={handleCheckin} style={{
          padding:'16px 24px', borderRadius:'var(--radius-lg)', background:checkedIn?'var(--success)':'var(--mod-checkin)', color:'#fff', border:'none', cursor:'pointer', fontSize:15, fontWeight:700, whiteSpace:'nowrap'
        }}>
          {checkedIn ? '✅ Check-in OK' : '📍 Check-in ahora'}
        </button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14, marginBottom:24 }}>
        {SAMPLE_STATS.filter((_,i) => i < role.stats.length).map((s,i) => (
          <div key={i} style={{ background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', padding:'20px 24px', borderLeft:`4px solid ${s.color}` }}>
            <div style={{ fontSize:13, color:'var(--text-muted)', fontWeight:500, marginBottom:6 }}>{s.label}</div>
            <div style={{ fontSize:32, fontWeight:900, color:s.color }}>{s.value}</div>
            {s.change && <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>{s.change}</div>}
          </div>
        ))}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:16, marginBottom:24 }}>
        <div>
          <div style={{ fontSize:16, fontWeight:700, marginBottom:14 }}>Órdenes recientes</div>
          <div style={{ background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', overflow:'hidden' }}>
            {recentOrders.map((o, i) => {
              const st = STATUS_MAP[o.estatus];
              const daysLeft = Math.ceil((new Date(o.fecha_entrega) - new Date()) / 86400000);
              return (
                <div key={o.id} onClick={() => setSelectedOrder(o)} style={{
                  display:'flex', alignItems:'center', padding:'16px 20px', borderBottom:i<recentOrders.length-1?'1px solid var(--border-subtle)':'none',
                  cursor:'pointer', transition:'background 0.1s'
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-card-hover)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                >
                  <div style={{ width:4, height:40, borderRadius:2, background:st.color, flexShrink:0, marginRight:12 }} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700, marginBottom:2 }}>{o.numero}</div>
                    <div style={{ fontSize:12, color:'var(--text-muted)' }}>{o.doctor.nombre}</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:13, fontWeight:700, color: daysLeft<=0?'var(--danger)':daysLeft<=3?'var(--warning)':'var(--text-secondary)' }}>
                      {daysLeft>0?`${daysLeft}d`:'VENCIDO'}
                    </div>
                    <Badge color={st.color} bg={st.bg}>{st.label}</Badge>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div>
          <div style={{ fontSize:16, fontWeight:700, marginBottom:14 }}>Accesos rápidos</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {MODULES.filter(m => (ROLE_MODULES[currentUser.id]||[]).includes(m.id) && m.id !== 'dashboard').slice(0,4).map(m => (
              <button key={m.id} onClick={()=>onNavigate(m.id)} style={{
                padding:'14px 16px', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)',
                cursor:'pointer', textAlign:'left', transition:'all 0.15s', borderLeft:`4px solid ${m.color}`, display:'flex', gap:10, alignItems:'center'
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=m.color;e.currentTarget.style.background='var(--bg-card-hover)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border-subtle)';e.currentTarget.style.background='var(--bg-card)'}}
              >
                <span style={{ fontSize:18 }}>{m.icon}</span>
                <span style={{ fontSize:13, fontWeight:700 }}>{m.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

    </div>
  );
}

      <nav style={{ flex:1, overflowY:'auto', padding:8 }}>
        {filteredModules.map(m => {
          const active = activeModule === m.id;
          return (
            <button key={m.id} onClick={() => onSelect(m.id)} style={{
              width:'100%', display:'flex', alignItems:'center', gap:12,
              padding: collapsed ? '12px 0' : '12px 14px',
              justifyContent: collapsed ? 'center' : 'flex-start',
              borderRadius:'var(--radius-md)', border:'none', cursor:'pointer', transition:'all 0.15s', marginBottom:2,
              background: active ? `${m.color}18` : 'transparent',
              borderLeft: active ? `3px solid ${m.color}` : '3px solid transparent',
              color: active ? m.color : 'var(--text-secondary)',
            }}
              onMouseEnter={e => { if(!active) e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
              onMouseLeave={e => { if(!active) e.currentTarget.style.background = 'transparent'; }}
            >
              <span style={{ fontSize:collapsed?20:18, width:collapsed?'auto':24, textAlign:'center' }}>{m.icon}</span>
              {!collapsed && <span style={{ fontSize:14, fontWeight:active?700:500 }}>{m.label}</span>}
            </button>
          );
        })}
      </nav>
      <button onClick={onToggle} style={{ padding:14, borderTop:'1px solid var(--border-subtle)', background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:16 }}>
        {collapsed ? '→' : '← Colapsar'}
      </button>
    </aside>
  );
}

// HEADER
// ============================================================
function Header({ module, currentUser, onLogout }) {
  return (
    <header style={{ height:60, borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', background:'var(--bg-secondary)', flexShrink:0 }}>
      <div>
        <h1 style={{ fontSize:18, fontWeight:800, color: module.color || 'var(--text-primary)' }}>{module.icon} {module.label}</h1>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ textAlign:'right' }}><div style={{ fontSize:14, fontWeight:600 }}>{currentUser.name}</div><div style={{ fontSize:11, color:'var(--text-muted)' }}>{currentUser.role}</div></div>
        <button onClick={onLogout} style={{ padding:'8px 14px', borderRadius:'var(--radius-md)', background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)', color:'var(--danger)', cursor:'pointer', fontSize:13, fontWeight:600 }}>Salir</button>
      </div>
    </header>
  );
}

// ============================================================
// DOCTOR PORTAL (standalone)
// ============================================================
function DoctorPortal({ doctor, onLogout }) {
  const [tab, setTab] = useState('inicio');
  const [scanForm, setScanForm] = useState({ paciente:'', fecha:'', hora:'', notas:'' });
  const [scanHistory, setScanHistory] = useState([
    { id:1, paciente:'Carlos Méndez', fecha:'2026-05-23', hora:'10:00', estado:'confirmado' },
    { id:2, paciente:'Laura Vega', fecha:'2026-05-28', hora:'15:30', estado:'pendiente' },
  ]);

  const ordenes = [
    { orden:'ZL-0001', paciente:'María García', trabajo:'Corona Zirconia ×2', estatus:'En proceso', fecha:'27 May' },
    { orden:'ZL-0005', paciente:'Carlos Jiménez', trabajo:'Encerado dx ×8', estatus:'Recibido', fecha:'02 Jun' },
  ];
  const pagos = [
    { paciente:'María García', trabajo:'Corona Zirconia ×2', monto:8500, pagado:0 },
    { paciente:'Carlos Jiménez', trabajo:'Encerado dx ×8', monto:6400, pagado:0 },
    { paciente:'Anterior', trabajo:'Corona M-P ×3', monto:7500, pagado:7500 },
  ];
  const saldoPendiente = pagos.reduce((s,p)=>s+(p.monto-p.pagado),0);

  const submitScan = () => {
    if (!scanForm.paciente || !scanForm.fecha) { alert('Llena paciente y fecha'); return; }
    setScanHistory([...scanHistory, { id:Date.now(), ...scanForm, estado:'pendiente' }]);
    setScanForm({ paciente:'', fecha:'', hora:'', notas:'' });
    alert('Solicitud de escaneo enviada — el equipo la revisará');
  };

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg-primary)' }}>
      <div style={{ background:'var(--mod-doctores)', padding:'20px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <LogoPlaceholder size="sm" />
          <div><div style={{ fontSize:20, fontWeight:900, color:'#fff' }}>ZERA LAB</div><div style={{ fontSize:13, color:'rgba(255,255,255,0.8)' }}>{doctor.nombre}</div></div>
        </div>
        <button onClick={onLogout} style={{ padding:'8px 16px', borderRadius:'var(--radius-md)', background:'rgba(255,255,255,0.15)', border:'none', color:'#fff', cursor:'pointer', fontSize:13, fontWeight:600 }}>Salir</button>
      </div>

      <div style={{ display:'flex', borderBottom:'1px solid var(--border-subtle)', background:'var(--bg-secondary)' }}>
        {[['inicio','Inicio'],['ordenes','Mis órdenes'],['escaneo','Solicitar escaneo'],['pagos','Mis pagos']].map(([k,l]) => (
          <button key={k} onClick={()=>setTab(k)} style={{ flex:1, padding:'14px', border:'none', borderBottom:tab===k?`3px solid var(--mod-doctores)`:'3px solid transparent', background:'transparent', color:tab===k?'var(--mod-doctores)':'var(--text-muted)', cursor:'pointer', fontSize:14, fontWeight:tab===k?700:400 }}>{l}</button>
        ))}
      </div>

      <div style={{ maxWidth:700, margin:'24px auto', padding:'0 16px' }}>
        {tab === 'inicio' && (
          <div>
            <div style={{ background:`var(--mod-doctores)15`, borderRadius:'var(--radius-lg)', padding:24, marginBottom:20, borderLeft:`4px solid var(--mod-doctores)` }}>
              <h2 style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>Bienvenido, {doctor.nombre}</h2>
              <p style={{ fontSize:14, color:'var(--text-secondary)' }}>Tienes {ordenes.length} casos activos y un saldo pendiente de ${saldoPendiente.toLocaleString()}</p>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:20, borderLeft:'4px solid var(--mod-ordenes)' }}><div style={{ fontSize:28, fontWeight:900, color:'var(--mod-ordenes)' }}>{ordenes.length}</div><div style={{ fontSize:14, color:'var(--text-muted)' }}>Casos activos</div></div>
              <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:20, borderLeft:'4px solid var(--danger)' }}><div style={{ fontSize:28, fontWeight:900, color:'var(--danger)' }}>${saldoPendiente.toLocaleString()}</div><div style={{ fontSize:14, color:'var(--text-muted)' }}>Saldo pendiente</div></div>
            </div>
          </div>
        )}

        {tab === 'ordenes' && (
          <div>
            <h2 style={{ fontSize:20, fontWeight:800, marginBottom:16 }}>Mis órdenes</h2>
            {ordenes.map((o,i) => (
              <div key={i} style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:18, marginBottom:10, borderLeft:`4px solid ${o.estatus==='En proceso'?'var(--warning)':'var(--info)'}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span style={{ fontSize:16, fontWeight:700 }}>{o.paciente}</span>
                  <Badge color={o.estatus==='En proceso'?'var(--warning)':'var(--info)'}>{o.estatus}</Badge>
                </div>
                <div style={{ fontSize:14, color:'var(--text-secondary)' }}>{o.trabajo}</div>
                <div style={{ fontSize:13, color:'var(--text-muted)', marginTop:4 }}>Entrega estimada: {o.fecha}</div>
              </div>
            ))}
          </div>
        )}

        {tab === 'escaneo' && (
          <div>
            <h2 style={{ fontSize:20, fontWeight:800, marginBottom:16 }}>Solicitar escaneo</h2>
            <div style={{ background:'var(--bg-card)', borderRadius:'var(--radius-lg)', padding:20, marginBottom:20, border:'1px solid var(--border-subtle)' }}>
              <Field label="Nombre del paciente"><input value={scanForm.paciente} onChange={e=>setScanForm({...scanForm,paciente:e.target.value})} placeholder="Ej: Juan Pérez" /></Field>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <Field label="Fecha del escaneo"><input type="date" value={scanForm.fecha} onChange={e=>setScanForm({...scanForm,fecha:e.target.value})} /></Field>
                <Field label="Hora preferida"><input type="time" value={scanForm.hora} onChange={e=>setScanForm({...scanForm,hora:e.target.value})} /></Field>
              </div>
              <Field label="Notas adicionales"><textarea value={scanForm.notas} onChange={e=>setScanForm({...scanForm,notas:e.target.value})} rows={2} placeholder="Indicaciones especiales..." /></Field>
              <button onClick={submitScan} style={{ width:'100%', padding:14, background:'var(--mod-doctores)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:15, fontWeight:700 }}>Enviar solicitud de escaneo</button>
            </div>
            <h3 style={{ fontSize:16, fontWeight:700, marginBottom:10 }}>Historial de solicitudes</h3>
            {scanHistory.map(s => (
              <div key={s.id} style={{ background:'var(--bg-card)', borderRadius:'var(--radius-md)', padding:14, marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center', border:'1px solid var(--border-subtle)' }}>
                <div><div style={{ fontSize:14, fontWeight:600 }}>{s.paciente}</div><div style={{ fontSize:13, color:'var(--text-muted)' }}>{s.fecha} a las {s.hora || 'por confirmar'}</div></div>
                <Badge color={s.estado==='confirmado'?'var(--success)':'var(--warning)'}>{s.estado==='confirmado'?'✅ Confirmado':'⏳ Pendiente'}</Badge>
              </div>
            ))}
          </div>
        )}

        {tab === 'pagos' && (
          <div>
            <h2 style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>Mis pagos</h2>
            <p style={{ fontSize:14, color:'var(--text-muted)', marginBottom:16 }}>Saldo pendiente total: <strong style={{ color:'var(--danger)', fontSize:18 }}>${saldoPendiente.toLocaleString()}</strong></p>
            {pagos.map((p,i) => (
              <div key={i} style={{ background:'var(--bg-card)', borderRadius:'var(--radius-md)', padding:16, marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center', border:'1px solid var(--border-subtle)', borderLeft:`4px solid ${p.pagado>=p.monto?'var(--success)':'var(--danger)'}` }}>
                <div><div style={{ fontSize:14, fontWeight:600 }}>{p.paciente}</div><div style={{ fontSize:13, color:'var(--text-muted)' }}>{p.trabajo}</div></div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:18, fontWeight:800, color:p.pagado>=p.monto?'var(--success)':'var(--danger)' }}>${(p.monto-p.pagado).toLocaleString()}</div>
                  <div style={{ fontSize:12, color:'var(--text-muted)' }}>{p.pagado>=p.monto?'Pagado':'Pendiente'}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [session, setSession] = useState(null);
  const [doctors, setDoctors] = useState(SAMPLE_DOCTORS); // null | {type:'team',user} | {type:'doctor',doctor}
  const [activeModule, setActiveModule] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [currentDoctor, setCurrentDoctor] = useState(null); // Para el portal de doctores (login interno)

  const handleLogin = (user) => setSession({ type: 'team', user });
  const handleDoctorLogin = (doctor) => setSession({ type: 'doctor', doctor });
  const handleLogout = () => { setSession(null); setActiveModule('dashboard'); };

  if (!session) return <LoginScreen onLogin={handleLogin} onDoctorLogin={handleDoctorLogin} />;
  if (session.type === 'doctor') return <DoctorPortal doctor={session.doctor} onLogout={handleLogout} />;

  const currentUser = session.user;
  const mod = MODULES.find(m => m.id === activeModule) || MODULES[0];

  const renderContent = () => {
    switch(activeModule) {
      case 'dashboard': return <Dashboard currentUser={currentUser} onNavigate={setActiveModule} />;
      case 'ordenes': return <OrdenesModule />;
      case 'produccion': return <ProduccionIntegradaModule />;
      // case 'evidencia': REMOVIDO - integrado en Producción
      case 'checkin': return <CheckinModule currentUser={currentUser} />;
      case 'mensajeria': return <MensajeriaModule />;
      case 'cobros': return <CobrosModule />;
      case 'lab-externo': return <LabExternoModule />;
      case 'inventario': return <InventarioModule />;
      case 'tarifas': return <TarifasModule />;
      case 'config-ia': return <ConfiguracionIAModule />;
      case 'finanzas': return <FinanzasModule currentUser={currentUser} />;
      case 'notas-ia': return <NotasIAModule currentUser={currentUser} />;
      case 'nomina': return <NominaModule />;
      case 'corte': return <CorteModule />;
      case 'doctores': return currentDoctor ? <PortalDoctoresPersonalModule currentUser={currentDoctor} /> : <PortalDoctoresLoginModule currentUser={currentDoctor} setCurrentUser={setCurrentDoctor} />;
      case 'config': return <ConfigModule />;
      default: return <Dashboard currentUser={currentUser} onNavigate={setActiveModule} />;
    }
  };

  return (
    <div style={{ display:'flex', height:'100vh' }}>
      <Sidebar activeModule={activeModule} onSelect={setActiveModule} collapsed={collapsed} onToggle={() => setCollapsed(!collapsed)} currentUser={currentUser} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Header module={mod} currentUser={currentUser} onLogout={handleLogout} />
        <main style={{ flex:1, overflow:'auto', padding:28 }}>{renderContent()}</main>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
