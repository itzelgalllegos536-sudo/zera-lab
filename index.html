<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// SUPABASE INTEGRATION
// ============================================================
// SUPABASE & API CONFIGURATION
const SUPABASE_URL = 'https://amsfcyosfusysywkwbah.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtc2ZjeW9zZnVzeXN5d2t3YmFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTk2NTcsImV4cCI6MjA5NTMzNTY1N30.2il14ENOoHwjvcLH7XihnfPpla2iA9jJogZnF5MbAK0';

// ANTHROPIC API
// La API key vive como variable de entorno en Netlify (ANTHROPIC_API_KEY).
// Todas las llamadas a Claude pasan por /.netlify/functions/claude-proxy
// para mantener la key fuera del navegador.

let supabaseClient = null;
let supabaseReadyPromise = null;

function initSupabase() {
  if (supabaseClient) return supabaseClient;
  if (!window.supabase) return null;
  const { createClient } = window.supabase;
  supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    realtime: { params: { eventsPerSecond: 5 } }
  });
  return supabaseClient;
}

// Espera asíncrona hasta que el SDK de Supabase esté disponible (max 5s)
function ensureSupabase() {
  if (supabaseClient) return Promise.resolve(supabaseClient);
  if (supabaseReadyPromise) return supabaseReadyPromise;
  supabaseReadyPromise = new Promise((resolve) => {
    let intentos = 0;
    const check = () => {
      if (window.supabase) {
        resolve(initSupabase());
      } else if (intentos++ < 50) { // 50 * 100ms = 5s
        setTimeout(check, 100);
      } else {
        resolve(null);
      }
    };
    check();
  });
  return supabaseReadyPromise;
}

// ============================================================
// DataService — Capa única de acceso a datos
// ============================================================
// Patrón: SIEMPRE intentar Supabase primero. Si falla, usar localStorage.
// Cuando vuelve la conexión, sincronizar.
// ============================================================

const DB = (() => {
  const cacheKey = (entity) => `cache_${entity}`;
  const pendingKey = (entity) => `pending_${entity}`;

  const getCache = (entity) => {
    try { return JSON.parse(localStorage.getItem(cacheKey(entity)) || '[]'); }
    catch { return []; }
  };
  const setCache = (entity, data) => {
    try { localStorage.setItem(cacheKey(entity), JSON.stringify(data)); }
    catch {}
  };

  const addPending = (entity, action) => {
    const list = JSON.parse(localStorage.getItem(pendingKey(entity)) || '[]');
    list.push({ ...action, _pendingAt: Date.now() });
    localStorage.setItem(pendingKey(entity), JSON.stringify(list));
  };

  const flushPending = async (entity, table) => {
    const list = JSON.parse(localStorage.getItem(pendingKey(entity)) || '[]');
    if (list.length === 0) return;
    const sb = await ensureSupabase();
    if (!sb) return;
    for (const action of list) {
      try {
        if (action.op === 'insert') await sb.from(table).insert(action.data);
        else if (action.op === 'update') await sb.from(table).update(action.data).eq('id', action.id);
        else if (action.op === 'delete') await sb.from(table).delete().eq('id', action.id);
      } catch (e) {
        console.warn('Flush pending failed:', e);
        return; // dejar para próximo intento
      }
    }
    localStorage.removeItem(pendingKey(entity));
  };

  // ---- Generic CRUD ----
  const list = async (table, opts = {}) => {
    const sb = await ensureSupabase();
    if (sb) {
      try {
        let q = sb.from(table).select('*');
        if (opts.orderBy) q = q.order(opts.orderBy, { ascending: opts.ascending !== false });
        if (opts.filter) {
          for (const [k, v] of Object.entries(opts.filter)) q = q.eq(k, v);
        }
        if (opts.limit) q = q.limit(opts.limit);
        const { data, error } = await q;
        if (!error && data) {
          setCache(table, data);
          await flushPending(table, table);
          return data;
        }
      } catch (e) { console.warn(`list ${table} fail:`, e.message); }
    }
    return getCache(table);
  };

  const upsert = async (table, row, opts = {}) => {
    const sb = await ensureSupabase();
    if (sb) {
      try {
        const { data, error } = await sb.from(table).upsert(row, { onConflict: opts.onConflict || 'id' }).select();
        if (!error && data) {
          const cached = getCache(table);
          const merged = [...cached.filter(c => c.id !== row.id), ...data];
          setCache(table, merged);
          return data[0];
        }
      } catch (e) { console.warn(`upsert ${table} fail:`, e.message); }
    }
    // Offline: guardar en cache + pending
    const cached = getCache(table);
    const updated = row.id ? cached.map(c => c.id === row.id ? row : c) : [row, ...cached];
    if (!row.id) row.id = Date.now();
    if (!cached.some(c => c.id === row.id)) updated.unshift(row);
    setCache(table, updated);
    addPending(table, { op: 'insert', data: row });
    return row;
  };

  const update = async (table, id, patch) => {
    const sb = await ensureSupabase();
    if (sb) {
      try {
        const { data, error } = await sb.from(table).update(patch).eq('id', id).select();
        if (!error && data) {
          const cached = getCache(table);
          setCache(table, cached.map(c => c.id === id ? { ...c, ...patch } : c));
          return data[0];
        }
      } catch (e) { console.warn(`update ${table} fail:`, e.message); }
    }
    const cached = getCache(table);
    setCache(table, cached.map(c => c.id === id ? { ...c, ...patch } : c));
    addPending(table, { op: 'update', id, data: patch });
    return { id, ...patch };
  };

  const remove = async (table, id) => {
    const sb = await ensureSupabase();
    if (sb) {
      try {
        const { error } = await sb.from(table).delete().eq('id', id);
        if (!error) {
          setCache(table, getCache(table).filter(c => c.id !== id));
          return true;
        }
      } catch (e) { console.warn(`delete ${table} fail:`, e.message); }
    }
    setCache(table, getCache(table).filter(c => c.id !== id));
    addPending(table, { op: 'delete', id });
    return true;
  };

  // ---- Suscripción en tiempo real ----
  const subscribe = (table, callback) => {
    let channel = null;
    let cancelled = false;
    ensureSupabase().then((sb) => {
      if (cancelled || !sb) return;
      channel = sb
        .channel(`zera_${table}_${Date.now()}`)
        .on('postgres_changes', { event: '*', schema: 'public', table }, () => {
          list(table).then(callback);
        })
        .subscribe();
    });
    return () => {
      cancelled = true;
      if (channel && supabaseClient) supabaseClient.removeChannel(channel);
    };
  };

  // ---- Config como key-value ----
  const getConfig = async (key, defaultVal = null) => {
    const sb = await ensureSupabase();
    if (sb) {
      try {
        const { data, error } = await sb.from('config_lab').select('value').eq('key', key).maybeSingle();
        if (!error && data) {
          localStorage.setItem(`cfg_${key}`, JSON.stringify(data.value));
          return data.value;
        }
      } catch {}
    }
    const cached = localStorage.getItem(`cfg_${key}`);
    return cached ? JSON.parse(cached) : defaultVal;
  };
  const setConfig = async (key, value) => {
    localStorage.setItem(`cfg_${key}`, JSON.stringify(value));
    const sb = await ensureSupabase();
    if (sb) {
      try {
        await sb.from('config_lab').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
      } catch {}
    }
  };

  return {
    // CRUD
    list, upsert, update, remove, subscribe,
    // Config
    getConfig, setConfig,
    // Cache directo (para fallback rápido)
    getCache, setCache,
    // Helpers que mantienen compatibilidad con código viejo:
    // Estas leen Supabase + actualizan localStorage del key viejo
    syncLegacyKey: async (table, legacyLocalStorageKey) => {
      const data = await list(table);
      localStorage.setItem(legacyLocalStorageKey, JSON.stringify(data));
      return data;
    }
  };
})();

// Exponer globalmente para depuración
if (typeof window !== 'undefined') window.DB = DB;

// Función para resetear TODO localStorage (para limpiar cache cuando hay datos viejos)
function resetearLocalStorage() {
  const claves = [
    'registroTrabajos','produccionOrdenes','cobrosRegistro','comisionesGeneradas',
    'comisionesFidel','tarifasPrecios','salariosBase','reglasComisiones',
    'auditoriaFinanciera','costosOrdenes','gastosEscaneo','notasIA',
    'checkinData','labExternoSinterizado','ordenesCargadas','ordenesEntrada',
    'tipoCambioUSDMXN','configLab'
  ];
  claves.forEach(k => {
    localStorage.removeItem(k);
    localStorage.removeItem('cache_' + k);
    localStorage.removeItem('pending_' + k);
  });
  // Cache de las tablas también
  ['registro_trabajos','produccion_ordenes','cobros','comisiones_generadas','comisiones_fidel',
   'tarifas_precios','salarios_base','reglas_comisiones','auditoria_financiera',
   'costos_ordenes','gastos_escaneo','notas_ia'].forEach(t => {
    localStorage.removeItem('cache_' + t);
    localStorage.removeItem('pending_' + t);
  });
}
if (typeof window !== 'undefined') window.resetearLocalStorage = resetearLocalStorage;

// ============================================================
// DBSync — Sincronización transparente localStorage ⇄ Supabase
// ============================================================
// Mantiene los localStorage keys que los módulos usan, pero los datos
// reales viven en Supabase. Los cambios se propagan en tiempo real
// a todos los dispositivos conectados.
// ============================================================

const DBSync = (() => {
  // Conversores snake_case ⇄ camelCase para que las columnas BD se vean igual que en JS
  const toCamel = (obj) => {
    if (Array.isArray(obj)) return obj.map(toCamel);
    if (obj && typeof obj === 'object' && obj.constructor === Object) {
      return Object.fromEntries(Object.entries(obj).map(([k, v]) => [
        k.replace(/_([a-z])/g, (_, c) => c.toUpperCase()),
        toCamel(v)
      ]));
    }
    return obj;
  };
  const toSnake = (obj) => {
    if (Array.isArray(obj)) return obj.map(toSnake);
    if (obj && typeof obj === 'object' && obj.constructor === Object) {
      return Object.fromEntries(Object.entries(obj).map(([k, v]) => [
        k.replace(/([A-Z])/g, (_, c) => '_' + c.toLowerCase()),
        toSnake(v)
      ]));
    }
    return obj;
  };

  // Mapeo: localStorage key → tabla Supabase + transformer
  // Si el localStorage es un OBJETO (no array), proveer toLs/fromLs custom.
  const MAPPING = {
    'produccionOrdenes':    { table: 'produccion_ordenes' },
    'cobrosRegistro':       { table: 'cobros' },
    'comisionesGeneradas':  { table: 'comisiones_generadas' },
    'comisionesFidel':      { table: 'comisiones_fidel' },
    'tarifasPrecios':       { table: 'tarifas_precios' },
    'registroTrabajos':     { table: 'registro_trabajos' },
    'auditoriaFinanciera':  { table: 'auditoria_financiera' },
    'costosOrdenes':        { table: 'costos_ordenes' },
    'gastosEscaneo':        { table: 'gastos_escaneo' },
    'notasIA':              { table: 'notas_ia' },
    'reglasComisiones':     { table: 'reglas_comisiones' },
    'doctoresLab':          { table: 'doctores' },
    'contaduria':           { table: 'contaduria' },
    'gastosFijosLab':       { table: 'gastos_fijos_lab' },
    'configFamiliar':       { table: 'config_familiar' },
    // Salarios: en localStorage es { Rafael: 4500, Fidel: 3500 } pero en BD es array
    'salariosBase': {
      table: 'salarios_base',
      toLs: (rows) => {
        const obj = {};
        rows.forEach(r => { obj[r.empleado] = parseFloat(r.monto) || 0; });
        return obj;
      },
      fromLs: (obj) => Object.entries(obj || {}).map(([empleado, monto]) => ({
        empleado, monto: parseFloat(monto) || 0, moneda: 'MXN'
      }))
    }
  };

  let initialized = false;
  let unsubs = [];
  const originalSetItem = typeof localStorage !== 'undefined' ? localStorage.setItem.bind(localStorage) : null;

  // Disparar evento para forzar re-render en módulos que escuchen
  const notify = (key) => {
    try { window.dispatchEvent(new CustomEvent('zera-sync', { detail: { key } })); } catch {}
  };

  // Pull desde Supabase → localStorage
  const pull = async (lsKey) => {
    const conf = MAPPING[lsKey];
    if (!conf) return;
    const raw = await DB.list(conf.table);
    const camelData = toCamel(raw); // convertir snake_case → camelCase
    const lsValue = conf.toLs ? conf.toLs(camelData) : camelData;
    // Usar el setItem original para no disparar el push (loop)
    originalSetItem(lsKey, JSON.stringify(lsValue));
    notify(lsKey);
  };

  // Estado global de errores de sync (visible al usuario)
  const syncErrors = [];
  const notifyError = (lsKey, msg) => {
    syncErrors.push({ key: lsKey, msg, time: Date.now() });
    if (syncErrors.length > 10) syncErrors.shift();
    try { window.dispatchEvent(new CustomEvent('zera-sync-error', { detail: { key: lsKey, msg } })); } catch {}
    console.error(`❌ Sync error [${lsKey}]:`, msg);
  };

  // Push: lo que está en localStorage → Supabase
  // Estrategia: leer el array entero del localStorage, hacer upsert masivo
  const push = async (lsKey) => {
    const conf = MAPPING[lsKey];
    if (!conf) return;
    let raw;
    try { raw = JSON.parse(localStorage.getItem(lsKey) || '[]'); }
    catch { return; }
    let rows = conf.fromLs ? conf.fromLs(raw) : raw;
    if (!Array.isArray(rows)) rows = [rows];
    if (rows.length === 0) return;
    // Convertir camelCase → snake_case para columnas de Supabase
    rows = rows.map(r => {
      const snake = toSnake(r);
      // Limpiar campos manejados por DB
      delete snake.created_at;
      delete snake.updated_at;
      // Asegurar ID numérico (PostgreSQL BIGINT no acepta strings)
      if (snake.id && typeof snake.id === 'string') {
        const n = parseInt(snake.id, 10);
        snake.id = isNaN(n) ? Date.now() + Math.floor(Math.random() * 1000) : n;
      }
      if (!snake.id) snake.id = Date.now() + Math.floor(Math.random() * 1000);
      return snake;
    });
    // Esperar a que Supabase esté listo (max 5s) — no genera error si solo está cargando
    const sb = await ensureSupabase();
    if (!sb) {
      console.warn(`[Sync] push ${lsKey} aplazado: Supabase aún no listo`);
      return;
    }
    try {
      const onConflict = lsKey === 'salariosBase' ? 'empleado' : 'id';
      const { error } = await sb.from(conf.table).upsert(rows, { onConflict });
      if (error) {
        notifyError(lsKey, `${error.message} (code: ${error.code})`);
        console.error('Detalles del error:', error);
        console.error('Datos que se intentaron enviar:', rows.slice(0, 2));
      }
    } catch (e) {
      notifyError(lsKey, e.message);
    }
  };

  // Debounce: agrupar pushes del mismo key en una sola llamada (evita spam)
  const pendingPush = {};
  const schedulePush = (lsKey) => {
    if (pendingPush[lsKey]) clearTimeout(pendingPush[lsKey]);
    pendingPush[lsKey] = setTimeout(() => {
      push(lsKey).catch(e => console.warn('Push fallido:', e));
      delete pendingPush[lsKey];
    }, 500);
  };

  // Init: pull todo desde Supabase + setup real-time + override setItem
  const init = async () => {
    if (initialized) return;
    initialized = true;

    // Override localStorage.setItem para hacer push automático (debounced)
    if (originalSetItem) {
      localStorage.setItem = function(key, value) {
        originalSetItem(key, value);
        if (MAPPING[key]) {
          schedulePush(key);
        }
      };
    }

    // Pull inicial: si Supabase tiene datos, los traemos; si está vacío, subimos lo de localStorage
    await Promise.all(Object.keys(MAPPING).map(async (lsKey) => {
      try {
        const conf = MAPPING[lsKey];
        const remoto = await DB.list(conf.table);
        if (remoto && remoto.length > 0) {
          // Hay datos en Supabase → traerlos a localStorage
          await pull(lsKey);
        } else {
          // Supabase vacío → migrar lo de localStorage si existe
          const ls = localStorage.getItem(lsKey);
          if (ls) {
            try {
              const parsed = JSON.parse(ls);
              const tieneContenido = (Array.isArray(parsed) && parsed.length > 0)
                                     || (typeof parsed === 'object' && Object.keys(parsed).length > 0);
              if (tieneContenido) {
                console.log(`📤 Migrando ${lsKey} de localStorage a Supabase...`);
                await push(lsKey);
              }
            } catch {}
          }
        }
      } catch (e) {
        console.warn(`Init ${lsKey} failed:`, e.message);
      }
    }));

    // Real-time subscriptions
    Object.entries(MAPPING).forEach(([lsKey, conf]) => {
      const unsub = DB.subscribe(conf.table, async () => {
        // Cuando cambia en BD, refrescar localStorage (con conversión)
        await pull(lsKey);
      });
      unsubs.push(unsub);
    });

    console.log('✅ DBSync inicializado — datos en vivo entre dispositivos');
  };

  const stop = () => {
    unsubs.forEach(u => u && u());
    unsubs = [];
  };

  return { init, stop, pull, push, MAPPING };
})();

// Hook para que componentes se re-rendericen cuando llegan cambios remotos
function useZeraSync(localStorageKey) {
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.detail || !localStorageKey || e.detail.key === localStorageKey) {
        forceUpdate();
      }
    };
    window.addEventListener('zera-sync', handler);
    return () => window.removeEventListener('zera-sync', handler);
  }, [localStorageKey]);
}

// Tipo de cambio default USD → MXN (configurable desde Cobros)
function getTipoCambioMXN() {
  const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN'));
  return isNaN(tc) || tc <= 0 ? 17.5 : tc;
}

// Busca la tarifa más adecuada para un tipo de trabajo (matching inteligente)
function buscarTarifaPara(tipoTrabajo) {
  if (!tipoTrabajo) return null;
  const tarifas = JSON.parse(localStorage.getItem('tarifasPrecios') || '[]');
  const t = tipoTrabajo.toLowerCase().trim();
  // 1. Match exacto
  let tarifa = tarifas.find(x => x.tipo.toLowerCase().trim() === t);
  if (tarifa) return tarifa;
  // 2. Match por inclusión (Corona Zirconia → "corona zirconia" en "Corona Zirconia A2")
  tarifa = tarifas.find(x => t.includes(x.tipo.toLowerCase().trim()) || x.tipo.toLowerCase().includes(t));
  return tarifa || null;
}

// Calcula comisiones aplicables a un trabajo según reglas configurables
function calcularComisionesPara(trabajo, empleadoAsignado) {
  if (!empleadoAsignado || !trabajo) return [];
  const reglas = JSON.parse(localStorage.getItem('reglasComisiones') || 'null');
  // Reglas por defecto si no hay nada configurado
  const reglasDefault = [
    { id: 1, empleado: 'Fidel', tipoTrabajoIncluye: 'porcelana', monto: 5, moneda: 'USD', activa: true }
  ];
  const reglasActivas = (reglas || reglasDefault).filter(r => r.activa);
  const tipo = (trabajo.tipo || trabajo.trabajo || '').toLowerCase();
  const unidades = parseInt(trabajo.unidades, 10) || 1;
  const comisiones = [];
  reglasActivas.forEach(r => {
    if (r.empleado.toLowerCase() !== empleadoAsignado.toLowerCase()) return;
    const incluye = (r.tipoTrabajoIncluye || '').toLowerCase().trim();
    if (incluye && !tipo.includes(incluye)) return;
    const montoUnitarioMXN = r.moneda === 'USD' ? r.monto * getTipoCambioMXN() : r.monto;
    comisiones.push({
      reglaId: r.id,
      empleado: r.empleado,
      monto: r.monto,
      moneda: r.moneda,
      unidades,
      montoTotal: r.monto * unidades,
      montoTotalMXN: montoUnitarioMXN * unidades,
      descripcion: `${r.monto} ${r.moneda} × ${unidades} ${tipo}`
    });
  });
  return comisiones;
}

// Procesador maestro: dispara cobro + comisiones + mensajería + auditoría
// Se ejecuta al llegar a CALIDAD (genera cobro pendiente) y al ENTREGAR (actualiza)
function procesarTrabajoCompletado(orden) {
  if (!orden) return;
  if (orden.estado !== 'calidad' && orden.estado !== 'entregar' && orden.estado !== 'entregado') return;

  const ahora = new Date().toLocaleString('es-MX');
  const ahoraISO = new Date().toISOString();

  // 1. Verificar si ya fue procesado (evitar duplicados)
  const cobrosExistentes = JSON.parse(localStorage.getItem('cobrosRegistro') || '[]');
  const yaProcesado = cobrosExistentes.some(c => c.ordenId === orden.id);
  if (yaProcesado) return;

  // 2. Calcular monto desde Tarifas
  const tarifa = buscarTarifaPara(orden.trabajo);
  const unidades = parseInt(orden.unidades, 10) || 1;
  const montoBaseUnit = tarifa ? tarifa.costoBase : 0;
  const monedaCobro = tarifa ? tarifa.moneda : 'MXN';
  const montoBaseTotal = montoBaseUnit * unidades;

  // 3. Generar cobro pendiente
  const cobro = {
    id: Date.now(),
    ordenId: orden.id,
    folio: orden.folio,
    paciente: orden.paciente,
    doctor: orden.doctor,
    trabajo: orden.trabajo,
    unidades: unidades,
    tarifaUnitaria: montoBaseUnit,
    montoBase: montoBaseTotal,
    descuento: 0,        // editable después
    montoFinal: montoBaseTotal,
    moneda: monedaCobro,
    estado: 'pendiente',
    fechaEmision: ahora,
    fechaEmisionISO: ahoraISO,
    fechaVencimiento: new Date(Date.now() + 15*24*60*60*1000).toLocaleString('es-MX'),
    metodo: null,
    fechaCobro: null,
    notas: tarifa ? '' : `⚠️ Tarifa no encontrada para "${orden.trabajo}". Define el monto manual.`,
    usuario: 'Sistema'
  };
  cobrosExistentes.push(cobro);
  localStorage.setItem('cobrosRegistro', JSON.stringify(cobrosExistentes));

  // 4. Generar comisiones para el técnico asignado
  const comisiones = calcularComisionesPara(orden, orden.asignado_a);
  if (comisiones.length > 0) {
    const comisionesExistentes = JSON.parse(localStorage.getItem('comisionesGeneradas') || '[]');
    comisiones.forEach(c => {
      comisionesExistentes.push({
        id: Date.now() + Math.random(),
        ordenId: orden.id,
        folio: orden.folio,
        empleado: c.empleado,
        tipoTrabajo: orden.trabajo,
        monto: c.monto,
        moneda: c.moneda,
        unidades: c.unidades,
        montoTotal: c.montoTotal,
        montoTotalMXN: c.montoTotalMXN,
        descripcion: c.descripcion,
        fecha: ahora,
        fechaISO: ahoraISO,
        pagada: false
      });
    });
    localStorage.setItem('comisionesGeneradas', JSON.stringify(comisionesExistentes));

    // Mantener compatibilidad con comisionesFidel (usado por NominaModule viejo)
    const comisionesFidel = JSON.parse(localStorage.getItem('comisionesFidel') || '[]');
    comisiones.filter(c => c.empleado.toLowerCase() === 'fidel').forEach(c => {
      comisionesFidel.push({
        ordenId: orden.id,
        folio: orden.folio,
        trabajo: orden.trabajo,
        comisionTotal: c.montoTotalMXN,
        fecha: ahora
      });
    });
    localStorage.setItem('comisionesFidel', JSON.stringify(comisionesFidel));
  }

  // 5. Auditoría financiera
  const auditoria = JSON.parse(localStorage.getItem('auditoriaFinanciera') || '[]');
  auditoria.push({
    id: Date.now() + Math.random(),
    tipo: 'trabajo_completado',
    ordenId: orden.id,
    folio: orden.folio,
    doctor: orden.doctor,
    trabajo: orden.trabajo,
    ingresoEsperado: monedaCobro === 'USD' ? montoBaseTotal * getTipoCambioMXN() : montoBaseTotal,
    egresoComisiones: comisiones.reduce((s, c) => s + c.montoTotalMXN, 0),
    moneda: 'MXN',
    fecha: ahora,
    fechaISO: ahoraISO
  });
  localStorage.setItem('auditoriaFinanciera', JSON.stringify(auditoria));

  // 6. Notificación a mensajería (entrega pendiente)
  const mensajes = JSON.parse(localStorage.getItem('mensajesHistorial') || '[]');
  mensajes.push({
    id: Date.now() + Math.random(),
    ordenId: orden.id,
    folio: orden.folio,
    paciente: orden.paciente,
    doctor: orden.doctor,
    trabajo: orden.trabajo,
    tipo: 'entrega',
    estado: 'pendiente',
    fecha: ahora,
    usuario: 'Sistema',
    notas: `Orden ${orden.folio} lista para entrega a ${orden.doctor}`
  });
  localStorage.setItem('mensajesHistorial', JSON.stringify(mensajes));
}

  const totalOrdenes = delPersona.length;
  const buenas = delPersona.filter(s => s.calidad === 'excelente' || s.calidad === 'buena').length;
  const conProblemas = delPersona.filter(s => s.calidad === 'problemas').length;
  const tiempoPromedio = delPersona.length > 0 ? (delPersona.reduce((sum, s) => sum + s.tiempoFase, 0) / delPersona.length).toFixed(1) : 0;

  return {
    nombre: nombre,
    ordenesCompletadas: totalOrdenes,
    calidadExcelente: buenas,
    conProblemas: conProblemas,
    tasaCalidad: totalOrdenes > 0 ? ((buenas / totalOrdenes) * 100).toFixed(1) : 0,
    tiempoPromedio: tiempoPromedio,
    especialidad: delPersona.map(s => s.trabajo).filter((v, i, a) => a.indexOf(v) === i).slice(0, 3).join(', ')
  };
}

// FUNCIÓN: Generar alertas inteligentes
async function generarAlertasInteligentes() {
  const ordenes = JSON.parse(localStorage.getItem('produccionOrdenes') || '[]');
  const auditoria = JSON.parse(localStorage.getItem('auditoriaFinanciera') || '[]');
  const estadisticas = JSON.parse(localStorage.getItem('estadisticasProduccion') || '[]');

  const alertas = [];

  // Órdenes atrasadas
  const ahora = new Date();
  ordenes.forEach(o => {
    const enProduccion = ahora - new Date(o.historial[0]?.fecha || ahora) > 5 * 24 * 60 * 60 * 1000; // Más de 5 días
    if (enProduccion && o.estado !== 'terminado') {
      alertas.push({
        tipo: 'ORDEN_ATRASADA',
        folio: o.folio,
        mensaje: `${o.folio} lleva más de 5 días en producción (${o.estado})`,
        prioridad: 'alta'
      });
    }
  });

  // Facturas pendientes
  auditoria.filter(a => a.facturaPendiente).forEach(a => {
    alertas.push({
      tipo: 'FACTURA_PENDIENTE',
      folio: a.folio,
      mensaje: `${a.folio} está esperando factura desde hace días`,
      prioridad: 'media'
    });
  });

  // Patrones de defectos
  const defectosHoy = estadisticas.filter(s =>
    s.dia === new Date().toLocaleDateString('es-MX') && s.calidad === 'problemas'
  );
  if (defectosHoy.length > 2) {
    alertas.push({
      tipo: 'CALIDAD_BAJA',
      mensaje: `${defectosHoy.length} defectos detectados hoy - revisar proceso`,
      prioridad: 'alta'
    });
  }

  return alertas;
}

// ============================================================
function Odontograma({ selectedTeeth, onToothClick, workType, restorations, onRestorationChange }) {
  const [rangeStart, setRangeStart] = useState(null);
  const [toothColors, setToothColors] = useState({});
  const [selectedShade, setSelectedShade] = useState('A2');
  const [selectedRestoration, setSelectedRestoration] = useState('corona-completa');

  const handleToothClick = (num) => {
    if (rangeStart === null) {
      setRangeStart(num);
    } else if (rangeStart === num) {
      setRangeStart(null);
    } else {
      const min = Math.min(rangeStart, num);
      const max = Math.max(rangeStart, num);
      for (let t = min; t <= max; t++) {
        if (!selectedTeeth.includes(t)) onToothClick(t);
      }
      setRangeStart(null);
    }
  };

  const applyToSelected = () => {
    if (selectedTeeth.length === 0) return;
    selectedTeeth.forEach(t => {
      onRestorationChange?.(t, selectedRestoration);
      setToothColors({...toothColors, [t]: SHADE_GUIDES.find(s => s.id === selectedShade)?.rgb});
    });
  };

  const Tooth = ({ num }) => {
    const sel = selectedTeeth.includes(num);
    const isStart = rangeStart === num;
    const resto = restorations?.[num];
    const bgColor = toothColors[num] || '#f5f5dc';
    return (
      <div onClick={() => handleToothClick(num)} title={`Diente ${num}`} style={{
        width:36, height:40, borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', flexDirection:'column',
        fontSize:10, fontWeight:sel?700:500, cursor:'pointer', transition:'all 0.1s', userSelect:'none',
        background: bgColor,
        border: isStart ? `2px solid var(--warning)` : sel ? `2px solid var(--accent-blue)` : '1px solid var(--border-subtle)',
        color: 'var(--text-primary)',
      }}>
        <div style={{ fontSize:11, fontWeight:800, lineHeight:1 }}>{num}</div>
        {resto && <div style={{ fontSize:14, lineHeight:1 }}>{RESTORATION_TYPES.find(r=>r.id===resto)?.icon}</div>}
      </div>
    );
  };

  const Quadrant = ({ teeth, label }) => (
    <div style={{ display:'flex', gap:2, justifyContent:'center' }}>
      {teeth.map(n => <Tooth key={n} num={n} />)}
    </div>
  );

  return (
    <div style={{ background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-lg)', padding:14 }}>
      <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>🦷 Odontograma - Selecciona dientes</div>

      {/* Grid semicircular compacto */}
      <div style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-md)', padding:12, marginBottom:12 }}>
        <div style={{ marginBottom:8 }}>
          <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', textAlign:'center', marginBottom:4 }}>SUPERIOR</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Quadrant teeth={UPPER_RIGHT} label="UR" />
            <Quadrant teeth={UPPER_LEFT} label="UL" />
          </div>
        </div>
        <div style={{ borderTop:'2px solid var(--border-subtle)', paddingTop:8 }}>
          <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', textAlign:'center', marginBottom:4 }}>INFERIOR</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Quadrant teeth={LOWER_RIGHT} label="LR" />
            <Quadrant teeth={LOWER_LEFT} label="LL" />
          </div>
        </div>
      </div>

      {/* Panel de controles compacto */}
      {selectedTeeth.length > 0 && (
        <div style={{ background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)', padding:12 }}>
          <div style={{ fontSize:12, fontWeight:700, marginBottom:10, color:'var(--accent-blue)' }}>
            ✓ Dientes: {selectedTeeth.sort((a,b)=>a-b).join(', ')}
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
            {/* Tipo de restauración */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Tipo</label>
              <select value={selectedRestoration} onChange={e => setSelectedRestoration(e.target.value)}
                style={{ fontSize:11, padding:'6px', width:'100%', borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)' }}>
                {RESTORATION_TYPES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
              </select>
            </div>

            {/* Color dental */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Color</label>
              <select value={selectedShade} onChange={e => setSelectedShade(e.target.value)}
                style={{ fontSize:11, padding:'6px', width:'100%', borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border-subtle)', color:'var(--text-primary)' }}>
                <optgroup label="A"><option value="A1">A1</option><option value="A2">A2</option><option value="A3">A3</option><option value="A3.5">A3.5</option><option value="A4">A4</option></optgroup>
                <optgroup label="B"><option value="B1">B1</option><option value="B2">B2</option><option value="B3">B3</option><option value="B4">B4</option></optgroup>
                <optgroup label="C"><option value="C1">C1</option><option value="C2">C2</option><option value="C3">C3</option><option value="C4">C4</option></optgroup>
                <optgroup label="D"><option value="D1">D1</option><option value="D2">D2</option><option value="D3">D3</option><option value="D4">D4</option></optgroup>
              </select>
            </div>
          </div>

          <button onClick={applyToSelected} style={{ width:'100%', padding:'8px', background:'var(--accent-blue)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', fontWeight:700, fontSize:12, cursor:'pointer' }}>
            Aplicar
          </button>
        </div>
      )}
    </div>
  );
}

function WorkTypeSelector({ selected, onSelect }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:8 }}>

          padding:'12px', borderRadius:'var(--radius-md)', cursor:'pointer', transition:'all 0.15s', textAlign:'left',

// ============================================================
// NUEVA ORDEN FORM
// ============================================================
function NuevaOrdenForm({ onBack, onSave, orders = [] }) {
  const [doctorSearch, setDoctorSearch] = useState('');
  const [doctor, setDoctor] = useState('');
  const [showDoctorList, setShowDoctorList] = useState(false);
  const [pacientes, setPacientes] = useState([{ nombre:'', trabajos:[{ tipo:'', dientes:[], unidades:1, restorations:{} }] }]);
  const [origen, setOrigen] = useState('');
  const [tipoImpresion, setTipoImpresion] = useState('');
  const [notaFisica, setNotaFisica] = useState('');
  const [fechaEntrega, setFechaEntrega] = useState('');
  const [observaciones, setObservaciones] = useState('');
  const [esRepeticion, setEsRepeticion] = useState(false);
  const [notas, setNotas] = useState('');

  const activePaciente = 0;
  const activeTrabajo = 0;
  const currentTrabajo = pacientes[activePaciente]?.trabajos[activeTrabajo];

  const selectedDoctor = doctor ? SAMPLE_DOCTORS.find(d => d.id == doctor) : null;
  const doctorUnpaidNotes = selectedDoctor ? (selectedDoctor.notas_totales - selectedDoctor.notas_pagadas) : 0;
  const doctorFrozen = doctorUnpaidNotes >= 5;

  const filteredDoctors = doctorSearch.length > 0
    ? SAMPLE_DOCTORS.filter(d => d.nombre.toLowerCase().includes(doctorSearch.toLowerCase()) || d.clinica.toLowerCase().includes(doctorSearch.toLowerCase()))
    : [];

  const toggleTooth = (num) => {
    const t = {...currentTrabajo};
    t.dientes = t.dientes.includes(num) ? t.dientes.filter(d=>d!==num) : [...t.dientes, num];
    t.unidades = t.dientes.length;
    const np = [...pacientes];
    np[activePaciente].trabajos[activeTrabajo] = t;
    setPacientes(np);
  };
  const setWorkType = (tipo) => {
    const np = [...pacientes];
    np[activePaciente].trabajos[activeTrabajo].tipo = tipo;
    setPacientes(np);
  };
  const setRestoration = (tooth, restoType) => {
    const np = [...pacientes];
    if (!np[activePaciente].trabajos[activeTrabajo].restorations) {
      np[activePaciente].trabajos[activeTrabajo].restorations = {};
    }
    np[activePaciente].trabajos[activeTrabajo].restorations[tooth] = restoType;
    setPacientes(np);
  };

  const handleSaveWithConfirmation = () => {
    if (doctorFrozen) {
      alert(`⚠️ El doctor ${selectedDoctor.nombre} tiene ${doctorUnpaidNotes} notas sin pagar. Máximo permitido: 4. Debes cobrar antes de crear nuevas órdenes.`);
      return;
    }
    if (!doctor || !pacientes[0].nombre || !origen || !fechaEntrega) {
      alert('Por favor, completa todos los campos requeridos');
      return;
    }
    alert(`✅ Orden registrada\n• Doctor: ${selectedDoctor.nombre}\n• Paciente: ${pacientes[0].nombre}\n• Entrega: ${fechaEntrega}${esRepeticion ? '\n🔄 Repetición' : ''}\n\nNotas guardadas.`);
    onBack();
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:22, padding:4 }}>←</button>
        <SectionHeader title="Nueva Orden de Trabajo" subtitle="Llena todos los datos del pedido" color="var(--mod-ordenes)" icon="📋" />
      </div>

      {doctorFrozen && (
        <InfoCard icon="🚫" title="Doctor congelado" description={`${selectedDoctor.nombre} tiene ${doctorUnpaidNotes} notas sin pagar (límite: 4). Debes cobrar antes de crear nuevas órdenes.`} color="var(--danger)" />
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div>
          <SubSection title="Datos generales" color="var(--mod-ordenes)">
            <Field label="Doctor">
              <div style={{ position:'relative', marginBottom:0 }}>
                <input
                  type="text"
                  placeholder="Busca por nombre o clínica..."
                  value={doctorSearch}
                  onChange={e => { setDoctorSearch(e.target.value); setShowDoctorList(true); }}
                  onFocus={() => setShowDoctorList(true)}
                  style={{ marginBottom:0 }}
                />
                {showDoctorList && (doctorSearch.length > 0 || !doctor) && (
                  <div style={{ position:'absolute', top:'100%', left:0, right:0, background:'var(--bg-card)', border:'1px solid var(--border-subtle)', borderRadius:'0 0 var(--radius-md) var(--radius-md)', maxHeight:200, overflowY:'auto', zIndex:10, marginTop:-1 }}>
                    {filteredDoctors.map(d => (
                      <div key={d.id} onClick={() => { setDoctor(d.id); setDoctorSearch(''); setShowDoctorList(false); }} style={{ padding:'12px 14px', cursor:'pointer', borderBottom:'1px solid var(--border-subtle)', transition:'background 0.1s' }} onMouseEnter={e => e.currentTarget.style.background='var(--bg-card-hover)'} onMouseLeave={e => e.currentTarget.style.background=''}>
                        <div style={{ fontSize:14, fontWeight:600, marginBottom:2 }}>{d.nombre}</div>
                        <div style={{ fontSize:12, color:'var(--text-muted)' }}>{d.clinica}</div>
                      </div>
                    ))}
                    {filteredDoctors.length===0 && doctorSearch.length>0 && <div style={{ padding:'12px 14px', color:'var(--text-muted)', fontSize:13 }}>No encontrado</div>}
                  </div>
                )}
              </div>
            </Field>
            {doctor && (
              <div style={{ padding:12, background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)', marginBottom:12, borderLeft:`3px solid var(--accent-blue)` }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>{selectedDoctor.nombre}</div>
                <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{selectedDoctor.clinica}</div>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:6 }}>Notas pendientes de pago: {doctorUnpaidNotes}</div>
              </div>
            )}
            <Field label="Nombre del paciente"><input value={pacientes[0].nombre} onChange={e=>{const p=[...pacientes]; p[0].nombre=e.target.value; setPacientes(p);}} placeholder="Ej: María García" /></Field>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <Field label="# Nota física"><input value={notaFisica} onChange={e=>setNotaFisica(e.target.value)} placeholder="Ej: 1247" /></Field>
              <Field label="Fecha de entrega">
                <input type="date" value={fechaEntrega} onChange={e=>{setFechaEntrega(e.target.value);}} min={new Date(new Date().toISOString().split('T')[0]).toISOString().split('T')[0]} />
                {fechaEntrega && (
                  <div style={{ marginTop:6, padding:8, background:'rgba(52,211,153,0.15)', borderRadius:'var(--radius-sm)', fontSize:12, color:'var(--success)' }}>
                    {(() => {
                      const days = Math.ceil((new Date(fechaEntrega) - new Date()) / 86400000);
                      return `Entrega en ${days} días`;
                    })()}
                  </div>
                )}
              </Field>
            </div>
            <Field label="¿Repetición?">
              <div style={{ display:'flex', gap:8 }}>
                {[true, false].map(val => (
                  <button key={val} onClick={() => setEsRepeticion(val)} style={{ flex:1, padding:10, borderRadius:'var(--radius-md)', background: esRepeticion === val ? 'var(--accent-blue)' : 'var(--bg-input)', border: esRepeticion === val ? 'none' : '1px solid var(--border-subtle)', color: esRepeticion === val ? '#fff' : 'var(--text-secondary)', cursor:'pointer', fontSize:13, fontWeight:600 }}>
                    {val ? '✓ Sí' : 'No'}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Origen de impresión"><select value={origen} onChange={e=>setOrigen(e.target.value)}><option value="">— Selecciona —</option>{ORIGIN_OPTIONS.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}</select></Field>
            <Field label="Tipo de impresión"><select value={tipoImpresion} onChange={e=>setTipoImpresion(e.target.value)}><option value="">— Selecciona —</option><option>Física</option><option>Escaneo</option></select></Field>
          </SubSection>
          <SubSection title="Tipo de trabajo" color="#F472B6" description="Selecciona qué se va a hacer">
            <WorkTypeSelector selected={currentTrabajo?.tipo} onSelect={setWorkType} />
          </SubSection>
        </div>
        <div>
          <SubSection title="Selecciona los dientes y restauraciones" color="#A78BFA">
            <Odontograma selectedTeeth={currentTrabajo?.dientes || []} onToothClick={toggleTooth} workType={currentTrabajo?.tipo} restorations={currentTrabajo?.restorations} onRestorationChange={setRestoration} />
          </SubSection>
          <SubSection title="Unidades" color="#10B981">
            <Field label="Cantidad de unidades">
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6, marginBottom:8 }}>
                {INVENTORY_UNITS.map(u => (
                  <button key={u} onClick={() => {const np=[...pacientes]; np[0].trabajos[0].unidades=u; setPacientes(np);}} style={{ padding:8, borderRadius:'var(--radius-sm)', background: currentTrabajo?.unidades === u ? 'var(--accent-blue)' : 'var(--bg-input)', border: currentTrabajo?.unidades === u ? 'none' : '1px solid var(--border-subtle)', color: currentTrabajo?.unidades === u ? '#fff' : 'var(--text-secondary)', cursor:'pointer', fontSize:12, fontWeight:700 }}>{u}</button>
                ))}
              </div>
              <input type="number" min="1" max="50" value={currentTrabajo?.unidades || 0} onChange={e => {const np=[...pacientes]; np[0].trabajos[0].unidades=parseInt(e.target.value) || 1; setPacientes(np);}} />
            </Field>
          </SubSection>
          <SubSection title="Notas y observaciones" color="var(--mod-config)">
            <Field label="Observaciones especiales"><textarea value={observaciones} onChange={e=>setObservaciones(e.target.value)} rows={2} placeholder="Indicaciones especiales del doctor, color, material, etc." /></Field>
            <Field label="Notas internas"><textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={2} placeholder="Notas para el lab (no se envía al doctor)" /></Field>
          </SubSection>
          <div style={{ display:'flex', gap:12, marginTop:16 }}>
            <button onClick={onBack} style={{ flex:1, padding:14, borderRadius:'var(--radius-md)', background:'var(--bg-card)', border:'1px solid var(--border-subtle)', color:'var(--text-secondary)', cursor:'pointer', fontSize:14, fontWeight:600 }}>Cancelar</button>
            <button onClick={handleSaveWithConfirmation} disabled={doctorFrozen || !doctor || !pacientes[0].nombre || !origen || !fechaEntrega} style={{ flex:2, padding:14, borderRadius:'var(--radius-md)', background: doctorFrozen ? 'var(--border-subtle)' : 'var(--mod-ordenes)', border:'none', color:'#fff', cursor: doctorFrozen ? 'not-allowed' : 'pointer', fontSize:14, fontWeight:700, opacity: doctorFrozen ? 0.5 : 1 }}>✅ Guardar con notas</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// RECEPCIÓN DE TRABAJO FÍSICO
// ============================================================
function RecepcionTrabajoView({ onBack, orders }) {
  const [searchFolio, setSearchFolio] = useState('');
  const [matched, setMatched] = useState(null);
  const [recepcion, setRecepcion] = useState({ notaFisica:'', condicion:'buena', observaciones:'' });
  const historial = [
    { id:1, folio:'ZL-0001', doctor:'Dr. Martínez', paciente:'María García', llegada:'24 May 10:15', condicion:'buena', matchOT:true },
    { id:2, folio:'ZL-0002', doctor:'Dra. Rodríguez', paciente:'Pedro Ruiz', llegada:'23 May 14:30', condicion:'buena', matchOT:true },
    { id:3, folio:'SIN-FOLIO', doctor:'Desconocido', paciente:'—', llegada:'22 May 09:00', condicion:'revisar', matchOT:false },
  ];
  const buscarOrden = () => {
    const found = orders.find(o => o.numero.toLowerCase() === searchFolio.toLowerCase() || o.nota_fisica === searchFolio);
    setMatched(found || 'not_found');
  };
  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:22 }}>←</button>
        <SectionHeader title="Recepción de Trabajo" subtitle="Registra la llegada del trabajo y vincúlalo a una orden" color="var(--mod-ordenes)" icon="📦" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div>
          <SubSection title="Paso 1: Buscar la orden" color="var(--mod-ordenes)" description="Escribe el folio o número de nota">
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              <input value={searchFolio} onChange={e=>setSearchFolio(e.target.value)} placeholder="Folio ZL-XXXX o # nota" onKeyDown={e=>e.key==='Enter'&&buscarOrden()} style={{ flex:1 }} />
              <Btn onClick={buscarOrden}>Buscar</Btn>
            </div>
            {matched && matched !== 'not_found' && (
              <InfoCard icon="✅" title="Orden encontrada" description={`${matched.numero} — ${matched.doctor.nombre} — ${matched.pacientes[0]?.nombre} — Entrega: ${matched.fecha_entrega}`} color="var(--success)" />
            )}
            {matched === 'not_found' && (
              <InfoCard icon="⚠️" title="No encontrada" description="Se registrará como trabajo sin folio. Podrás vincularlo después." color="var(--warning)" />
            )}
          </SubSection>
          <SubSection title="Paso 2: Verificar condición" color="#10B981">
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              {[['buena','✅ Todo bien'],['revisar','⚠️ Hay que revisar'],['dañado','❌ Llegó dañado']].map(([k,l]) => (
                <button key={k} onClick={()=>setRecepcion({...recepcion, condicion:k})} style={{ flex:1, padding:14, borderRadius:'var(--radius-md)', background:recepcion.condicion===k?'var(--accent-blue-soft)':'var(--bg-input)', border:recepcion.condicion===k?'2px solid var(--accent-blue)':'1px solid var(--border-subtle)', color:recepcion.condicion===k?'var(--text-accent)':'var(--text-secondary)', cursor:'pointer', fontSize:13, fontWeight:recepcion.condicion===k?700:400 }}>{l}</button>
              ))}
            </div>
            <Field label="Nota física"><input value={recepcion.notaFisica} onChange={e=>setRecepcion({...recepcion, notaFisica:e.target.value})} placeholder="#" /></Field>
            <textarea value={recepcion.observaciones} onChange={e=>setRecepcion({...recepcion, observaciones:e.target.value})} rows={2} placeholder="Observaciones..." />
            <button onClick={()=>alert('Trabajo registrado exitosamente')} style={{ marginTop:12, width:'100%', padding:14, background:'var(--mod-ordenes)', color:'#fff', border:'none', borderRadius:'var(--radius-md)', cursor:'pointer', fontSize:15, fontWeight:700 }}>Registrar recepción</button>
          </SubSection>
        </div>
        <SubSection title="Últimas recepciones" color="var(--mod-mensajeria)">
          {historial.map(h => (
            <div key={h.id} style={{ padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', marginBottom:8, border:`1px solid ${h.matchOT?'var(--success)':'var(--warning)'}30` }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                <span style={{ fontSize:14, fontWeight:700, color:h.matchOT?'var(--success)':'var(--warning)' }}>{h.folio}</span>
                <Badge color={h.matchOT?'var(--success)':'var(--warning)'} bg={h.matchOT?'rgba(52,211,153,0.12)':'rgba(251,191,36,0.12)'}>{h.matchOT?'Vinculado':'Sin vincular'}</Badge>
              </div>
              <div style={{ fontSize:13, color:'var(--text-secondary)' }}>{h.doctor} — {h.paciente}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Llegada: {h.llegada}</div>
            </div>
          ))}
          <InfoCard icon="📋" title="3 órdenes pendientes" description="Hay órdenes con estatus 'recibido' que aún no tienen registro de llegada física." color="var(--info)" />
        </SubSection>
      </div>
    </div>
  );
}
