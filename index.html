function LabExternoModule() {
  useZeraSync('labExternoSinterizado');
  const [items, setItems] = React.useState(() => JSON.parse(localStorage.getItem('labExternoSinterizado') || '[]'));
  const [tc, setTc] = React.useState(parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5);

  React.useEffect(() => {
    const handler = () => setItems(JSON.parse(localStorage.getItem('labExternoSinterizado') || '[]'));
    window.addEventListener('zera-sync', handler);
    return () => window.removeEventListener('zera-sync', handler);
  }, []);

  const guardarItems = (nuevos) => {
    setItems(nuevos);
    localStorage.setItem('labExternoSinterizado', JSON.stringify(nuevos));
  };
  const actualizarTC = (v) => {
    const n = parseFloat(v) || 0;
    setTc(n);
    localStorage.setItem('tipoCambioUSDMXN', String(n));
  };

  const marcarTerminado = (id) => {
    if (!confirm('¿Confirmar que el sinterizado terminó? Se registrará el gasto y la orden pasará a la siguiente fase (Porcelana).')) return;
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX');
    const item = items.find(i => i.id === id);
    if (!item) return;

    // 1. Actualizar item en lab externo
    const nuevosItems = items.map(i => i.id === id ? { ...i, estado: 'terminado', fechaTerminado: fecha, fechaTerminadoISO: ahora.toISOString() } : i);
    guardarItems(nuevosItems);

    // 2. Registrar el gasto en costosOrdenes
    const costos = JSON.parse(localStorage.getItem('costosOrdenes') || '[]');
    const costoMXN = item.moneda === 'USD' ? item.costo * tc : item.costo;
    costos.push({
      id: Date.now(),
      orderId: item.ordenId,
      trabajo: `Sinterizado externo — ${item.folio}`,
      unidades: 1,
      costoUnitario: costoMXN,
      costoTotal: costoMXN,
      moneda: 'MXN',
      montoOriginal: item.costo,
      monedaOriginal: item.moneda,
      fecha: fecha,
      fechaISO: ahora.toISOString(),
      estado: 'pendiente'
    });
    localStorage.setItem('costosOrdenes', JSON.stringify(costos));

    // 3. Mover la orden a la siguiente fase (porcelana)
    const ordenes = JSON.parse(localStorage.getItem('produccionOrdenes') || '[]');
    const nuevasOrdenes = ordenes.map(o => {
      if (o.id === item.ordenId) {
        return { ...o, estado: 'porcelana', historial: [...(o.historial || []), { fase: 'porcelana', fecha: fecha, usuario: 'Lab Externo', notas: 'Sinterizado terminado, pasa a porcelana automáticamente' }] };
      }
      return o;
    });
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));

    alert(`✅ Sinterizado terminado.\n💵 Gasto registrado: $${costoMXN.toFixed(2)} MXN\n→ Orden ${item.folio} pasa a Porcelana automáticamente`);
  };

  const eliminar = (id) => {
    if (!confirm('¿Eliminar de la lista? (No afecta la orden en producción)')) return;
    guardarItems(items.filter(i => i.id !== id));
  };

  const pendientes = items.filter(i => i.estado !== 'terminado');
  const terminados = items.filter(i => i.estado === 'terminado');
  const totalGastoUSD = items.reduce((s, i) => s + (i.moneda === 'USD' ? i.costo : i.costo / tc), 0);
  const totalGastoMXN = totalGastoUSD * tc;

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputBoxStyle = { padding: '8px 10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13 };

  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Lab Externo" subtitle="Sinterizado y otros servicios externos" color="var(--mod-lab)" icon="🔬" />

      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12, marginBottom: 20 }}>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Pendientes</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--warning)' }}>{pendientes.length}</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Terminados</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--success)' }}>{terminados.length}</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Gasto total</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--mod-lab)' }}>${totalGastoUSD.toFixed(2)} USD</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>≈ ${totalGastoMXN.toFixed(0)} MXN</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Tipo de cambio</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>1 USD =</span>
            <input type="number" step="0.1" value={tc} onChange={(e) => actualizarTC(e.target.value)} style={{ ...inputBoxStyle, width: 70, fontWeight: 700 }} />
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>MXN</span>
          </div>
        </div>
      </div>

      {items.length === 0 ? (
        <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔬</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>Sin trabajos en lab externo</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>Aparecerán aquí cuando muevas una orden a "Sinterizado" en Producción.</div>
        </div>
      ) : (
        items.map(item => (
          <div key={item.id} style={cardStyle}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent-blue)' }}>{item.folio}</span>
                  {item.estado === 'terminado'
                    ? <span style={{ padding: '2px 8px', background: 'rgba(52,211,153,0.2)', color: 'var(--success)', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>✓ Terminado</span>
                    : <span style={{ padding: '2px 8px', background: 'rgba(251,191,36,0.2)', color: '#FBBF24', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>⏳ Sinterizando</span>
                  }
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{item.paciente}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{item.doctor} · {item.trabajo} ({item.unidades || 1}u)</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>Enviado: {item.fechaEnvio}{item.fechaTerminado ? ` · Terminado: ${item.fechaTerminado}` : ''}</div>
              </div>
              <div style={{ textAlign: 'right', flex: '0 0 auto' }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--mod-lab)' }}>${item.costo} {item.moneda}</div>
                {item.moneda === 'USD' && <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>≈ ${(item.costo * tc).toFixed(0)} MXN</div>}
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {item.estado !== 'terminado' && (
                    <button onClick={() => marcarTerminado(item.id)} style={{ padding: '8px 14px', background: 'var(--success)', color: '#000', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 700 }}>✓ Terminado</button>
                  )}
                  <button onClick={() => eliminar(item.id)} style={{ padding: '8px 10px', background: 'rgba(239,68,68,0.15)', color: '#EF4444', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14 }}>🗑️</button>
                </div>
              </div>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function GastosLabTab() {
  useZeraSync();
  const [cfg, setCfg] = React.useState(() => {
    const saved = localStorage.getItem('gastosFijosLab');
    return saved ? JSON.parse(saved) : { retencionPct: 8, gastos: [] };
  });
  const [nuevoGasto, setNuevoGasto] = React.useState({ concepto: '', monto: '', moneda: 'MXN', frecuencia: 'semanal' });

  const guardar = (nuevo) => {
    setCfg(nuevo);
    localStorage.setItem('gastosFijosLab', JSON.stringify(nuevo));
  };

  const agregar = () => {
    if (!nuevoGasto.concepto.trim() || !nuevoGasto.monto) {
      alert('Concepto y monto son obligatorios');
      return;
    }
    guardar({
      ...cfg,
      gastos: [...(cfg.gastos || []), {
        id: Date.now(),
        concepto: nuevoGasto.concepto.trim(),
        monto: parseFloat(nuevoGasto.monto) || 0,
        moneda: nuevoGasto.moneda,
        frecuencia: nuevoGasto.frecuencia,
        fecha: new Date().toISOString()
      }]
    });
    setNuevoGasto({ concepto: '', monto: '', moneda: 'MXN', frecuencia: 'semanal' });
  };

  const eliminar = (id) => {
    guardar({ ...cfg, gastos: cfg.gastos.filter(g => g.id !== id) });
  };

  const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5;
  const totalSemanalMXN = (cfg.gastos || []).reduce((s, g) => {
    const m = g.moneda === 'USD' ? g.monto * tc : g.monto;
    if (g.frecuencia === 'mensual') return s + m / 4;
    if (g.frecuencia === 'diario') return s + m * 7;
    return s + m; // semanal
  }, 0);

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputStyle = { width: '100%', padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13, boxSizing: 'border-box' };
  const labelStyle = { display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase' };

  return (
    <div>
      <div style={cardStyle}>
        <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 8 }}>
          📌 Estos gastos afectan la <strong>utilidad del lab</strong> (no a la familia). Aquí van insumos como kleenex, café, agua, luz, papel, etc.
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12 }}>
          <div>
            <label style={labelStyle}>% retención de ingresos (insumos chicos)</label>
            <input type="number" min="0" max="100" value={cfg.retencionPct || 8} onChange={(e) => guardar({ ...cfg, retencionPct: parseFloat(e.target.value) || 0 })} style={inputStyle} />
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>Reserva automática para imprevistos chicos</div>
          </div>
        </div>
      </div>

      <div style={cardStyle}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>🏭 Gastos fijos del lab</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--mod-finanzas)' }}>Total semanal: ${totalSemanalMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })} MXN</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 90px 110px 60px', gap: 8, marginBottom: 12 }}>
          <input value={nuevoGasto.concepto} onChange={(e) => setNuevoGasto({ ...nuevoGasto, concepto: e.target.value })} placeholder="Ej: Renta lab, agua, luz, café..." style={inputStyle} />
          <input type="number" value={nuevoGasto.monto} onChange={(e) => setNuevoGasto({ ...nuevoGasto, monto: e.target.value })} placeholder="Monto" style={inputStyle} />
          <select value={nuevoGasto.moneda} onChange={(e) => setNuevoGasto({ ...nuevoGasto, moneda: e.target.value })} style={inputStyle}>
            <option value="MXN">MXN</option><option value="USD">USD</option>
          </select>
          <select value={nuevoGasto.frecuencia} onChange={(e) => setNuevoGasto({ ...nuevoGasto, frecuencia: e.target.value })} style={inputStyle}>
            <option value="semanal">Semanal</option>
            <option value="mensual">Mensual</option>
            <option value="diario">Diario</option>
          </select>
          <button onClick={agregar} style={{ padding: '10px', background: 'var(--mod-finanzas)', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 700 }}>+</button>
        </div>

        {(cfg.gastos || []).length === 0 ? (
          <div style={{ textAlign: 'center', padding: 20, color: 'var(--text-muted)', fontSize: 13 }}>Sin gastos fijos registrados</div>
        ) : (
          <div style={{ display: 'grid', gap: 6 }}>
            {cfg.gastos.map(g => (
              <div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', background: 'var(--bg-input)', borderRadius: 6 }}>
                <div>
                  <div style={{ fontSize: 13, color: 'var(--text-primary)' }}>{g.concepto}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{g.frecuencia}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--mod-finanzas)' }}>${g.monto.toLocaleString('es-MX')} {g.moneda}</span>
                  <button onClick={() => eliminar(g.id)} style={{ background: 'rgba(239,68,68,0.15)', color: '#EF4444', border: 'none', borderRadius: 4, padding: '4px 8px', cursor: 'pointer', fontSize: 12 }}>🗑️</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ------------------------------------------------------------
// TAB RESUMEN: Ingresos/egresos por moneda y método de pago
// ------------------------------------------------------------
function FinanzasResumenTab() {
  useZeraSync();
  const [vista, setVista] = React.useState('semana');
  const [tc, setTc] = React.useState(parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5);

  const periodo = React.useMemo(() => {
    const ahora = new Date();
    const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
    const dow = hoy.getDay();
    const inicioSemana = new Date(hoy); inicioSemana.setDate(hoy.getDate() - (dow === 0 ? 6 : dow - 1));
    const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
    let inicio, label;
    if (vista === 'dia') { inicio = hoy; label = 'Hoy ' + hoy.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }); }
    else if (vista === 'semana') { inicio = inicioSemana; label = 'Semana del ' + inicioSemana.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }); }
    else { inicio = inicioMes; label = ahora.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' }); }
    return { inicio, fin: ahora, label };
  }, [vista]);

  const toMXN = (monto, moneda) => moneda === 'USD' ? monto * tc : monto;
  const inPeriodo = (iso) => {
    if (!iso) return false;
    try { const f = new Date(iso); return f >= periodo.inicio && f <= periodo.fin; } catch { return false; }
  };

  // INGRESOS por método de pago y moneda
  const cobros = JSON.parse(localStorage.getItem('cobrosRegistro') || '[]');
  const ingresosCobrados = cobros.filter(c => c.estado === 'cobrado' && inPeriodo(c.fechaCobroISO || c.fechaCobro));
  const pendientes = cobros.filter(c => c.estado !== 'cobrado');

  const ingresosPorMetodoYMoneda = React.useMemo(() => {
    const tabla = { efectivo: { MXN: 0, USD: 0 }, tarjeta: { MXN: 0, USD: 0 }, transferencia: { MXN: 0, USD: 0 }, cheque: { MXN: 0, USD: 0 } };
    ingresosCobrados.forEach(c => {
      const m = c.metodo || 'efectivo';
      const moneda = c.moneda || 'MXN';
      const monto = (c.montoFinal ?? c.monto) || 0;
      if (!tabla[m]) tabla[m] = { MXN: 0, USD: 0 };
      tabla[m][moneda] = (tabla[m][moneda] || 0) + monto;
    });
    return tabla;
  }, [ingresosCobrados]);

  // EGRESOS
  const comisiones = JSON.parse(localStorage.getItem('comisionesGeneradas') || '[]');
  const escaneos = JSON.parse(localStorage.getItem('gastosEscaneo') || '[]');
  const costos = JSON.parse(localStorage.getItem('costosOrdenes') || '[]');

  const egresoComisiones = comisiones.filter(c => inPeriodo(c.fechaISO || c.fecha)).reduce((s, c) => s + (c.montoTotalMXN || toMXN(c.montoTotal || 0, c.moneda)), 0);
  const egresoEscaneos = escaneos.filter(e => inPeriodo(e.fechaISO || e.fecha)).reduce((s, e) => s + toMXN(e.costoTotal || 0, e.moneda), 0);
  const egresoCostos = costos.filter(c => inPeriodo(c.fechaISO || c.fecha)).reduce((s, c) => s + (c.costoTotal || 0), 0);

  // Salarios base semanal (proporcional al periodo)
  const salarios = JSON.parse(localStorage.getItem('salariosBase') || '{}');
  const totalSalariosSemanal = Object.values(salarios).reduce((s, v) => s + (parseFloat(v) || 0), 0);
  const egresoSalarios = vista === 'semana' ? totalSalariosSemanal : (vista === 'dia' ? totalSalariosSemanal / 6 : totalSalariosSemanal * 4);

  // INGRESOS TOTALES MXN
  const totalIngresosMXN = Object.values(ingresosPorMetodoYMoneda).reduce((s, m) => s + m.MXN + m.USD * tc, 0);
  // EGRESOS TOTALES MXN
  const totalEgresosMXN = egresoComisiones + egresoEscaneos + egresoCostos + egresoSalarios;
  const utilidadBruta = totalIngresosMXN - totalEgresosMXN;

  // Gastos del lab (insumos fijos: agua, luz, café, etc.)
  const gastosLabCfg = JSON.parse(localStorage.getItem('gastosFijosLab') || '{"retencionPct":8,"gastos":[]}');
  const totalGastosLabSemanal = (gastosLabCfg.gastos || []).reduce((s, g) => {
    const m = g.moneda === 'USD' ? g.monto * tc : g.monto;
    if (g.frecuencia === 'mensual') return s + m / 4;
    if (g.frecuencia === 'diario') return s + m * 7;
    return s + m;
  }, 0);
  // Proporción según vista
  const gastosLabPeriodo = vista === 'semana' ? totalGastosLabSemanal : (vista === 'dia' ? totalGastosLabSemanal / 7 : totalGastosLabSemanal * 4);
  const retencionInsumos = (totalIngresosMXN * (gastosLabCfg.retencionPct || 8)) / 100;

  // Total egresos incluye gastos fijos del lab
  const totalEgresosConLab = totalEgresosMXN + gastosLabPeriodo + retencionInsumos;
  const utilidadFinal = totalIngresosMXN - totalEgresosConLab;

  // Distribución familiar SOLO desde la utilidad del lab
  const familiar = JSON.parse(localStorage.getItem('configFamiliar') || '{"pctHogar":50,"gastos":[]}');
  const distribucionHogar = Math.max(0, (utilidadFinal * (familiar.pctHogar || 50)) / 100);
  const saldoLab = utilidadFinal - distribucionHogar;
  const totalGastosFamiliares = (familiar.gastos || []).reduce((s, g) => {
    const m = g.moneda === 'USD' ? g.monto * tc : g.monto;
    return s + m;
  }, 0);

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputBoxStyle = { padding: '8px 10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13 };

  return (
    <div>
      {/* Selector periodo */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 16 }}>
        <div style={{ display: 'flex', gap: 4, background: 'var(--bg-card)', borderRadius: 'var(--radius-md)', padding: 4 }}>
          {['dia', 'semana', 'mes'].map(v => (
            <button key={v} onClick={() => setVista(v)} style={{ padding: '8px 16px', borderRadius: 'var(--radius-sm)', background: vista === v ? 'var(--mod-finanzas)' : 'transparent', border: 'none', color: vista === v ? '#fff' : 'var(--text-muted)', cursor: 'pointer', fontSize: 13, fontWeight: vista === v ? 700 : 500 }}>
              {v === 'dia' ? 'Día' : v === 'semana' ? 'Semana' : 'Mes'}
            </button>
          ))}
        </div>
        <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>{periodo.label}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>1 USD =</span>
          <input type="number" step="0.1" value={tc} onChange={(e) => { const n = parseFloat(e.target.value) || 0; setTc(n); localStorage.setItem('tipoCambioUSDMXN', String(n)); }} style={{ ...inputBoxStyle, width: 70, fontWeight: 700 }} />
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>MXN</span>
        </div>
      </div>

      {/* Resumen Big Numbers */}
      <div style={cardStyle}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 16, textAlign: 'center', alignItems: 'center' }}>
          <div><div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase' }}>Ingresos</div><div style={{ fontSize: 26, fontWeight: 900, color: 'var(--success)' }}>${totalIngresosMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
          <div><div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase' }}>Egresos</div><div style={{ fontSize: 26, fontWeight: 900, color: 'var(--danger)' }}>${totalEgresosConLab.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
          <div><div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase' }}>Utilidad lab</div><div style={{ fontSize: 26, fontWeight: 900, color: utilidadFinal >= 0 ? 'var(--mod-finanzas)' : 'var(--danger)' }}>${utilidadFinal.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
          <div><div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase' }}>Saldo lab</div><div style={{ fontSize: 22, fontWeight: 800, color: 'var(--success)' }}>${saldoLab.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
        </div>
      </div>

      {/* Tabla cruzada ingresos por método y moneda */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>💵 Ingresos cobrados por método y moneda</div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: 'var(--bg-input)' }}>
                <th style={{ padding: '8px 10px', textAlign: 'left', color: 'var(--text-muted)', textTransform: 'uppercase', fontSize: 10 }}>Método</th>
                <th style={{ padding: '8px 10px', textAlign: 'right', color: 'var(--text-muted)', textTransform: 'uppercase', fontSize: 10 }}>MXN</th>
                <th style={{ padding: '8px 10px', textAlign: 'right', color: 'var(--text-muted)', textTransform: 'uppercase', fontSize: 10 }}>USD</th>
                <th style={{ padding: '8px 10px', textAlign: 'right', color: 'var(--text-muted)', textTransform: 'uppercase', fontSize: 10 }}>Total (MXN)</th>
              </tr>
            </thead>
            <tbody>
              {[
                { id: 'efectivo', label: '💵 Efectivo' },
                { id: 'transferencia', label: '🏦 Transferencia' },
                { id: 'tarjeta', label: '💳 Tarjeta' },
                { id: 'cheque', label: '📃 Cheque' }
              ].map(m => {
                const r = ingresosPorMetodoYMoneda[m.id] || { MXN: 0, USD: 0 };
                const total = r.MXN + r.USD * tc;
                return (
                  <tr key={m.id} style={{ borderTop: '1px solid var(--border-subtle)' }}>
                    <td style={{ padding: '10px', fontWeight: 600, color: 'var(--text-primary)' }}>{m.label}</td>
                    <td style={{ padding: '10px', textAlign: 'right', color: 'var(--text-secondary)' }}>${r.MXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</td>
                    <td style={{ padding: '10px', textAlign: 'right', color: 'var(--text-secondary)' }}>${r.USD.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</td>
                    <td style={{ padding: '10px', textAlign: 'right', fontWeight: 700, color: 'var(--success)' }}>${total.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</td>
                  </tr>
                );
              })}
              <tr style={{ borderTop: '2px solid var(--border-subtle)', background: 'var(--bg-input)' }}>
                <td style={{ padding: '10px', fontWeight: 800, color: 'var(--text-primary)' }}>TOTAL</td>
                <td style={{ padding: '10px', textAlign: 'right', fontWeight: 700, color: 'var(--text-primary)' }}>${Object.values(ingresosPorMetodoYMoneda).reduce((s, m) => s + m.MXN, 0).toLocaleString('es-MX')}</td>
                <td style={{ padding: '10px', textAlign: 'right', fontWeight: 700, color: 'var(--text-primary)' }}>${Object.values(ingresosPorMetodoYMoneda).reduce((s, m) => s + m.USD, 0).toLocaleString('es-MX')}</td>
                <td style={{ padding: '10px', textAlign: 'right', fontWeight: 900, color: 'var(--success)' }}>${totalIngresosMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</td>
              </tr>
            </tbody>
          </table>
        </div>
        {pendientes.length > 0 && <div style={{ fontSize: 11, color: 'var(--warning)', marginTop: 8 }}>⚠ Hay {pendientes.length} cobro{pendientes.length !== 1 ? 's' : ''} pendiente{pendientes.length !== 1 ? 's' : ''} (no contado{pendientes.length !== 1 ? 's' : ''} arriba)</div>}
      </div>

      {/* Desglose de egresos */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>📉 Desglose de egresos (en MXN)</div>
        {[
          { label: '👥 Salarios base', monto: egresoSalarios },
          { label: '💰 Comisiones (Fidel)', monto: egresoComisiones },
          { label: '🔍 Escaneos (Abril/Juan)', monto: egresoEscaneos },
          { label: '🔬 Lab externo / materiales', monto: egresoCostos },
          { label: '🏭 Gastos fijos del lab', monto: gastosLabPeriodo },
          { label: `💵 Retención insumos (${gastosLabCfg.retencionPct || 8}%)`, monto: retencionInsumos }
        ].filter(g => g.monto > 0).map((g, i) => {
          const pct = totalEgresosConLab > 0 ? (g.monto / totalEgresosConLab * 100) : 0;
          return (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: 13 }}>
                <span style={{ fontWeight: 500 }}>{g.label}</span>
                <span style={{ fontWeight: 700 }}>${g.monto.toLocaleString('es-MX', { maximumFractionDigits: 0 })} ({pct.toFixed(1)}%)</span>
              </div>
              <div style={{ height: 6, background: 'var(--bg-input)', borderRadius: 3 }}>
                <div style={{ height: 6, background: 'var(--mod-finanzas)', borderRadius: 3, width: `${pct}%`, transition: 'width 0.3s' }} />
              </div>
            </div>
          );
        })}
      </div>

      {/* Autodivisión */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>📊 Distribución de utilidad</div>
        <div style={{ display: 'grid', gap: 8, fontSize: 13 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(52,211,153,0.08)', borderRadius: 6 }}>
            <span>💰 Ingresos brutos</span><span style={{ fontWeight: 700, color: 'var(--success)' }}>${totalIngresosMXN.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(239,68,68,0.08)', borderRadius: 6 }}>
            <span>− Nómina + comisiones + materiales</span><span style={{ fontWeight: 700, color: 'var(--danger)' }}>−${(egresoSalarios + egresoComisiones + egresoEscaneos + egresoCostos).toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(245,158,11,0.08)', borderRadius: 6 }}>
            <span>− Gastos fijos del lab (agua/luz/insumos)</span><span style={{ fontWeight: 700, color: 'var(--warning)' }}>−${gastosLabPeriodo.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(245,158,11,0.08)', borderRadius: 6 }}>
            <span>− Retención insumos ({gastosLabCfg.retencionPct || 8}%)</span><span style={{ fontWeight: 700, color: 'var(--warning)' }}>−${retencionInsumos.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(91,141,239,0.08)', borderRadius: 6 }}>
            <span>− Distribución familiar ({familiar.pctHogar || 50}% de utilidad lab)</span><span style={{ fontWeight: 700, color: 'var(--accent-blue)' }}>−${distribucionHogar.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: 'var(--bg-input)', borderRadius: 6, fontSize: 16, fontWeight: 800, marginTop: 4 }}>
            <span>= Saldo en lab</span><span style={{ color: saldoLab >= 0 ? 'var(--success)' : 'var(--danger)' }}>${saldoLab.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</span>
          </div>
        </div>
        {totalGastosFamiliares > 0 && (
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8, paddingTop: 8, borderTop: '1px dashed var(--border-subtle)' }}>
            📌 Gastos familiares registrados esta semana: ${totalGastosFamiliares.toLocaleString('es-MX')} (configurables en tab Familiar)
          </div>
        )}
      </div>
    </div>
  );
}

// ------------------------------------------------------------
// TAB DISTRIBUCIÓN FAMILIAR
// ------------------------------------------------------------
function DistribucionFamiliarTab() {
  useZeraSync();
  const [cfg, setCfg] = React.useState(() => {
    const saved = localStorage.getItem('configFamiliar');
    return saved ? JSON.parse(saved) : { pctHogar: 50, retencionPct: 8, gastos: [] };
  });
  const [nuevoGasto, setNuevoGasto] = React.useState({ concepto: '', monto: '', moneda: 'MXN' });

  const guardar = (nuevo) => {
    setCfg(nuevo);
    localStorage.setItem('configFamiliar', JSON.stringify(nuevo));
  };

  const agregar = () => {
    if (!nuevoGasto.concepto.trim() || !nuevoGasto.monto) {
      alert('Concepto y monto son obligatorios');
      return;
    }
    guardar({
      ...cfg,
      gastos: [...(cfg.gastos || []), {
        id: Date.now(),
        concepto: nuevoGasto.concepto.trim(),
        monto: parseFloat(nuevoGasto.monto) || 0,
        moneda: nuevoGasto.moneda,
        fecha: new Date().toISOString()
      }]
    });
    setNuevoGasto({ concepto: '', monto: '', moneda: 'MXN' });
  };

  const eliminar = (id) => {
    guardar({ ...cfg, gastos: cfg.gastos.filter(g => g.id !== id) });
  };

  const totalMXN = (cfg.gastos || []).reduce((s, g) => {
    const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5;
    return s + (g.moneda === 'USD' ? g.monto * tc : g.monto);
  }, 0);

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputStyle = { width: '100%', padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13, boxSizing: 'border-box' };
  const labelStyle = { display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase' };

  return (
    <div>
      {/* Reglas */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>⚙️ Distribución al hogar</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}>
          <div>
            <label style={labelStyle}>% de utilidad del lab al hogar</label>
            <input type="number" min="0" max="100" value={cfg.pctHogar || 50} onChange={(e) => guardar({ ...cfg, pctHogar: parseFloat(e.target.value) || 0 })} style={inputStyle} />
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>Se descuenta de la utilidad final del lab</div>
          </div>
        </div>
        <div style={{ marginTop: 10, padding: 8, background: 'rgba(91,141,239,0.08)', borderRadius: 6, fontSize: 11, color: 'var(--text-secondary)' }}>
          💡 Los gastos del lab (insumos, agua, luz, etc.) se manejan en el tab <strong>🏭 Gastos Lab</strong> aparte.
        </div>
      </div>

      {/* Gastos familiares específicos */}
      <div style={cardStyle}>

function TarifasModule() {
  useZeraSync('tarifasPrecios');
  const [tarifas, setTarifas] = useState(() => {
    const saved = localStorage.getItem('tarifasPrecios');
    return saved ? JSON.parse(saved) : [
      { id: 1, tipo: 'Corona Zirconia', costoBase: 850, moneda: 'MXN' },
      { id: 2, tipo: 'Carilla', costoBase: 3000, moneda: 'MXN' },
      { id: 3, tipo: 'Puente (por unidad)', costoBase: 900, moneda: 'MXN' },
      { id: 4, tipo: 'Encerado diagnóstico (por unidad)', costoBase: 400, moneda: 'MXN' },
      { id: 5, tipo: 'Escaneo (Juan/Abril - por unidad)', costoBase: 10, moneda: 'MXN' },
      { id: 6, tipo: 'Fresado', costoBase: 500, moneda: 'MXN' },
      { id: 7, tipo: 'Metal', costoBase: 600, moneda: 'MXN' },
    ];
  });
  const [editingId, setEditingId] = useState(null);
  const [editValues, setEditValues] = useState({});
  const [nuevoTipo, setNuevoTipo] = useState('');
  const [nuevoCosto, setNuevoCosto] = useState('');

  const handleEdit = (tarifa) => {
    setEditingId(tarifa.id);
    setEditValues({ ...tarifa });
  };

  const saveEdit = () => {
    const actualizado = tarifas.map(t => t.id === editingId ? editValues : t);
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
    setEditingId(null);
  };

  const agregarTarifa = () => {
    if (!nuevoTipo.trim() || !nuevoCosto) { alert('Completa tipo y costo'); return; }
    const nueva = {
      id: Math.max(...tarifas.map(t=>t.id), 0) + 1,
      tipo: nuevoTipo,
      costoBase: Number(nuevoCosto),
      moneda: 'MXN'
    };
    const actualizado = [...tarifas, nueva];
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
    setNuevoTipo('');
    setNuevoCosto('');
    alert('✅ Tarifa agregada');
  };

  const eliminarTarifa = (id) => {
    const actualizado = tarifas.filter(t => t.id !== id);
    setTarifas(actualizado);
    localStorage.setItem('tarifasPrecios', JSON.stringify(actualizado));
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Tarifas" subtitle="Lista de precios editable — Se sincroniza con Cobros y Finanzas" color="var(--mod-finanzas)" icon="💰">
        <Btn onClick={() => alert('📊 Exportar tarifas')}>📥 Exportar</Btn>
      </SectionHeader>

      <SubSection title="Agregar nueva tarifa" color="var(--mod-finanzas)" description="Define el tipo de trabajo y su costo base">
        <div style={{ display:'grid', gridTemplateColumns:'1fr 150px 120px', gap:12, alignItems:'flex-end' }}>
          <Field label="Tipo de trabajo">
            <input value={nuevoTipo} onChange={e=>setNuevoTipo(e.target.value)} placeholder="Ej: Corona de emergencia" />
          </Field>
          <Field label="Costo base">
            <input type="number" value={nuevoCosto} onChange={e=>setNuevoCosto(e.target.value)} placeholder="$0" />
          </Field>
          <Btn onClick={agregarTarifa}>+ Agregar</Btn>
        </div>
      </SubSection>

      <SubSection title="Tarifas actuales" color="var(--mod-finanzas)" description={`${tarifas.length} tipos de trabajo configurados`}>
        <div style={{ display:'grid', gridTemplateColumns:'2fr 120px 100px 80px', gap:12, marginBottom:12, fontSize:12, fontWeight:700, color:'var(--text-muted)' }}>
          <div>Tipo de Trabajo</div><div>Costo Base</div><div>Moneda</div><div>Acciones</div>
        </div>
        {tarifas.map(tarifa => (
          <div key={tarifa.id} style={{ display:'grid', gridTemplateColumns:'2fr 120px 100px 80px', gap:12, alignItems:'center', padding:14, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', marginBottom:8, borderLeft:editingId===tarifa.id?'3px solid var(--mod-finanzas)':'3px solid transparent' }}>
            {editingId === tarifa.id ? (
              <>
                <input value={editValues.tipo} onChange={e=>setEditValues({...editValues, tipo:e.target.value})} />
                <input type="number" value={editValues.costoBase} onChange={e=>setEditValues({...editValues, costoBase:Number(e.target.value)})} />
                <select value={editValues.moneda} onChange={e=>setEditValues({...editValues, moneda:e.target.value})}>
                  <option value="MXN">MXN</option>
                  <option value="USD">USD</option>
                </select>
                <button onClick={saveEdit} style={{ padding:8, background:'var(--success)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontWeight:700, fontSize:13 }}>💾 Guardar</button>
              </>
            ) : (
              <>
                <span style={{ fontWeight:600 }}>{tarifa.tipo}</span>
                <span style={{ textAlign:'center', fontSize:14, fontWeight:700, color:'var(--mod-finanzas)' }}>${tarifa.costoBase.toLocaleString()}</span>
                <span style={{ textAlign:'center', fontSize:12 }}>{tarifa.moneda}</span>
                <div style={{ display:'flex', gap:4 }}>
                  <button onClick={()=>handleEdit(tarifa)} style={{ padding:6, background:'var(--mod-finanzas)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontSize:12, fontWeight:600, flex:1 }}>✏️</button>
                  <button onClick={()=>eliminarTarifa(tarifa.id)} style={{ padding:6, background:'var(--danger)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', fontSize:12, fontWeight:600, flex:1 }}>🗑️</button>
                </div>
              </>
            )}

        ))}
      </SubSection>

      <InfoCard icon="ℹ️" title="¿Cómo funciona?" description="Estas tarifas se usan automáticamente en Cobros. Cuando registres un trabajo, selecciona la tarifa y aparecerá el costo. Todo es editable — puedes cambiar precios en cualquier momento sin afectar trabajos anteriores." color="var(--mod-finanzas)" />
    </div>
  );
}

// ============================================================
// NOTAS PARA IA — Auto-guardado y análisis
// ============================================================
function NotasIAModule() {
  const [nota, setNota] = useState('');
  const [historial, setHistorial] = useState(JSON.parse(localStorage.getItem('notasIA') || '[]'));
  const [analizando, setAnalizando] = useState(false);
  const [ultimaGuardada, setUltimaGuardada] = useState(new Date().toLocaleTimeString());

  useEffect(() => {
    if (!nota) return;
    const timer = setTimeout(() => {
      localStorage.setItem('notasEnEdicion', nota);
      setUltimaGuardada(new Date().toLocaleTimeString());
    }, 1000);
    return () => clearTimeout(timer);
  }, [nota]);

  const analizarConIA = () => {
    if (!nota.trim()) { alert('Escribe una nota primero'); return; }
    setAnalizando(true);
    setTimeout(() => {
      const nuevaNoIAta = {
        id: Date.now(),
        original: nota,
        analisis: `✅ Análisis IA (${new Date().toLocaleTimeString()}): ${nota.substring(0,50)}... [Procesada: suma, totales, recomendaciones detectadas]`,
        fecha: new Date().toLocaleDateString(),
        hora: new Date().toLocaleTimeString()
      };
      const actualizado = [nuevaNoIAta, ...historial];
      setHistorial(actualizado);
      localStorage.setItem('notasIA', JSON.stringify(actualizado));
      setNota('');
      setAnalizando(false);
      alert('✅ Nota analizada y guardada automáticamente');
    }, 1500);
  };

  const eliminarNota = (id) => {
    const actualizado = historial.filter(n => n.id !== id);
    setHistorial(actualizado);
    localStorage.setItem('notasIA', JSON.stringify(actualizado));
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <SectionHeader title="Notas para IA" subtitle="Análisis automático y almacenamiento" color="#8B5CF6" icon="🤖" />

      <InfoCard icon="💾" title="Auto-guardado" description={`Última guardada: ${ultimaGuardada}`} color="#8B5CF6" />

      <SubSection title="Escribir nueva nota" color="#8B5CF6">
        <textarea
          value={nota}
          onChange={e => setNota(e.target.value)}
          placeholder="Escribe aquí... (se guarda automáticamente en 1 segundo)"
          style={{ width:'100%', height:120, marginBottom:12, padding:14, borderRadius:'var(--radius-md)', fontFamily:'inherit', fontSize:14, resize:'vertical' }}
        />
        <Btn onClick={analizarConIA} disabled={analizando} style={{ opacity: analizando ? 0.6 : 1 }}>
          {analizando ? '⏳ Analizando...' : '🔍 Analizar con IA'}
        </Btn>
      </SubSection>

      {historial.length > 0 && (
        <SubSection title={`Historial (${historial.length})`} color="#8B5CF6">
          {historial.map(h => (
            <div key={h.id} style={{ background:'var(--bg-primary)', borderRadius:'var(--radius-md)', padding:14, marginBottom:12, borderLeft:'3px solid #8B5CF6' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start', marginBottom:8 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:4 }}>{h.fecha} {h.hora}</div>
                  <div style={{ fontSize:14, color:'var(--text-primary)', marginBottom:8 }}>Original: {h.original}</div>
                  <div style={{ fontSize:13, color:'var(--success)', fontStyle:'italic' }}>{h.analisis}</div>
                </div>
                <button onClick={() => eliminarNota(h.id)} style={{ padding:6, background:'rgba(248,113,113,0.1)', border:'none', color:'var(--danger)', cursor:'pointer', borderRadius:'var(--radius-sm)', fontSize:12, fontWeight:700 }}>Eliminar</button>
              </div>
            </div>
          ))}
        </SubSection>
      )}
    </div>
  );
}

// MÓDULO CONTADURÍA (Montserrat)
// Lista de cobros que requieren factura. Conectado a Cobros/Notas.
// ============================================================
function ContaduriaModule({ onNavigate }) {
  useZeraSync('contaduria');
  const [items, setItems] = React.useState(() => JSON.parse(localStorage.getItem('contaduria') || '[]'));
  const [filtro, setFiltro] = React.useState('pendiente');
  const [busqueda, setBusqueda] = React.useState('');
  const [editando, setEditando] = React.useState(null);
  const [form, setForm] = React.useState({ numeroFactura: '', notas: '' });

  React.useEffect(() => {
    const handler = () => setItems(JSON.parse(localStorage.getItem('contaduria') || '[]'));
    window.addEventListener('zera-sync', handler);
    return () => window.removeEventListener('zera-sync', handler);
  }, []);

  const guardar = (nuevos) => {
    setItems(nuevos);
    localStorage.setItem('contaduria', JSON.stringify(nuevos));
  };

  const marcarFacturado = (id) => {
    const item = items.find(i => i.id === id);
    if (!item) return;
    setEditando(id);
    setForm({ numeroFactura: item.numeroFactura || '', notas: item.notas || '' });
  };

  const confirmarFacturado = () => {
    if (!form.numeroFactura.trim()) { alert('Captura el número de factura'); return; }
    const ahora = new Date();
    guardar(items.map(i => i.id === editando ? {
      ...i,
      estado: 'facturado',
      numeroFactura: form.numeroFactura.trim(),
      notas: form.notas.trim(),
      fechaFactura: ahora.toLocaleString('es-MX'),
      fechaFacturaISO: ahora.toISOString()
    } : i));
    setEditando(null);
    setForm({ numeroFactura: '', notas: '' });
  };

  const revertir = (id) => {
    if (!confirm('¿Volver a marcar como pendiente?')) return;
    guardar(items.map(i => i.id === id ? { ...i, estado: 'pendiente', numeroFactura: null, fechaFactura: null, fechaFacturaISO: null } : i));
  };

  const eliminar = (id) => {
    if (!confirm('¿Eliminar esta solicitud?')) return;
    guardar(items.filter(i => i.id !== id));
  };

  const filtrados = items.filter(i => {
    if (filtro !== 'todos' && i.estado !== filtro) return false;
    if (busqueda.trim()) {
      const q = busqueda.toLowerCase();
      return [i.folio, i.doctor, i.paciente, i.folioNota].some(v => (v || '').toLowerCase().includes(q));
    }
    return true;
  }).sort((a, b) => new Date(b.fechaSolicitudISO || 0) - new Date(a.fechaSolicitudISO || 0));

  const pendientes = items.filter(i => i.estado === 'pendiente').length;
  const facturados = items.filter(i => i.estado === 'facturado').length;

      {/* Filtros */}

        <input type="text" placeholder="🔍 Buscar por folio, doctor, paciente, folio nota..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={{ ...inputStyle, flex: '1 1 240px', minWidth: 200 }} />
        <select value={filtro} onChange={(e) => setFiltro(e.target.value)} style={{ ...inputStyle, width: 180, cursor: 'pointer' }}>
          <option value="pendiente">⏳ Pendientes</option>
          <option value="facturado">✅ Facturadas</option>
          <option value="todos">📋 Todas</option>

      {/* Lista */}

        <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>📄</div>
          <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>
            {items.length === 0 ? 'Sin solicitudes. Cuando un trabajo se entregue con "Requiere factura", aparecerá aquí.' : 'Sin solicitudes que coincidan'}
          </div>
        </div>
      ) : (
        filtrados.map(it => (
          <div key={it.id} style={cardStyle}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 220 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent-blue)' }}>{it.folio}</span>
                  {it.folioNota && <span style={{ fontSize: 12, padding: '2px 8px', background: 'var(--bg-input)', color: 'var(--text-secondary)', borderRadius: 12 }}>Nota {it.folioNota}</span>}
                  {it.estado === 'pendiente'
                    ? <span style={{ padding: '2px 8px', background: 'rgba(245,158,11,0.2)', color: 'var(--warning)', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>⏳ Pendiente</span>
                    : <span style={{ padding: '2px 8px', background: 'rgba(52,211,153,0.2)', color: 'var(--success)', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>✅ Facturada</span>
                  }
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{it.paciente}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{it.doctor} · {it.trabajo}</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>Solicitada: {it.fechaSolicitud}</div>
                {it.estado === 'facturado' && (
                  <div style={{ marginTop: 8, padding: '6px 10px', background: 'rgba(52,211,153,0.08)', borderRadius: 6 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>Factura #{it.numeroFactura} · {it.fechaFactura}</div>
                    {it.notas && <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 2 }}>📝 {it.notas}</div>}
                  </div>
                )}

              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end' }}>

              </div>
            </div>
          </div>

      {/* MODAL: Marcar facturado */}
      {editando && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// MÓDULO DOCTORES (admin interno del lab)
// Base de datos de doctores para usar como dropdown en Registro
// ============================================================
function DoctoresAdminModule({ onNavigate }) {
  useZeraSync('doctoresLab');
  const [doctores, setDoctores] = React.useState(() => JSON.parse(localStorage.getItem('doctoresLab') || '[]'));
  const [busqueda, setBusqueda] = React.useState('');
  const [editando, setEditando] = React.useState(null);
  const [form, setForm] = React.useState({ nombre: '', clinica: '', telefono: '', email: '', direccion: '', notas: '' });

  React.useEffect(() => {
    const handler = () => setDoctores(JSON.parse(localStorage.getItem('doctoresLab') || '[]'));
    window.addEventListener('zera-sync', handler);
    return () => window.removeEventListener('zera-sync', handler);
  }, []);

  const guardarDoctores = (nuevos) => {
    setDoctores(nuevos);
    localStorage.setItem('doctoresLab', JSON.stringify(nuevos));
  };

  const guardar = () => {
    if (!form.nombre.trim()) { alert('El nombre es obligatorio'); return; }
    if (editando) {
      guardarDoctores(doctores.map(d => d.id === editando ? { ...d, ...form } : d));
    } else {
      const nuevo = { id: Date.now(), ...form, activo: true };
      guardarDoctores([nuevo, ...doctores]);
    }
    setForm({ nombre: '', clinica: '', telefono: '', email: '', direccion: '', notas: '' });
    setEditando(null);
  };

  const editar = (d) => {
    setEditando(d.id);
    setForm({ nombre: d.nombre || '', clinica: d.clinica || '', telefono: d.telefono || '', email: d.email || '', direccion: d.direccion || '', notas: d.notas || '' });
  };

  const eliminar = (id) => {
    if (!confirm('¿Eliminar este doctor de la lista?')) return;
    guardarDoctores(doctores.filter(d => d.id !== id));
  };

  const filtrados = doctores.filter(d => !busqueda || (d.nombre || '').toLowerCase().includes(busqueda.toLowerCase()) || (d.clinica || '').toLowerCase().includes(busqueda.toLowerCase()));

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputStyle = { width: '100%', padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: 13, boxSizing: 'border-box' };
  const labelStyle = { display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase' };

  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Doctores" subtitle={`${doctores.length} doctor${doctores.length !== 1 ? 'es' : ''} registrado${doctores.length !== 1 ? 's' : ''}`} color="var(--mod-doctores)" icon="👨‍⚕️" />

      {/* Formulario */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 10 }}>
          {editando ? '✏️ Editar doctor' : '➕ Agregar nuevo doctor'}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 10, marginBottom: 10 }}>
          <div><label style={labelStyle}>Nombre *</label><input value={form.nombre} onChange={(e) => setForm({ ...form, nombre: e.target.value })} placeholder="Dr. Pérez" style={inputStyle} /></div>
          <div><label style={labelStyle}>Clínica</label><input value={form.clinica} onChange={(e) => setForm({ ...form, clinica: e.target.value })} placeholder="Clínica Dental..." style={inputStyle} /></div>
          <div><label style={labelStyle}>Teléfono</label><input value={form.telefono} onChange={(e) => setForm({ ...form, telefono: e.target.value })} placeholder="664-..." style={inputStyle} /></div>
          <div><label style={labelStyle}>Email</label><input value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="dr@..." style={inputStyle} /></div>
        </div>
        <div style={{ marginBottom: 10 }}>
          <label style={labelStyle}>Dirección</label>
          <input value={form.direccion} onChange={(e) => setForm({ ...form, direccion: e.target.value })} style={inputStyle} />
        </div>
        <div style={{ marginBottom: 10 }}>
          <label style={labelStyle}>Notas</label>
          <textarea value={form.notas} onChange={(e) => setForm({ ...form, notas: e.target.value })} rows={2} style={{ ...inputStyle, resize: 'vertical', fontFamily: 'inherit' }} />
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={guardar} style={{ flex: 1, padding: '10px 16px', background: 'var(--mod-doctores)', color: '#fff', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: 13, fontWeight: 700 }}>
            💾 {editando ? 'Guardar cambios' : 'Agregar doctor'}
          </button>
          {editando && (
            <button onClick={() => { setEditando(null); setForm({ nombre: '', clinica: '', telefono: '', email: '', direccion: '', notas: '' }); }} style={{ padding: '10px 16px', background: 'var(--bg-card)', color: 'var(--text-secondary)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: 13 }}>
              Cancelar
            </button>
          )}
        </div>
      </div>

      {/* Búsqueda */}
      <div style={{ marginBottom: 12 }}>
        <input type="text" placeholder="🔍 Buscar doctor..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={{ ...inputStyle, width: '100%' }} />
      </div>

      {/* Lista */}
      {filtrados.length === 0 ? (
        <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>👨‍⚕️</div>
          <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{doctores.length === 0 ? 'Aún no hay doctores. Agrega el primero arriba.' : 'Sin doctores que coincidan'}</div>
        </div>
      ) : (
        filtrados.map(d => (
          <div key={d.id} style={cardStyle}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)' }}>{d.nombre}</div>
                {d.clinica && <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{d.clinica}</div>}
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 6, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                  {d.telefono && <span>📞 {d.telefono}</span>}
                  {d.email && <span>✉️ {d.email}</span>}
                </div>
                {d.notas && <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 6, fontStyle: 'italic' }}>📝 {d.notas}</div>}
              </div>
              <div style={{ display: 'flex', gap: 6 }}>
                <button onClick={() => editar(d)} style={{ padding: '6px 10px', background: 'rgba(91,141,239,0.15)', color: 'var(--accent-blue)', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12 }}>✏️</button>
                <button onClick={() => eliminar(d.id)} style={{ padding: '6px 10px', background: 'rgba(239,68,68,0.15)', color: '#EF4444', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12 }}>🗑️</button>
              </div>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ============================================================
// MÓDULO NOTAS POR DOCTOR — Vista de deuda agrupada por doctor
// Lee cobrosRegistro y agrupa por doctor: pendiente / cobrado / total
// ============================================================
function NotasModule({ onNavigate }) {
  useZeraSync('cobrosRegistro');
  const [tc, setTc] = React.useState(parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5);
  const [busqueda, setBusqueda] = React.useState('');
  const [doctorExpandido, setDoctorExpandido] = React.useState(null);

  const cobros = React.useMemo(() => {
    return JSON.parse(localStorage.getItem('cobrosRegistro') || '[]');
  }, []);

  const actualizarTC = (v) => {
    const n = parseFloat(v) || 0;
    setTc(n);
    localStorage.setItem('tipoCambioUSDMXN', String(n));
  };

  const toMXN = (monto, moneda) => moneda === 'USD' ? monto * tc : monto;

  // Agrupar por doctor
  const doctores = React.useMemo(() => {
    const map = {};
    cobros.forEach(c => {
      const d = c.doctor || 'Sin doctor';
      if (!map[d]) {
        map[d] = { nombre: d, pendientes: [], cobrados: [], totalPendiente: 0, totalCobrado: 0, totalGeneral: 0, ultimoMovimiento: null };
      }
      const m = (c.montoFinal ?? c.monto) || 0;
      const monto = toMXN(m, c.moneda);
      if (c.estado === 'cobrado') {
        map[d].cobrados.push(c);
        map[d].totalCobrado += monto;
      } else {
        map[d].pendientes.push(c);
        map[d].totalPendiente += monto;
      }
      map[d].totalGeneral += monto;
      const fecha = new Date(c.fechaEmisionISO || c.fechaEmision || 0);
      if (!map[d].ultimoMovimiento || fecha > map[d].ultimoMovimiento) {
        map[d].ultimoMovimiento = fecha;
      }
    });
    return Object.values(map)
      .filter(d => !busqueda || d.nombre.toLowerCase().includes(busqueda.toLowerCase()))
      .sort((a, b) => b.totalPendiente - a.totalPendiente);
  }, [cobros, tc, busqueda]);

  const totalAdeudado = doctores.reduce((s, d) => s + d.totalPendiente, 0);
  const totalCobradoGral = doctores.reduce((s, d) => s + d.totalCobrado, 0);

  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputBoxStyle = { padding: '8px 10px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13 };

  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Notas por Doctor" subtitle="Cuánto te debe cada doctor (consolidado)" color="var(--mod-cobros)" icon="📒" />

      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginBottom: 20 }}>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Total adeudado</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--warning)' }}>${totalAdeudado.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>MXN</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Cobrado total</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--success)' }}>${totalCobradoGral.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>MXN</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Doctores con saldo</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--accent-blue)' }}>{doctores.filter(d => d.totalPendiente > 0).length}</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Tipo de cambio</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>1 USD =</span>
            <input type="number" step="0.1" value={tc} onChange={(e) => actualizarTC(e.target.value)} style={{ ...inputBoxStyle, width: 70, fontWeight: 700 }} />
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>MXN</span>
          </div>
        </div>
      </div>

      {/* Búsqueda */}
      <div style={{ marginBottom: 16 }}>
        <input type="text" placeholder="🔍 Buscar doctor..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={{ ...inputBoxStyle, width: '100%' }} />
      </div>

      {/* Lista de doctores */}
      {doctores.length === 0 ? (
        <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📒</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>Sin notas aún</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>Las notas aparecen cuando una orden se marca como ENTREGADA en Producción.</div>
        </div>
      ) : (
        doctores.map(d => {
          const expandido = doctorExpandido === d.nombre;
          return (
            <div key={d.nombre} style={cardStyle}>
              <div onClick={() => setDoctorExpandido(expandido ? null : d.nombre)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', gap: 12, flexWrap: 'wrap' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1, minWidth: 0 }}>
                  <div style={{ width: 40, height: 40, borderRadius: '50%', background: 'linear-gradient(135deg, var(--mod-cobros), #B91C1C)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, fontWeight: 800, color: '#fff' }}>{d.nombre[0]}</div>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)' }}>{d.nombre}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{d.pendientes.length + d.cobrados.length} notas · {d.pendientes.length} pendiente{d.pendientes.length !== 1 ? 's' : ''}</div>
                  </div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, minmax(80px, 1fr))', gap: 12, textAlign: 'center', flex: '0 1 360px' }}>
                  <div>
                    <div style={{ fontSize: 10, color: 'var(--warning)' }}>Debe</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: d.totalPendiente > 0 ? 'var(--warning)' : 'var(--text-muted)' }}>${d.totalPendiente.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: 'var(--success)' }}>Cobrado</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--success)' }}>${d.totalCobrado.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: 'var(--mod-cobros)' }}>Total</div>
                    <div style={{ fontSize: 18, fontWeight: 900, color: 'var(--mod-cobros)' }}>${d.totalGeneral.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
                  </div>
                </div>
                <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{expandido ? '▾' : '▸'}</div>
              </div>

              {expandido && (
                <div style={{ borderTop: '1px solid var(--border-subtle)', marginTop: 14, paddingTop: 14 }}>
                  {d.pendientes.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--warning)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>⏳ Pendientes ({d.pendientes.length})</div>
                      <div style={{ display: 'grid', gap: 6 }}>
                        {d.pendientes.map(c => (
                          <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(245,158,11,0.08)', borderRadius: 8, fontSize: 12, borderLeft: '3px solid var(--warning)' }}>
                            <div>
                              <div style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{c.folio} · {c.paciente}</div>
                              <div style={{ color: 'var(--text-muted)', marginTop: 2 }}>{c.trabajo} · {c.fechaEmision}</div>
                            </div>
                            <div style={{ color: 'var(--warning)', fontWeight: 700 }}>${((c.montoFinal ?? c.monto) || 0).toLocaleString('es-MX')} {c.moneda}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {d.cobrados.length > 0 && (
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--success)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>✅ Cobrados ({d.cobrados.length})</div>
                      <div style={{ display: 'grid', gap: 6 }}>
                        {d.cobrados.slice(0, 10).map(c => (
                          <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(52,211,153,0.08)', borderRadius: 8, fontSize: 12, borderLeft: '3px solid var(--success)' }}>
                            <div>
                              <div style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{c.folio} · {c.paciente}</div>
                              <div style={{ color: 'var(--text-muted)', marginTop: 2 }}>{c.trabajo} · {c.fechaCobro} ({c.metodo})</div>
                            </div>
                            <div style={{ color: 'var(--success)', fontWeight: 700 }}>${((c.montoFinal ?? c.monto) || 0).toLocaleString('es-MX')} {c.moneda}</div>
                          </div>
                        ))}
                        {d.cobrados.length > 10 && <div style={{ fontSize: 11, color: 'var(--text-muted)', textAlign: 'center', padding: 6 }}>... y {d.cobrados.length - 10} más</div>}
                      </div>
                    </div>
                  )}
                  {onNavigate && (
                    <button onClick={(e) => { e.stopPropagation(); onNavigate('cobros'); }} style={{ marginTop: 12, padding: '8px 14px', background: 'var(--mod-cobros)', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 700 }}>
                      💳 Ir a Cobros para registrar pago
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
}
