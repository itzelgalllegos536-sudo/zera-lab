// ============================================================
// MÓDULO REGISTRO DE TRABAJOS
// Bitácora de entrada de trabajos del lab. Cada orden = un paciente
// con uno o más trabajos (corona, puente, placa, etc.).
// Es la fuente única de verdad — se conecta a Producción, Nómina y Gastos.
// Aquí NO se muestra el estado de producción, sólo el registro.
// ============================================================

const TIPOS_TRABAJO_COMUNES = [
  'Corona Zirconia',
  'Corona Metal-Cerámica',
  'Corona Provisional',
  'Puente Zirconia',
  'Puente Metal-Cerámica',
  'Inlay',
  'Onlay',
  'Carilla',
  'Placa Total',
  'Placa Parcial',
  'Implante',
  'Pilar sobre Implante',
  'Reparación',
  'Otro'
];

const COLORES_VITA = ['A1', 'A2', 'A3', 'A3.5', 'A4', 'B1', 'B2', 'B3', 'B4', 'C1', 'C2', 'C3', 'C4', 'D2', 'D3', 'D4'];

function OrdenesModule({ onNavigate }) {
  useZeraSync('registroTrabajos'); // re-render cuando cambia en cualquier dispositivo
  // Estilos compartidos (locales para evitar colisiones con otros módulos)
  const inputStyle = {
    width: '100%',
    padding: '10px 12px',
    background: 'var(--bg-input)',
    border: '1px solid var(--border-subtle)',
    borderRadius: 'var(--radius-md)',
    color: 'var(--text-primary)',
    fontSize: '13px',
    boxSizing: 'border-box'
  };
  const labelStyle = {
    display: 'block',
    fontSize: '11px',
    fontWeight: 600,
    color: 'var(--text-secondary)',
    marginBottom: '4px'
  };
  const metricCardStyle = {
    background: 'var(--bg-card)',
    border: '1px solid var(--border-subtle)',
    borderRadius: 'var(--radius-md)',
    padding: '14px'
  };
  const btnSecundario = {
    background: 'rgba(91,141,239,0.15)',
    color: 'var(--accent-blue)',
    border: 'none',
    padding: '8px 14px',
    borderRadius: '6px',
    cursor: 'pointer',
    fontSize: '12px',
    fontWeight: 600
  };

  const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
  React.useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Registro guardado — fuente única (se conecta con Producción/Nómina/Gastos)
  const [registro, setRegistro] = React.useState(() => {
    const saved = localStorage.getItem('registroTrabajos');
    if (saved) return JSON.parse(saved);
    const viejo = localStorage.getItem('ordenesCargadas');
    if (viejo) {
      // Migrar formato viejo (un trabajo por orden) a nuevo (array)
      const arr = JSON.parse(viejo);
      return arr.map(o => ({
        id: o.id || Date.now(),
        folio: o.folio || '',
        doctor: o.doctor || '',
        paciente: o.paciente || '',
        fechaEntrada: o.fechaEntrada || o.fecha || new Date().toISOString(),
        trabajos: [{
          id: Date.now() + Math.random(),
          tipo: o.trabajo || '',
          dientes: o.dientes || '',
          unidades: parseInt(o.unidades, 10) || 1,
          color: o.color || '',
          escaneo: !!o.escaneo,
          garantia: !!o.garantia
        }],
        notas: o.notas || '',
        foto: o.foto || null,
        origen: o.origen || 'manual'
      }));
    }
    return [];
  });

  const guardarRegistro = (nuevo) => {
    setRegistro(nuevo);
    localStorage.setItem('registroTrabajos', JSON.stringify(nuevo));
  };

  const [modalAbierto, setModalAbierto] = React.useState(false);
  const [modoCaptura, setModoCaptura] = React.useState(null); // null | 'foto' | 'manual'
  const [procesando, setProcesando] = React.useState(false);
  const [errorMsg, setErrorMsg] = React.useState('');
  const fileRef = React.useRef(null);

  const trabajoVacio = () => ({
    id: Date.now() + Math.random(),
    tipo: '',
    dientes: '',
    unidades: 1,
    color: '',
    escaneo: false,
    garantia: false
  });

  const formularioVacio = () => ({
    folio: '',
    doctor: '',
    paciente: '',
    trabajos: [trabajoVacio()],
    notas: '',
    tipoImpresion: 'fisica',          // fisica | digital | escaneo
    escanoPor: ''                      // si es escaneo: Abril o Juan
  });

  const [form, setForm] = React.useState(formularioVacio());
  const [editandoId, setEditandoId] = React.useState(null); // si != null, edita una orden existente

  // Filtros
  const [busqueda, setBusqueda] = React.useState('');
  const [filtroFecha, setFiltroFecha] = React.useState('todo');
  const [ordenExpandida, setOrdenExpandida] = React.useState(null);
  const [lightboxFoto, setLightboxFoto] = React.useState(null);

  // ---- helpers ----
  const generarFolio = () => {
    const max = registro.reduce((m, r) => {
      const n = parseInt((r.folio || '').replace(/[^0-9]/g, ''), 10);
      return isNaN(n) ? m : Math.max(m, n);
    }, 0);
    return 'ZL-' + String(max + 1).padStart(4, '0');
  };

  const convertirImagenAJpeg = (file) => new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Formato no soportado')); };
    img.src = url;
  });

  // ---- procesar foto con IA ----
  const procesarFoto = async (file) => {
    setProcesando(true);
    setErrorMsg('');
    const formatosClaude = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

    try {
      let base64Url;
      let mediaType = file.type;
      if (!formatosClaude.includes(file.type)) {
        base64Url = await convertirImagenAJpeg(file);
        mediaType = 'image/jpeg';
      } else {
        base64Url = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = (e) => resolve(e.target.result);
          r.onerror = () => reject(new Error('No se pudo leer el archivo'));
          r.readAsDataURL(file);
        });
      }
      const base64Data = base64Url.split(',')[1];

      const response = await fetch('/.netlify/functions/claude-proxy', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-3-5-haiku-20241022',
          max_tokens: 1200,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } },
              { type: 'text', text: `Eres experto analizando órdenes de laboratorio dental.
Una sola orden puede contener VARIOS trabajos (corona + puente + placa, por ejemplo).
Extrae TODA la información y devuelve SOLO un JSON válido (sin texto extra, sin markdown):

{
  "folio": "código identificador (vacío si no hay)",
  "doctor": "nombre del dentista",
  "paciente": "nombre del paciente",
  "trabajos": [
    {
      "tipo": "tipo de trabajo (ej: Corona Zirconia, Puente Metal-Cerámica, Placa Parcial, Inlay)",
      "dientes": "lista de dientes ej: 11, 12, 13",
      "unidades": número,
      "color": "color VITA ej: A2 (vacío si no aplica)"
    }
  ],
  "notas": "indicaciones especiales del doctor (vacío si no hay)"
}

REGLAS:
- Si ves múltiples trabajos en la orden, agrégalos todos al array "trabajos".
- Si no se indica el color, deja "color" vacío.
- Si no se indica unidades, usa la cantidad de dientes (ej: 3 dientes en puente = 3).
- Lee con cuidado para no confundir trabajos.` }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(`HTTP ${response.status}: ${err.error?.message || err.error || 'desconocido'}`);
      }

      const data = await response.json();
      const texto = data.content?.[0]?.text || '';
      const jsonStr = (texto.match(/\{[\s\S]*\}/) || [''])[0];
      const datos = JSON.parse(jsonStr);

      const trabajos = Array.isArray(datos.trabajos) && datos.trabajos.length > 0
        ? datos.trabajos.map(t => ({
            id: Date.now() + Math.random(),
            tipo: t.tipo || '',
            dientes: t.dientes || '',
            unidades: parseInt(t.unidades, 10) || 1,
            color: t.color || '',
            escaneo: false,
            garantia: false
          }))
        : [trabajoVacio()];

      // En vez de guardar directo, abrimos el formulario manual prellenado
      // para que la usuaria valide/edite antes de guardar.
      setForm({
        folio: datos.folio || generarFolio(),
        doctor: datos.doctor || '',
        paciente: datos.paciente || '',
        trabajos,
        notas: datos.notas || '',
        fotoTemp: base64Url
      });
      setModoCaptura('manual');
    } catch (err) {
      console.error('Error procesando foto:', err);
      setErrorMsg(err.message || 'Error desconocido');
    } finally {
      setProcesando(false);
    }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) procesarFoto(file);
  };

  // ---- CRUD ----
  const abrirNueva = () => {
    setEditandoId(null);
    setForm({ ...formularioVacio(), folio: generarFolio() });
    setModalAbierto(true);
    setModoCaptura(null);
    setErrorMsg('');
  };

  const abrirEdicion = (orden) => {
    setEditandoId(orden.id);
    setForm({
      folio: orden.folio,
      doctor: orden.doctor,
      paciente: orden.paciente,
      trabajos: orden.trabajos && orden.trabajos.length ? orden.trabajos : [trabajoVacio()],
      notas: orden.notas || '',
      fotoTemp: orden.foto || null
    });
    setModalAbierto(true);
    setModoCaptura('manual');
    setErrorMsg('');
  };

  const agregarTrabajo = () => {
    setForm({ ...form, trabajos: [...form.trabajos, trabajoVacio()] });
  };

  const quitarTrabajo = (id) => {
    if (form.trabajos.length === 1) return;
    setForm({ ...form, trabajos: form.trabajos.filter(t => t.id !== id) });
  };

  const updateTrabajo = (id, campo, valor) => {
    setForm({
      ...form,
      trabajos: form.trabajos.map(t => t.id === id ? { ...t, [campo]: valor } : t)
    });
  };

  // ============================================================
  // SINCRONIZACIÓN CON PRODUCCIÓN
  // Cada trabajo del registro se materializa como una orden en Producción
  // (fase 'recepcion' por defecto). Si la orden ya existe allá, se hace
  // merge preservando estado/asignado/historial/fotos (datos de progreso).
  // ============================================================
  const sincronizarConProduccion = (registroOrden) => {
    const existentes = JSON.parse(localStorage.getItem('produccionOrdenes') || '[]');
    const ahora = new Date().toLocaleString('es-MX');
    const ordenesActualizadas = [...existentes];

    registroOrden.trabajos.forEach((trabajo, idx) => {
      const sufijo = registroOrden.trabajos.length > 1 ? `-${idx + 1}` : '';
      const folioFinal = `${registroOrden.folio}${sufijo}`;

      // Buscar si esta entrada ya existe en producción
      const existeIdx = ordenesActualizadas.findIndex(
        p => p.registroOrigenId === registroOrden.id && p.trabajoIndice === idx
      );

      if (existeIdx >= 0) {
        // Merge: actualizar info pero preservar progreso
        const previa = ordenesActualizadas[existeIdx];
        ordenesActualizadas[existeIdx] = {
          ...previa,
          folio: folioFinal,
          doctor: registroOrden.doctor,
          paciente: registroOrden.paciente,
          trabajo: trabajo.tipo,
          dientes: trabajo.dientes,
          unidades: parseInt(trabajo.unidades, 10) || 1,
          color: trabajo.color || '',
          notas_trabajos: registroOrden.notas || previa.notas_trabajos || ''
        };
      } else {
        // Crear nueva entrada de producción
        ordenesActualizadas.unshift({
          id: Date.now() + idx,
          folio: folioFinal,
          doctor: registroOrden.doctor,
          paciente: registroOrden.paciente,
          trabajo: trabajo.tipo,
          dientes: trabajo.dientes,
          unidades: parseInt(trabajo.unidades, 10) || 1,
          color: trabajo.color || '',
          estado: 'recepcion',
          asignado_a: null,
          historial: [{
            fase: 'recepcion',
            fecha: ahora,
            usuario: 'Sistema',
            notas: `Creado automáticamente desde Registro de Trabajos (${registroOrden.folio})`
          }],
          fotos_evidencia: registroOrden.foto ? [{
            nombre: `${registroOrden.folio}-orden.jpg`,
            data: registroOrden.foto,
            fecha: ahora
          }] : [],
          notas_trabajos: registroOrden.notas || '',
          // Tracking de sincronización
          registroOrigenId: registroOrden.id,
          trabajoIndice: idx
        });
      }
    });

    // Si se editó y se quitaron trabajos, también eliminamos sus entradas en Producción
    // (solo las que no tengan progreso; las que tienen estado != 'recepcion' se preservan con un aviso)
    const ahoraTrabajos = registroOrden.trabajos.length;
    const sobrantes = ordenesActualizadas.filter(
      p => p.registroOrigenId === registroOrden.id && p.trabajoIndice >= ahoraTrabajos
    );
    sobrantes.forEach(s => {
      if (s.estado === 'recepcion' && !s.asignado_a) {
        // Sin progreso: eliminar
        const i = ordenesActualizadas.indexOf(s);
        if (i >= 0) ordenesActualizadas.splice(i, 1);
      }
      // Si tiene progreso, se queda — el usuario verá la orden huérfana en Producción
    });

    localStorage.setItem('produccionOrdenes', JSON.stringify(ordenesActualizadas));
  };

  const desincronizarDeProduccion = (registroId) => {
    const existentes = JSON.parse(localStorage.getItem('produccionOrdenes') || '[]');
    // Solo eliminar las que están en fase 'recepcion' sin asignar; las que tienen progreso real se preservan
    const filtradas = existentes.filter(p => {
      if (p.registroOrigenId !== registroId) return true;
      const sinProgreso = p.estado === 'recepcion' && !p.asignado_a;
      return !sinProgreso;
    });
    localStorage.setItem('produccionOrdenes', JSON.stringify(filtradas));
  };

  const guardar = () => {
    if (!form.doctor.trim() || !form.paciente.trim()) {
      setErrorMsg('Doctor y paciente son obligatorios');
      return;
    }
    const trabajosValidos = form.trabajos.filter(t => t.tipo && t.tipo.trim());
    if (trabajosValidos.length === 0) {
      setErrorMsg('Agrega al menos un trabajo (tipo es obligatorio)');
      return;
    }
    // Si es escaneo, asignar automáticamente al equipo Abril/Juan
    if (form.tipoImpresion === 'escaneo') {
      form.escanoPor = 'Abril/Juan';
    }

    let ordenFinal;
    const datosComunes = {
      folio: form.folio.trim(),
      doctor: form.doctor.trim(),
      paciente: form.paciente.trim(),
      trabajos: trabajosValidos.map(t => ({ ...t, unidades: parseInt(t.unidades, 10) || 1 })),
      notas: form.notas.trim(),
      tipoImpresion: form.tipoImpresion || 'fisica',
      escanoPor: form.tipoImpresion === 'escaneo' ? form.escanoPor : null
    };

    if (editandoId) {
      const original = registro.find(o => o.id === editandoId);
      const actualizada = {
        ...original,
        ...datosComunes,
        folio: datosComunes.folio || original?.folio,
        foto: form.fotoTemp || original?.foto || null
      };
      guardarRegistro(registro.map(o => o.id === editandoId ? actualizada : o));
      ordenFinal = actualizada;
    } else {
      ordenFinal = {
        id: Date.now(),
        ...datosComunes,
        folio: datosComunes.folio || generarFolio(),
        foto: form.fotoTemp || null,
        fechaEntrada: new Date().toISOString(),
        origen: form.fotoTemp ? 'foto-ia' : 'manual'
      };
      guardarRegistro([ordenFinal, ...registro]);
    }

    // 🔗 SINCRONIZAR CON PRODUCCIÓN
    sincronizarConProduccion(ordenFinal);

    // 💵 SI ES ESCANEO: generar gasto a Abril/Juan automáticamente
    if (ordenFinal.tipoImpresion === 'escaneo' && ordenFinal.escanoPor) {
      const totalUnidades = ordenFinal.trabajos.reduce((s, t) => s + (parseInt(t.unidades, 10) || 1), 0);
      const tarifas = JSON.parse(localStorage.getItem('tarifasPrecios') || '[]');
      const tarifaEscaneo = tarifas.find(t => (t.tipo || '').toLowerCase().includes('escaneo'));
      const costoPorUnidad = tarifaEscaneo?.costoBase || 10; // $10 MXN por unidad por defecto
      const monedaCosto = tarifaEscaneo?.moneda || 'MXN';
      const fecha = new Date().toLocaleString('es-MX');

      const gastos = JSON.parse(localStorage.getItem('gastosEscaneo') || '[]');
      // Evitar duplicados al editar
      const sinDuplicado = gastos.filter(g => g.ordenId !== ordenFinal.id);
      sinDuplicado.unshift({
        id: Date.now() + Math.random(),
        ordenId: ordenFinal.id,
        folio: ordenFinal.folio,
        doctor: ordenFinal.doctor,
        paciente: ordenFinal.paciente,
        trabajo: ordenFinal.trabajos.map(t => t.tipo).join(', '),
        unidades: totalUnidades,
        costoUnidad: costoPorUnidad,
        costoTotal: costoPorUnidad * totalUnidades,
        moneda: monedaCosto,
        persona: ordenFinal.escanoPor,
        fecha,
        fechaISO: new Date().toISOString()
      });
      localStorage.setItem('gastosEscaneo', JSON.stringify(sinDuplicado));
    }

    setModalAbierto(false);
    setModoCaptura(null);
    setEditandoId(null);
    setErrorMsg('');
    setForm(formularioVacio());
  };

  const eliminarOrden = (id) => {
    if (!confirm('¿Eliminar esta orden del registro? Las entradas en Producción que aún estén en RECEPCIÓN sin asignar también se borrarán. Las que ya tengan técnico asignado se preservarán.')) return;
    guardarRegistro(registro.filter(o => o.id !== id));
    // 🔗 DESINCRONIZAR DE PRODUCCIÓN
    desincronizarDeProduccion(id);
  };

  // ---- filtros ----
  const ordenesFiltradas = React.useMemo(() => {
    const ahora = new Date();
    return registro.filter(o => {
      if (filtroFecha !== 'todo') {
        const f = new Date(o.fechaEntrada);
        const diff = (ahora - f) / (1000 * 60 * 60 * 24);
        if (filtroFecha === 'hoy' && diff > 1) return false;
        if (filtroFecha === 'semana' && diff > 7) return false;
        if (filtroFecha === 'mes' && diff > 31) return false;
      }
      if (busqueda.trim()) {
        const q = busqueda.toLowerCase();
        const enTrabajos = (o.trabajos || []).some(t =>
          (t.tipo || '').toLowerCase().includes(q) ||
          (t.dientes || '').toLowerCase().includes(q)
        );
        const match = [o.folio, o.doctor, o.paciente].some(v => (v || '').toLowerCase().includes(q)) || enTrabajos;
        if (!match) return false;
      }
      return true;
    });
  }, [registro, busqueda, filtroFecha]);

  // ---- métricas para el header ----
  const metricas = React.useMemo(() => {
    const ahora = new Date();
    const hoy = registro.filter(o => (ahora - new Date(o.fechaEntrada)) / (1000 * 60 * 60 * 24) <= 1);
    const semana = registro.filter(o => (ahora - new Date(o.fechaEntrada)) / (1000 * 60 * 60 * 24) <= 7);
    const totalUnidadesHoy = hoy.reduce((s, o) => s + (o.trabajos || []).reduce((ss, t) => ss + (parseInt(t.unidades, 10) || 0), 0), 0);
    const totalUnidadesSemana = semana.reduce((s, o) => s + (o.trabajos || []).reduce((ss, t) => ss + (parseInt(t.unidades, 10) || 0), 0), 0);
    return { hoy: hoy.length, semana: semana.length, total: registro.length, unidadesHoy: totalUnidadesHoy, unidadesSemana: totalUnidadesSemana };
  }, [registro]);

  const fmtFecha = (iso) => {
    const d = new Date(iso);
    return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  };

  const resumenTrabajos = (trabajos) => {
    if (!trabajos || trabajos.length === 0) return '—';
    if (trabajos.length === 1) return trabajos[0].tipo;
    return `${trabajos.length} trabajos`;
  };

  const totalUnidadesOrden = (trabajos) => (trabajos || []).reduce((s, t) => s + (parseInt(t.unidades, 10) || 0), 0);

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div style={{ padding: isMobile ? '16px' : '24px', maxWidth: '1400px', margin: '0 auto' }}>
      {/* HEADER */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
        <div>
          <h1 style={{ fontSize: isMobile ? '20px' : '24px', fontWeight: 700, color: 'var(--text-primary)', margin: 0 }}>📋 Registro de Trabajos</h1>
          <p style={{ fontSize: '13px', color: 'var(--text-secondary)', margin: '4px 0 0' }}>Bitácora maestra del lab — alimenta Producción, Nómina y Gastos</p>
        </div>
        <button
          onClick={abrirNueva}
          style={{ background: 'var(--accent-blue)', color: '#fff', border: 'none', padding: '12px 20px', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}
        >
          ➕ Nuevo registro
        </button>
      </div>

      {/* MÉTRICAS */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px', marginBottom: '20px' }}>
        <div style={metricCardStyle}>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>Hoy</div>
          <div style={{ fontSize: '24px', fontWeight: 700, color: 'var(--accent-blue)' }}>{metricas.hoy}</div>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>{metricas.unidadesHoy} unidad{metricas.unidadesHoy !== 1 ? 'es' : ''}</div>
        </div>
        <div style={metricCardStyle}>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>Esta semana</div>
          <div style={{ fontSize: '24px', fontWeight: 700, color: '#34D399' }}>{metricas.semana}</div>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>{metricas.unidadesSemana} unidad{metricas.unidadesSemana !== 1 ? 'es' : ''}</div>
        </div>
        <div style={metricCardStyle}>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>Total acumulado</div>
          <div style={{ fontSize: '24px', fontWeight: 700, color: 'var(--text-primary)' }}>{metricas.total}</div>
          <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>órdenes</div>
        </div>
      </div>

      {/* FILTROS */}
      <div style={{ display: 'flex', gap: '10px', marginBottom: '16px', flexWrap: 'wrap' }}>
        <input
          type="text"
          placeholder="🔍 Buscar por folio, doctor, paciente, trabajo, diente..."
          value={busqueda}
          onChange={(e) => setBusqueda(e.target.value)}
          style={{ flex: '1 1 240px', minWidth: '200px', padding: '10px 14px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-primary)', fontSize: '13px' }}
        />
        <select
          value={filtroFecha}
          onChange={(e) => setFiltroFecha(e.target.value)}
          style={{ padding: '10px 14px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-primary)', fontSize: '13px', cursor: 'pointer' }}
        >
          <option value="todo">📅 Todo</option>
          <option value="hoy">📅 Hoy</option>
          <option value="semana">📅 Esta semana</option>
          <option value="mes">📅 Este mes</option>
        </select>
      </div>

      {/* LISTA */}
      {ordenesFiltradas.length === 0 ? (
        <div style={{ background: 'var(--bg-card)', border: '2px dashed var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: '60px 20px', textAlign: 'center' }}>
          <div style={{ fontSize: '48px', marginBottom: '12px' }}>📭</div>
          <div style={{ fontSize: '16px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '6px' }}>
            {registro.length === 0 ? 'Aún no has registrado trabajos' : 'Sin resultados'}
          </div>
          <div style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
            {registro.length === 0 ? 'Toca "Nuevo registro" para empezar.' : 'Cambia el filtro o búsqueda.'}
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
          {ordenesFiltradas.map(o => {
            const expandida = ordenExpandida === o.id;
            return (
              <div key={o.id} style={{ background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', overflow: 'hidden', transition: 'border-color 0.15s' }}>
                {/* Cabecera de la orden — clickeable */}
                <div
                  onClick={() => setOrdenExpandida(expandida ? null : o.id)}
                  style={{ padding: '14px 16px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '12px', flexWrap: 'wrap' }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: '14px', fontWeight: 700, color: 'var(--accent-blue)', whiteSpace: 'nowrap' }}>{o.folio}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: '14px', color: 'var(--text-primary)', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.paciente}</div>
                      <div style={{ fontSize: '12px', color: 'var(--text-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.doctor}</div>
                    </div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
                    <div style={{ background: 'rgba(91,141,239,0.15)', color: 'var(--accent-blue)', padding: '4px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 600 }}>
                      {(o.trabajos || []).length} trabajo{(o.trabajos || []).length !== 1 ? 's' : ''} · {totalUnidadesOrden(o.trabajos)} u.
                    </div>
                    <div style={{ fontSize: '11px', color: 'var(--text-secondary)', whiteSpace: 'nowrap' }}>{fmtFecha(o.fechaEntrada)}</div>
                    <div style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>{expandida ? '▾' : '▸'}</div>
                  </div>
                </div>

                {/* Desglose expandido */}
                {expandida && (
                  <div style={{ borderTop: '1px solid var(--border-subtle)', padding: '14px 16px', background: 'var(--bg-input)' }}>
                    <div style={{ display: 'grid', gap: '8px', marginBottom: '12px' }}>
                      {(o.trabajos || []).map((t, idx) => (
                        <div key={t.id || idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--bg-card)', padding: '10px 12px', borderRadius: '8px', borderLeft: '3px solid var(--accent-blue)', flexWrap: 'wrap', gap: '8px' }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text-primary)' }}>🦷 {t.tipo}</div>
                            <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '2px' }}>
                              Dientes: {t.dientes || '—'} {t.color ? `· Color ${t.color}` : ''}
                            </div>
                          </div>
                          <div style={{ background: 'var(--bg-input)', padding: '4px 10px', borderRadius: '6px', fontSize: '12px', fontWeight: 600, color: 'var(--text-primary)' }}>
                            {t.unidades} u.
                          </div>
                        </div>
                      ))}
                    </div>
                    {o.notas && (
                      <div style={{ background: 'rgba(245,158,11,0.1)', borderLeft: '3px solid #F59E0B', padding: '8px 12px', borderRadius: '6px', fontSize: '12px', color: 'var(--text-primary)', marginBottom: '12px' }}>
                        📝 {o.notas}
                      </div>
                    )}
                    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                      <button onClick={(e) => { e.stopPropagation(); abrirEdicion(o); }} style={btnSecundario}>✏️ Editar</button>
                      {o.foto && (
                        <button onClick={(e) => { e.stopPropagation(); setLightboxFoto({ data: o.foto, nombre: o.folio }); }} style={btnSecundario}>📸 Ver foto</button>
                      )}
                      <button onClick={(e) => { e.stopPropagation(); eliminarOrden(o.id); }} style={{ ...btnSecundario, color: '#EF4444', background: 'rgba(239,68,68,0.15)' }}>🗑️ Eliminar</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL */}
      {modalAbierto && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
          <div style={{ background: 'var(--bg-primary)', borderRadius: 'var(--radius-lg)', padding: '24px', maxWidth: '640px', width: '100%', maxHeight: '92vh', overflowY: 'auto', border: '2px solid var(--accent-blue)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
              <h2 style={{ fontSize: '18px', fontWeight: 700, color: 'var(--text-primary)', margin: 0 }}>
                {editandoId ? '✏️ Editar registro' : '➕ Nuevo registro'}
              </h2>
              <button onClick={() => { setModalAbierto(false); setModoCaptura(null); setErrorMsg(''); setEditandoId(null); }} style={{ background: 'transparent', border: 'none', color: 'var(--text-secondary)', fontSize: '20px', cursor: 'pointer' }}>✕</button>
            </div>

            {!modoCaptura && (
              <div style={{ display: 'grid', gap: '12px' }}>
                <p style={{ fontSize: '13px', color: 'var(--text-secondary)', margin: 0 }}>¿Cómo quieres registrarla?</p>
                <button onClick={() => { setModoCaptura('foto'); setErrorMsg(''); setTimeout(() => fileRef.current?.click(), 100); }} style={{ background: 'var(--accent-blue)', color: '#fff', border: 'none', padding: '16px', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'center' }}>
                  📸 Subir foto (la IA detecta todos los trabajos)
                </button>
                <button onClick={() => { setModoCaptura('manual'); setErrorMsg(''); }} style={{ background: 'var(--bg-card)', color: 'var(--text-primary)', border: '1px solid var(--border-subtle)', padding: '16px', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'center' }}>
                  ✍️ Ingresar manualmente
                </button>
              </div>
            )}

            {modoCaptura === 'foto' && (
              <div style={{ textAlign: 'center', padding: '20px 0' }}>
                <input ref={fileRef} type="file" accept="image/*" onChange={handleFileChange} style={{ display: 'none' }} />
                {procesando ? (
                  <div>
                    <div style={{ fontSize: '40px', marginBottom: '12px' }}>⏳</div>
                    <div style={{ fontSize: '14px', color: 'var(--text-primary)', fontWeight: 600 }}>Analizando con IA...</div>
                    <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '6px' }}>Detectando todos los trabajos en la orden</div>
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '12px' }}>Selecciona una foto desde tu dispositivo</div>
                    <button onClick={() => fileRef.current?.click()} style={{ background: 'var(--accent-blue)', color: '#fff', border: 'none', padding: '10px 20px', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '13px', fontWeight: 600 }}>Elegir archivo</button>
                  </div>
                )}
              </div>
            )}

            {modoCaptura === 'manual' && (
              <div style={{ display: 'grid', gap: '14px' }}>
                {form.fotoTemp && (
                  <div style={{ background: 'rgba(91,141,239,0.1)', border: '1px solid rgba(91,141,239,0.3)', padding: '10px', borderRadius: '8px', display: 'flex', alignItems: 'center', gap: '10px' }}>
                    <img src={form.fotoTemp} alt="Foto de la orden" style={{ width: '60px', height: '60px', objectFit: 'cover', borderRadius: '4px' }} />
                    <div style={{ fontSize: '12px', color: 'var(--text-primary)' }}>📸 Foto adjunta. Revisa los datos extraídos abajo y corrige si hace falta antes de guardar.</div>
                  </div>
                )}

                {/* Datos generales */}
                <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 2fr', gap: '10px' }}>
                  <div>
                    <label style={labelStyle}>Folio</label>
                    <input type="text" value={form.folio} onChange={(e) => setForm({ ...form, folio: e.target.value })} placeholder="ZL-0001" style={inputStyle} />
                  </div>
                  <div>
                    <label style={labelStyle}>Doctor *</label>
                    <input list="lista-doctores-ord" type="text" value={form.doctor} onChange={(e) => setForm({ ...form, doctor: e.target.value })} placeholder="Dr. Pérez (escribe o elige)" style={inputStyle} />
                    <datalist id="lista-doctores-ord">
                      {(JSON.parse(localStorage.getItem('doctoresLab') || '[]')).map(d => <option key={d.id} value={d.nombre} />)}
                    </datalist>
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Paciente *</label>
                  <input type="text" value={form.paciente} onChange={(e) => setForm({ ...form, paciente: e.target.value })} placeholder="Juan García" style={inputStyle} />
                </div>

                {/* Lista de trabajos */}
                <div style={{ marginTop: '4px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                    <label style={{ ...labelStyle, fontSize: '12px', color: 'var(--text-primary)' }}>Trabajos en esta orden ({form.trabajos.length})</label>
                    <button onClick={agregarTrabajo} style={{ background: 'rgba(91,141,239,0.2)', color: 'var(--accent-blue)', border: '1px solid var(--accent-blue)', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>➕ Agregar trabajo</button>
                  </div>
                  <div style={{ display: 'grid', gap: '10px' }}>
                    {form.trabajos.map((t, idx) => (
                      <div key={t.id} style={{ background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: '8px', padding: '12px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                          <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-secondary)' }}>Trabajo #{idx + 1}</div>
                          {form.trabajos.length > 1 && (
                            <button onClick={() => quitarTrabajo(t.id)} style={{ background: 'transparent', border: 'none', color: '#EF4444', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>✕ Quitar</button>
                          )}
                        </div>
                        <div style={{ display: 'grid', gap: '8px' }}>
                          <div>
                            <label style={labelStyle}>Tipo</label>
                            <input list={`trabajos-${t.id}`} type="text" value={t.tipo} onChange={(e) => updateTrabajo(t.id, 'tipo', e.target.value)} placeholder="Corona Zirconia" style={inputStyle} />
                            <datalist id={`trabajos-${t.id}`}>
                              {TIPOS_TRABAJO_COMUNES.map(tt => <option key={tt} value={tt} />)}
                            </datalist>
                          </div>
                          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '8px' }}>
                            <div>
                              <label style={labelStyle}>Dientes</label>
                              <input type="text" value={t.dientes} onChange={(e) => updateTrabajo(t.id, 'dientes', e.target.value)} placeholder="11, 12" style={inputStyle} />
                            </div>
                            <div>
                              <label style={labelStyle}>Unidades</label>
                              <input type="number" min="1" value={t.unidades} onChange={(e) => updateTrabajo(t.id, 'unidades', e.target.value)} style={inputStyle} />
                            </div>
                            <div>
                              <label style={labelStyle}>Color</label>
                              <input list={`colores-${t.id}`} type="text" value={t.color} onChange={(e) => updateTrabajo(t.id, 'color', e.target.value)} placeholder="A2" style={inputStyle} />
                              <datalist id={`colores-${t.id}`}>
                                {COLORES_VITA.map(c => <option key={c} value={c} />)}
                              </datalist>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* TIPO DE IMPRESIÓN */}
                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: '8px', padding: '12px' }}>
                  <label style={{ ...labelStyle, marginBottom: 8, fontSize: 12, color: 'var(--text-primary)' }}>📐 ¿Cómo se hizo el modelo?</label>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
                    {[
                      { id: 'fisica',  label: '📋 Física',  desc: 'Papel impreso' },
                      { id: 'digital', label: '💻 Digital', desc: 'Doctor envió STL' },
                      { id: 'escaneo', label: '🔍 Escaneo', desc: 'Lo hizo Abril/Juan' }
                    ].map(opt => (
                      <button key={opt.id} type="button" onClick={() => setForm({ ...form, tipoImpresion: opt.id })}
                        style={{
                          padding: '10px 8px',
                          background: form.tipoImpresion === opt.id ? 'var(--mod-ordenes)' : 'var(--bg-input)',
                          color: form.tipoImpresion === opt.id ? '#fff' : 'var(--text-secondary)',
                          border: form.tipoImpresion === opt.id ? '1px solid var(--mod-ordenes)' : '1px solid var(--border-subtle)',
                          borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 600,
                          display: 'flex', flexDirection: 'column', gap: 2
                        }}>
                        <span>{opt.label}</span>
                        <span style={{ fontSize: 10, opacity: 0.8, fontWeight: 400 }}>{opt.desc}</span>
                      </button>
                    ))}
                  </div>
                  {form.tipoImpresion === 'escaneo' && (
                    <div style={{ marginTop: 10, padding: 10, background: 'rgba(52,211,153,0.08)', border: '1px solid rgba(52,211,153,0.3)', borderRadius: 6 }}>
                      <div style={{ fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, marginBottom: 4 }}>👥 Escaneo asignado al equipo Abril/Juan</div>
                      <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                        💵 Se genera automáticamente un gasto por cada unidad escaneada en Nómina (configurado en Tarifas: "Escaneo")
                      </div>
                    </div>
                  )}
                </div>

                <div>
                  <label style={labelStyle}>Notas / indicaciones (opcional)</label>
                  <textarea value={form.notas} onChange={(e) => setForm({ ...form, notas: e.target.value })} rows={2} placeholder="Ej: paciente VIP, entrega urgente, ajustar oclusión..." style={{ ...inputStyle, resize: 'vertical', fontFamily: 'inherit' }} />
                </div>

                <button onClick={guardar} style={{ background: 'var(--accent-blue)', color: '#fff', border: 'none', padding: '12px', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '14px', fontWeight: 600, marginTop: '4px' }}>
                  💾 {editandoId ? 'Guardar cambios' : 'Guardar registro'}
                </button>
              </div>
            )}

            {errorMsg && (
              <div style={{ marginTop: '12px', padding: '10px 12px', background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.4)', borderRadius: '6px', color: '#FCA5A5', fontSize: '12px' }}>
                ⚠️ {errorMsg}
              </div>
            )}
          </div>
        </div>
      )}

      {/* LIGHTBOX */}
      {lightboxFoto && (
        <div onClick={() => setLightboxFoto(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 3000, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out', padding: '20px' }}>
          <button onClick={(e) => { e.stopPropagation(); setLightboxFoto(null); }} style={{ position: 'absolute', top: '20px', right: '20px', background: 'rgba(255,255,255,0.15)', border: '2px solid #fff', color: '#fff', width: '44px', height: '44px', borderRadius: '50%', cursor: 'pointer', fontSize: '20px', fontWeight: 700 }}>✕</button>
          <img src={lightboxFoto.data} alt={lightboxFoto.nombre} onClick={(e) => e.stopPropagation()} style={{ maxWidth: '95%', maxHeight: '85vh', objectFit: 'contain', borderRadius: '8px', boxShadow: '0 12px 40px rgba(0,0,0,0.6)' }} />
          <div style={{ marginTop: '16px', color: '#fff', fontSize: '13px', opacity: 0.8 }}>{lightboxFoto.nombre} · Toca fuera para cerrar</div>
        </div>
      )}
    </div>
  );
}

function ProduccionIntegradaModule({ onNavigate }) {
  useZeraSync(); // escucha todos los cambios remotos
  const ordenesGuardadas = localStorage.getItem('produccionOrdenes');
  const INITIAL_ORDERS = ordenesGuardadas ? JSON.parse(ordenesGuardadas) : [
