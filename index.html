    { id: 2, folio: 'ZL-0002', doctor: 'Dra. Rodríguez', paciente: 'Pedro Ruiz', trabajo: 'Puente Metal-Cerámica', dientes: '24, 25, 26', unidades: 3, estado: 'modelos', asignado_a: 'Rafael', historial: [{ fase: 'recepcion', fecha: '2026-05-26 08:00', usuario: 'Itzel', notas: 'Ingresado' }, { fase: 'modelos', fecha: '2026-05-26 14:30', usuario: 'Rafael', notas: 'Modelos en yeso completados' }], fotos_evidencia: [], notas_trabajos: 'Cliente VIP' }
  ];

  const [ordenes, setOrdenes] = React.useState(INITIAL_ORDERS);
  const [selectedOrder, setSelectedOrder] = React.useState(null);
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [showFormularioRecepcion, setShowFormularioRecepcion] = React.useState(false);
  const [formData, setFormData] = React.useState({ folio: '', doctor: '', paciente: '', trabajo: '', dientes: '', unidades: 1, foto_orden: null, foto_base64: null });
  const [procesandoOCR, setProcesandoOCR] = React.useState(false);
  const [showManualMode, setShowManualMode] = React.useState(false); // MODO MANUAL: Toggle entre foto (IA) vs campos manuales

  // Assignment dialog state
  const [assignmentDialog, setAssignmentDialog] = React.useState({ visible: false, orden: null, nuevoEstado: null, asignado: null });
  const [editingAssignment, setEditingAssignment] = React.useState(false);
  // FILTRADO: Monserrat e Itzel son admin-only, no asignables en producción
  const TEAM_MEMBERS = ['Aram', 'Fidel', 'Rafael', 'Kevin', 'Papa'];

  // Financial control state
  const [notaFinancieraDialog, setNotaFinancieraDialog] = React.useState({ visible: false, orden: null, fotoNota: null, montoNota: null, requiresFactura: false, procesando: false });
  const notaFileRef = React.useRef(null);

  // Production Intelligence state
  const [showIntelligencePanel, setShowIntelligencePanel] = React.useState(false);
  const [evidencePhoto, setEvidencePhoto] = React.useState({ visible: false, orden: null, foto: null, validando: false, resultado: null });
  const evidenceFileRef = React.useRef(null);
  const [showDashboard, setShowDashboard] = React.useState(false);

  // Lightbox para ver fotos de evidencia en grande
  const [lightboxFoto, setLightboxFoto] = React.useState(null);

  // Dialog "Listo para entregar" (captura foto orden + nota + folios + factura)
  const [listoEntregarDialog, setListoEntregarDialog] = React.useState({ visible: false, orden: null, fotoOrden: null, fotoNota: null, folioOrden: '', folioNota: '', requiereFactura: false });

  // Function to get default assignment based on destination phase
  const getDefaultAssignment = (nuevoEstado) => {
    if (nuevoEstado === 'escaneo-diseño' || nuevoEstado === 'trabajo-fisico') return 'Aram';
    if (nuevoEstado === 'porcelana') return 'Papa';
    return 'Fidel';
  };

  const handleUpdateAssignment = (newAsignado) => {
    const nuevasOrdenes = ordenes.map(o => {
      if (o.id === selectedOrder.id) {
        setSelectedOrder({ ...selectedOrder, asignado_a: newAsignado });
        return { ...o, asignado_a: newAsignado };
      }
      return o;
    });
    setOrdenes(nuevasOrdenes);
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));
    setEditingAssignment(false);
  };

  // Convierte cualquier imagen a JPEG usando canvas (para formatos como HEIC que Claude no acepta)
  const convertirImagenAJpeg = (file) => {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        // 0.85 = buena calidad, archivo razonable
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error(`El navegador no puede decodificar este formato (${file.type}). Por favor convierte la foto a JPEG o PNG e intenta de nuevo.`));
      };
      img.src = url;
    });
  };

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Claude solo acepta JPEG, PNG, GIF, WEBP. Si el archivo es otro formato
    // (HEIC del iPhone, BMP, TIFF, etc.) lo convertimos a JPEG via canvas.
    const formatosSoportados = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    let mediaType = file.type;
    let base64Inicial;

    setProcesandoOCR(true);

    try {
      if (!formatosSoportados.includes(file.type)) {
        console.log(`🔄 Convirtiendo ${file.type} a JPEG...`);
        base64Inicial = await convertirImagenAJpeg(file);
        mediaType = 'image/jpeg';
        console.log('✅ Conversión exitosa');
      } else {
        // Formato soportado: leer directamente como base64
        base64Inicial = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (ev) => resolve(ev.target.result);
          reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
          reader.readAsDataURL(file);
        });
      }
      console.log('📸 Tipo final:', mediaType);
    } catch (err) {
      console.error('❌ Error preparando imagen:', err);
      alert(`No se pudo procesar la imagen: ${err.message}`);
      setProcesandoOCR(false);
      return;
    }

    const base64 = base64Inicial;
    setFormData(prev => ({ ...prev, foto_base64: base64, foto_orden: file.name }));

    // Continuar con el procesamiento (envoltura async para mantener estructura)
    await (async () => {
      try {
        // Extraer base64 sin prefijo
        const base64Data = base64.includes(',') ? base64.split(',')[1] : base64;
        console.log('🔄 Base64 extraído, longitud:', base64Data.length);

        // Usar Claude API con Vision para procesar la orden (via Netlify Function)
        const response = await fetch('/.netlify/functions/claude-proxy', {
          method: 'POST',
          headers: {
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            model: 'claude-3-5-haiku-20241022',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: mediaType, data: base64Data }
                },
                {
                  type: 'text',
                  text: `Eres un experto analizando órdenes de trabajo de laboratorio dental.

ANALIZA esta imagen Y EXTRAE EXACTAMENTE estos 5 campos en JSON:
- folio: Código/número identificador (ej: ZL-0001, L-2024-001)
- doctor: Nombre del dentista/doctor
- paciente: Nombre completo del paciente
- trabajo: Tipo de prótesis/trabajo (ej: Corona Zirconia, Puente, Inlay, etc)
- dientes: Lista de números de dientes (ej: "11, 12, 13" o "1.1, 1.2, 2.1")

Si un campo NO está visible o no lo encuentras, usa: "No especificado"

RESPONDE SOLO CON ESTE JSON, SIN EXPLICACIONES:
{"folio":"","doctor":"","paciente":"","trabajo":"","dientes":""}`
                }
              ]
            }]
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          console.error('❌ Error de API HTTP:', response.status, errorData);
          throw new Error(`HTTP ${response.status}: ${errorData.error?.message || errorData.message || 'Error desconocido'}`);
        }

        const data = await response.json();
        console.log('✅ Respuesta de Claude:', data);

        const contenido = data.content?.[0]?.text || '';
        if (!contenido) {
          console.error('❌ Claude no retornó contenido');
          throw new Error('Claude no retornó contenido. Intenta nuevamente.');
        }

        console.log('📄 Contenido de respuesta:', contenido);

        // Parsing mejorado del JSON
        let datosExtraidos = {};
        try {
          // Buscar JSON - intentar parse directo primero, luego regex
          let jsonStr = contenido.trim();

          // Si empieza/termina con markdown code block, remover
          jsonStr = jsonStr.replace(/^```json\s*/i, '').replace(/```\s*$/, '');
          jsonStr = jsonStr.replace(/^```\s*/i, '').replace(/```\s*$/, '');

          // Intentar JSON parse directo
          try {
            datosExtraidos = JSON.parse(jsonStr);
            console.log('✅ JSON parseado directamente:', datosExtraidos);
          } catch (e) {
            // Si falla, usar regex para buscar { ... }
            const jsonMatch = jsonStr.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              datosExtraidos = JSON.parse(jsonMatch[0]);
              console.log('✅ JSON parseado con regex:', datosExtraidos);
            } else {
              throw new Error('No se encontró JSON en la respuesta');
            }
          }
        } catch (parseErr) {
          console.error('❌ Error parseando JSON:', parseErr.message);
          console.error('Contenido recibido:', contenido);
          throw new Error(`Error parseando respuesta: ${parseErr.message}`);
        }

        // Validar que tenemos al menos ALGO
        const tieneDatos = Object.values(datosExtraidos).some(v => v && v !== 'No especificado');
        if (!tieneDatos) {
          throw new Error('Claude no pudo extraer datos de la imagen. Intenta con una foto más clara.');
        }

        console.log('🦷 Dientes detectados:', datosExtraidos.dientes);

        setFormData(prev => ({
          ...prev,
          folio: datosExtraidos.folio || prev.folio,
          doctor: datosExtraidos.doctor || prev.doctor,
          paciente: datosExtraidos.paciente || prev.paciente,
          trabajo: datosExtraidos.trabajo || prev.trabajo,
          dientes: datosExtraidos.dientes || prev.dientes
        }));

        alert('✅ Foto procesada correctamente con IA.\n\n📋 Verifica los datos:\n• Folio: ' + (datosExtraidos.folio || '?') + '\n• Doctor: ' + (datosExtraidos.doctor || '?') + '\n• Paciente: ' + (datosExtraidos.paciente || '?') + '\n• Trabajo: ' + (datosExtraidos.trabajo || '?'));
      } catch (err) {
        console.error('❌ Error CRÍTICO en handleFileUpload:', err);
        const mensajeError = err.message || 'Error desconocido del sistema';
        alert(`⚠️ Error procesando foto:\n\n${mensajeError}\n\n💡 Opciones:\n• Usa "✍️ Modo Manual" para ingresar datos sin foto\n• Intenta con imagen más clara\n• Verifica conexión a internet`);
      } finally {
        setProcesandoOCR(false);
      }
    })();
  };

  // Mueve una orden a un nuevo estado y dispara los efectos automáticos correspondientes
  const handleMoverOrden = (orderId, nuevoEstado) => {
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const nuevasOrdenes = ordenes.map(o => {
      if (o.id === orderId) {
        return { ...o, estado: nuevoEstado, historial: [...(o.historial || []), { fase: nuevoEstado, fecha: fecha, usuario: o.asignado_a || 'Sistema', notas: `Movido a ${PRODUCTION_PHASES.find(p => p.id === nuevoEstado)?.label}` }] };
      }
      return o;
    });
    setOrdenes(nuevasOrdenes);
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));
    const actualizada = nuevasOrdenes.find(o => o.id === orderId);
    if (selectedOrder && selectedOrder.id === orderId) {
      setSelectedOrder(actualizada);
    }

    // EFECTOS AUTOMÁTICOS según fase destino:
    if (nuevoEstado === 'sinterizado') {
      enlazarSinterizadoLabExterno(actualizada);
    }

    if (nuevoEstado === 'calidad' || nuevoEstado === 'entregar' || nuevoEstado === 'entregado') {
      procesarTrabajoCompletado(actualizada);
    }
  };

  const handleDragStart = (e, order) => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('orderId', order.id); };
  const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

  const handleDrop = (e, nuevoEstado) => {
    e.preventDefault();
    const orderId = parseInt(e.dataTransfer.getData('orderId'));
    const orden = ordenes.find(o => o.id === orderId);
    if (orden && orden.estado !== nuevoEstado) {
      // Mover directamente sin dialog
      const ahora = new Date();
      const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const defaultAsignado = getDefaultAssignment(nuevoEstado);
      const nuevasOrdenes = ordenes.map(o => {
        if (o.id === orderId) {
          return { ...o, estado: nuevoEstado, asignado_a: defaultAsignado, historial: [...o.historial, { fase: nuevoEstado, fecha: fecha, usuario: defaultAsignado, notas: `Movido a ${PRODUCTION_PHASES.find(p => p.id === nuevoEstado)?.label}` }] };
        }
        return o;
      });
      setOrdenes(nuevasOrdenes);
      localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));

      const ordenActualizada = nuevasOrdenes.find(o => o.id === orderId);

      // Al llegar a SINTERIZADO: enlazar con Lab Externo + auto-gasto
      if (nuevoEstado === 'sinterizado') {
        enlazarSinterizadoLabExterno(ordenActualizada);
      }

      // Al llegar a CALIDAD (y siguientes), disparar cobros + comisiones + mensajería
      if (nuevoEstado === 'calidad' || nuevoEstado === 'entregar' || nuevoEstado === 'entregado') {
        procesarTrabajoCompletado(ordenActualizada);
      }
    }
  };

  // Helper para enlazar sinterizado con lab externo y registrar gasto
  const enlazarSinterizadoLabExterno = (orden) => {
    if (!orden) return;
    const labItems = JSON.parse(localStorage.getItem('labExternoSinterizado') || '[]');
    if (labItems.some(i => i.ordenId === orden.id)) return; // ya existe

    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX');
    const costoUSD = 5;
    const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5;

    labItems.unshift({
      id: Date.now(),
      ordenId: orden.id,
      folio: orden.folio,
      doctor: orden.doctor,
      paciente: orden.paciente,
      trabajo: orden.trabajo,
      unidades: orden.unidades || 1,
      estado: 'pendiente',
      costo: costoUSD,
      moneda: 'USD',
      fechaEnvio: fecha,
      fechaEnvioISO: ahora.toISOString(),
      fechaTerminado: null
    });
    localStorage.setItem('labExternoSinterizado', JSON.stringify(labItems));

    // Registrar gasto en costosOrdenes para que aparezca en Finanzas → egresos
    const costos = JSON.parse(localStorage.getItem('costosOrdenes') || '[]');
    if (!costos.some(c => c.orderId === orden.id && c.trabajo?.includes('Sinterizado'))) {
      costos.unshift({
        id: Date.now() + 1,
        orderId: orden.id,
        folio: orden.folio,
        trabajo: `Sinterizado externo — ${orden.folio}`,
        unidades: 1,
        costoUnitario: costoUSD * tc,
        costoTotal: costoUSD * tc,
        moneda: 'MXN',
        montoOriginal: costoUSD,
        monedaOriginal: 'USD',
        fecha,
        fechaISO: ahora.toISOString(),
        estado: 'pendiente'
      });
      localStorage.setItem('costosOrdenes', JSON.stringify(costos));
    }
  };

  const confirmarAsignacion = () => {
    if (!assignmentDialog.orden || !assignmentDialog.nuevoEstado) return;

    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const nuevasOrdenes = ordenes.map(o => {
      if (o.id === assignmentDialog.orden.id) {
        return { ...o, estado: assignmentDialog.nuevoEstado, asignado_a: assignmentDialog.asignado, historial: [...o.historial, { fase: assignmentDialog.nuevoEstado, fecha: fecha, usuario: assignmentDialog.asignado, notas: `Movido a ${PRODUCTION_PHASES.find(p => p.id === assignmentDialog.nuevoEstado)?.label}` }] };
      }
      return o;
    });
    setOrdenes(nuevasOrdenes);
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));

    const ordenActualizada = nuevasOrdenes.find(o => o.id === assignmentDialog.orden.id);

    // Al llegar a SINTERIZADO: enlazar con Lab Externo + auto-gasto
    if (assignmentDialog.nuevoEstado === 'sinterizado') {
      enlazarSinterizadoLabExterno(ordenActualizada);
    }

    // Al llegar a CALIDAD (y siguientes), disparar cobros + comisiones + mensajería
    if (assignmentDialog.nuevoEstado === 'calidad' || assignmentDialog.nuevoEstado === 'entregar' || assignmentDialog.nuevoEstado === 'entregado') {
      procesarTrabajoCompletado(ordenActualizada);
    }

    setAssignmentDialog({ visible: false, orden: null, nuevoEstado: null, asignado: null });
  };

  const calcularCostoOrden = (trabajo, unidades) => {
    const tarifas = JSON.parse(localStorage.getItem('tarifasPrecios') || '[]');
    const tarifa = tarifas.find(t => t.tipo.toLowerCase() === trabajo.toLowerCase());
    return tarifa ? tarifa.costoBase * unidades : 0;
  };

  const calcularDiasParaEntrega = (fechaEntrega) => {
    if (!fechaEntrega) return null;
    const entrega = new Date(fechaEntrega);
    const hoy = new Date();
    hoy.setHours(0, 0, 0, 0);
    entrega.setHours(0, 0, 0, 0);
    const dias = Math.ceil((entrega - hoy) / (1000 * 60 * 60 * 24));
    return dias;
  };

  const registrarCostoOrden = (orderId, costo, trabajo, unidades) => {
    const costos = JSON.parse(localStorage.getItem('costosOrdenes') || '[]');
    costos.push({
      id: Date.now(),
      orderId: orderId,
      trabajo: trabajo,
      unidades: unidades,
      costoUnitario: costo / unidades,
      costoTotal: costo,
      fecha: new Date().toLocaleString('es-MX'),
      estado: 'pendiente'
    });
    localStorage.setItem('costosOrdenes', JSON.stringify(costos));
  };

  const handleAgregarOrden = () => {
    if (!formData.folio || !formData.doctor || !formData.paciente) { alert('Completa folio, doctor y paciente'); return; }
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const usuarioActual = localStorage.getItem('usuarioActual') || 'Sistema';
    const fotosEvidencia = formData.foto_base64 ? [{ nombre: formData.foto_orden, data: formData.foto_base64, fecha: fecha }] : [];
    const costo = calcularCostoOrden(formData.trabajo, formData.unidades);
    const nuevoOrden = { id: Math.max(...ordenes.map(o => o.id), 0) + 1, folio: formData.folio, doctor: formData.doctor, paciente: formData.paciente, trabajo: formData.trabajo, dientes: formData.dientes, unidades: formData.unidades, costo: costo, estado: 'recepcion', asignado_a: usuarioActual, historial: [{ fase: 'recepcion', fecha: fecha, usuario: usuarioActual, notas: formData.foto_orden ? `Orden ingresada con foto: ${formData.foto_orden}` : 'Ingresado manualmente' }], fotos_evidencia: fotosEvidencia, notas_trabajos: '' };
    registrarCostoOrden(nuevoOrden.id, costo, formData.trabajo, formData.unidades);
    const nuevasOrdenes = [...ordenes, nuevoOrden];
    setOrdenes(nuevasOrdenes);
    localStorage.setItem('produccionOrdenes', JSON.stringify(nuevasOrdenes));
    setFormData({ folio: '', doctor: '', paciente: '', trabajo: '', dientes: '', unidades: 1, foto_orden: null, foto_base64: null });
    setShowFormularioRecepcion(false);
  };

  const openDrawer = (order) => { setSelectedOrder(order); setDrawerOpen(true); };
  const closeDrawer = () => { setDrawerOpen(false); setTimeout(() => setSelectedOrder(null), 300); };
  const getOrdenesPorFase = (faseId) => ordenes.filter(o => o.estado === faseId);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', gap: '16px', padding: '20px', background: 'var(--bg-primary)', overflow: 'hidden' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px' }}>
        <SectionHeader title="Producción" subtitle="Arrastra órdenes entre fases | Haz clic en Paciente/Doctor para detalles" color="var(--mod-produccion)" icon="🏭" />
      </div>

      {showFormularioRecepcion && (
        <div style={{ background: 'var(--bg-card)', padding: '20px', borderRadius: 'var(--radius-lg)', border: '2px solid var(--mod-produccion)', marginBottom: '16px', maxHeight: '80vh', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
            <h3 style={{ margin: 0, color: 'var(--text-primary)' }}>📥 Registrar Nueva Orden</h3>
            {/* MODO MANUAL TOGGLE */}
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              <button
                onClick={() => setShowManualMode(false)}
                style={{
                  padding: '8px 14px', background: !showManualMode ? 'var(--mod-produccion)' : 'var(--bg-input)',
                  color: !showManualMode ? '#fff' : 'var(--text-secondary)', border: '1px solid var(--border-subtle)',
                  borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '12px', fontWeight: 600
                }}
              >
                📸 Con Foto (IA)
              </button>
              <button
                onClick={() => setShowManualMode(true)}
                style={{
                  padding: '8px 14px', background: showManualMode ? 'var(--mod-produccion)' : 'var(--bg-input)',
                  color: showManualMode ? '#fff' : 'var(--text-secondary)', border: '1px solid var(--border-subtle)',
                  borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '12px', fontWeight: 600
                }}
              >
                ✍️ Modo Manual
              </button>
            </div>
          </div>

          {/* SECCIÓN FOTO (IA) - Solo cuando showManualMode es false */}
          {!showManualMode && (
          <div style={{ marginBottom: '16px', padding: '12px', background: 'var(--bg-input)', borderRadius: 'var(--radius-md)', border: '2px dashed var(--mod-produccion)' }}>
            <label style={{ display: 'block', marginBottom: '8px', fontSize: '13px', fontWeight: 600, color: 'var(--mod-produccion)' }}>📸 Foto de Orden (IA procesará automáticamente)</label>
            <input
              type="file"
              accept="image/*"
              onChange={handleFileUpload}
              disabled={procesandoOCR}
              style={{ padding: '8px', width: '100%', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', cursor: procesandoOCR ? 'not-allowed' : 'pointer' }}
            />
            {procesandoOCR && <div style={{ color: 'var(--info)', fontSize: '12px', marginTop: '8px', fontWeight: 600 }}>🔄 Procesando con IA...</div>}
            {formData.foto_orden && <div style={{ color: 'var(--success)', fontSize: '12px', marginTop: '8px', fontWeight: 600 }}>✅ {formData.foto_orden}</div>}

            {/* VISTA PREVIA GRANDE DE LA IMAGEN */}
            {formData.foto_base64 && (
              <div style={{ marginTop: '16px', padding: '16px', background: 'var(--bg-secondary)', borderRadius: 'var(--radius-md)', border: '2px solid var(--mod-produccion)', textAlign: 'center' }}>
                <div style={{ fontSize: '13px', fontWeight: 700, color: 'var(--mod-produccion)', marginBottom: '12px' }}>📋 VISTA PREVIA DE LA ORDEN</div>
                <img
                  src={formData.foto_base64}
                  alt="Foto de orden"
                  style={{ width: '100%', height: 'auto', maxHeight: '400px', borderRadius: 'var(--radius-md)', objectFit: 'contain', border: '2px solid var(--border-subtle)', backgroundColor: '#000' }}
                />
                <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '12px' }}>⬆️ Campos detectados se llenarán automáticamente abajo</div>
              </div>
            )}
          </div>
          )}

          {/* SECCIÓN MODO MANUAL - Solo cuando showManualMode es true */}
          {showManualMode && (
          <div style={{ marginBottom: '16px', padding: '16px', background: 'var(--bg-input)', borderRadius: 'var(--radius-md)', border: '2px dashed var(--mod-produccion)' }}>
            <label style={{ display: 'block', marginBottom: '16px', fontSize: '14px', fontWeight: 700, color: 'var(--mod-produccion)' }}>✍️ Ingresa los datos manualmente</label>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
              <input type="text" placeholder="Folio" value={formData.folio} onChange={(e) => setFormData({...formData, folio: e.target.value})} style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }} />
              <input type="text" placeholder="Doctor" value={formData.doctor} onChange={(e) => setFormData({...formData, doctor: e.target.value})} style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }} />
              <input type="text" placeholder="Paciente" value={formData.paciente} onChange={(e) => setFormData({...formData, paciente: e.target.value})} style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }} />
              <select value={formData.trabajo} onChange={(e) => setFormData({...formData, trabajo: e.target.value})} style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }}>
                <option value="">Tipo de prótesis</option>
                {PROTESIS_TIPOS.map(tipo => <option key={tipo.id} value={tipo.label}>{tipo.label}</option>)}
              </select>
              <input type="text" placeholder="Dientes (ej: 11, 12, 21)" value={formData.dientes} onChange={(e) => setFormData({...formData, dientes: e.target.value})} style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }} />
              <input type="number" placeholder="Unidades" value={formData.unidades} onChange={(e) => setFormData({...formData, unidades: parseInt(e.target.value)})} min="1" style={{ padding: '12px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: '13px' }} />
            </div>
          </div>
          )}

          {/* CAMPOS RELLENADOS POR IA (si existen) */}
          {!showManualMode && (formData.doctor || formData.paciente || formData.trabajo) && (
            <div style={{ marginBottom: '16px', padding: '16px', background: 'var(--success)20', borderRadius: 'var(--radius-md)', border: '2px solid var(--success)', borderLeft: '4px solid var(--success)' }}>
              <div style={{ fontSize: '13px', fontWeight: 700, color: 'var(--success)', marginBottom: '12px' }}>✅ DATOS DETECTADOS POR IA</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', fontSize: '12px' }}>
                {formData.folio && <div><span style={{ color: 'var(--text-secondary)' }}>Folio:</span> <strong style={{ color: 'var(--text-primary)' }}>{formData.folio}</strong></div>}
                {formData.doctor && <div><span style={{ color: 'var(--text-secondary)' }}>Doctor:</span> <strong style={{ color: 'var(--text-primary)' }}>{formData.doctor}</strong></div>}
                {formData.paciente && <div><span style={{ color: 'var(--text-secondary)' }}>Paciente:</span> <strong style={{ color: 'var(--text-primary)' }}>{formData.paciente}</strong></div>}
                {formData.trabajo && <div><span style={{ color: 'var(--text-secondary)' }}>Trabajo:</span> <strong style={{ color: 'var(--text-primary)' }}>{formData.trabajo}</strong></div>}
                {formData.dientes && <div><span style={{ color: 'var(--text-secondary)' }}>Dientes:</span> <strong style={{ color: 'var(--text-primary)' }}>{formData.dientes}</strong></div>}
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: '8px', marginTop: 'auto' }}>
            <button onClick={handleAgregarOrden} style={{ padding: '12px 16px', background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 600, flex: 1, fontSize: '14px' }}>✅ Guardar Orden</button>
            <button onClick={() => setShowFormularioRecepcion(false)} style={{ padding: '12px 16px', background: 'var(--bg-card-hover)', color: '#fff', border: '1px solid var(--border-medium)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 600, fontSize: '14px' }}>✕ Cancelar</button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', gap: '16px', flex: 1, overflow: 'auto', paddingRight: '8px', minHeight: 0 }}>
        {PRODUCTION_PHASES.map(phase => (
          <div key={phase.id} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, phase.id)} style={{ flex: '0 0 280px', background: 'var(--bg-card)', borderRadius: 'var(--radius-lg)', border: `2px solid ${phase.color}`, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}>
            <div style={{ background: `${phase.color}20`, borderBottom: `2px solid ${phase.color}`, padding: '12px', minHeight: 0 }}>
              <div style={{ fontSize: '14px', fontWeight: 700, color: phase.color }}>{phase.label}</div>
              <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '4px' }}>{phase.desc}</div>
              <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '6px' }}>{getOrdenesPorFase(phase.id).length} órdenes</div>
            </div>
            <div style={{ flex: 1, overflow: 'auto', padding: '12px', display: 'flex', flexDirection: 'column', gap: '10px', minHeight: 0 }}>
              {getOrdenesPorFase(phase.id).map(orden => {
                const diasEntrega = orden.fechaEntrega ? calcularDiasParaEntrega(orden.fechaEntrega) : null;
                const colorAlerta = diasEntrega !== null ? (diasEntrega < 0 ? '#EF4444' : diasEntrega === 0 ? '#FBBF24' : diasEntrega <= 2 ? '#F97316' : '#34D399') : 'transparent';
                return (
                  <div key={orden.id} draggable onDragStart={(e) => handleDragStart(e, orden)} onClick={() => openDrawer(orden)} style={{ background: 'var(--bg-secondary)', border: `2px solid ${phase.color}40`, borderRadius: 'var(--radius-md)', padding: '12px', cursor: 'grab', transition: 'all 0.2s', borderTop: `3px solid ${colorAlerta}` }} onMouseEnter={(e) => e.target.style.transform = 'translateY(-2px)'} onMouseLeave={(e) => e.target.style.transform = 'none'}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' }}>
                      <div style={{ fontSize: '13px', fontWeight: 700, color: 'var(--text-primary)' }}>{orden.folio}</div>
                      {diasEntrega !== null && (
                        <div style={{ fontSize: '10px', fontWeight: 700, padding: '2px 6px', borderRadius: '3px', background: colorAlerta + '22', color: colorAlerta }}>
                          {diasEntrega < 0 ? `⏰ VENCIDA` : diasEntrega === 0 ? `⚠️ HOY` : `📅 ${diasEntrega}d`}
                        </div>
                      )}
                    </div>
                    <div style={{ fontSize: '12px', color: 'var(--text-secondary)', marginTop: '4px' }}>👨‍⚕️ {orden.doctor}</div>
                    <div style={{ fontSize: '12px', color: 'var(--text-secondary)', cursor: 'pointer' }}>👤 {orden.paciente}</div>
                    <div style={{ fontSize: '12px', color: phase.color, marginTop: '6px', fontWeight: 600 }}>{orden.trabajo}</div>
                    {orden.costo > 0 && <div style={{ fontSize: '11px', color: 'var(--mod-finanzas)', marginTop: '4px', fontWeight: 700 }}>💰 ${orden.costo.toLocaleString('es-MX')}</div>}
                    {orden.asignado_a && <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '6px', background: 'var(--bg-input)', padding: '4px 8px', borderRadius: '4px' }}>👨‍🔧 {orden.asignado_a}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {drawerOpen && selectedOrder && (
        <div style={{ position: 'fixed', top: 0, right: 0, bottom: 0, left: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'flex-end', zIndex: 1000 }}>
          <div style={{ width: '450px', height: '100%', background: 'var(--bg-primary)', borderLeft: '3px solid var(--mod-produccion)', display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
            <div style={{ background: 'var(--mod-produccion)', color: '#fff', padding: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div><div style={{ fontSize: '18px', fontWeight: 700 }}>{selectedOrder.folio}</div><div style={{ fontSize: '13px', opacity: 0.9, marginTop: '4px' }}>{selectedOrder.paciente}</div></div>
              <button onClick={closeDrawer} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: '#fff', fontSize: '20px', cursor: 'pointer', width: '40px', height: '40px', borderRadius: '50%' }}>✕</button>
            </div>
            <div style={{ padding: '20px', flex: 1, overflowY: 'auto' }}>
              <div style={{ marginBottom: '24px' }}>
                <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '12px' }}>📋 INFORMACIÓN</h3>
                <div style={{ display: 'grid', gap: '10px', fontSize: '13px' }}>
                  <div><span style={{ color: 'var(--text-secondary)' }}>👨‍⚕️ Doctor:</span> <span style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{selectedOrder.doctor}</span></div>
                  <div><span style={{ color: 'var(--text-secondary)' }}>👤 Paciente:</span> <span style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{selectedOrder.paciente}</span></div>
                  <div><span style={{ color: 'var(--text-secondary)' }}>🦷 Trabajo:</span> <span style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{selectedOrder.trabajo}</span></div>
                  <div style={{ background: 'var(--accent-blue-soft)', padding: '10px', borderRadius: 'var(--radius-md)', borderLeft: '3px solid var(--accent-blue)' }}>
                    <span style={{ color: 'var(--text-secondary)', fontSize: '12px' }}>👨‍🔧 TRABAJA:</span>
                    {!editingAssignment ? (
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '4px' }}>
                        <div style={{ color: 'var(--accent-blue)', fontWeight: 700, fontSize: '14px' }}>{selectedOrder.asignado_a || '⚠️ Sin asignar'}</div>
                        <button onClick={() => setEditingAssignment(true)} style={{ background: 'rgba(91, 141, 239, 0.3)', border: 'none', color: 'var(--accent-blue)', padding: '4px 8px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px', fontWeight: 600 }}>✏️ Editar</button>
                      </div>
                    ) : (
                      <div style={{ marginTop: '8px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px' }}>
                        {TEAM_MEMBERS.map(member => (
                          <button
                            key={member}
                            onClick={() => handleUpdateAssignment(member)}
                            style={{
                              padding: '8px 12px',
                              background: selectedOrder.asignado_a === member ? 'var(--accent-blue)' : 'rgba(91, 141, 239, 0.2)',
                              color: selectedOrder.asignado_a === member ? '#fff' : 'var(--accent-blue)',
                              border: 'none',
                              borderRadius: '4px',
                              cursor: 'pointer',
                              fontSize: '11px',
                              fontWeight: 600,
                              transition: 'all 0.2s'
                            }}
                          >
                            {member}
                          </button>
                        ))}
                        <button
                          onClick={() => setEditingAssignment(false)}
                          style={{ gridColumn: '1 / -1', padding: '8px 12px', background: 'transparent', color: 'var(--accent-blue)', border: '1px solid var(--accent-blue)', borderRadius: '4px', cursor: 'pointer', fontSize: '11px', fontWeight: 600 }}
                        >
                          ✕ Cerrar
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {selectedOrder.estado === 'calidad' && (
                <div style={{ marginBottom: '24px', padding: '16px', background: 'rgba(52, 211, 153, 0.1)', borderRadius: 'var(--radius-md)', border: '2px solid rgba(52, 211, 153, 0.3)' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: 700, color: '#34D399', marginBottom: '8px' }}>✅ CONTROL DE CALIDAD</h3>
                  <p style={{ fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '12px' }}>Cuando esté aprobada, captura las fotos y pasa a "Entregar".</p>
                  <button
                    onClick={() => setListoEntregarDialog({ visible: true, orden: selectedOrder, fotoOrden: null, fotoNota: null, folioOrden: selectedOrder.folio || '', folioNota: '', requiereFactura: false })}
                    style={{ width: '100%', padding: '12px 16px', background: '#FBBF24', color: '#000', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 700, fontSize: '13px' }}
                  >
                    📸 Listo para entregar (capturar fotos + nota)
                  </button>
                </div>
              )}

              {selectedOrder.estado === 'entregar' && (
                <div style={{ marginBottom: '24px', padding: '16px', background: 'rgba(251, 191, 36, 0.1)', borderRadius: 'var(--radius-md)', border: '2px solid rgba(251, 191, 36, 0.4)' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: 700, color: '#FBBF24', marginBottom: '8px' }}>📦 LISTA PARA ENTREGAR</h3>
                  <p style={{ fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '12px' }}>Kevin debe llevar esta orden al doctor. Al confirmar la entrega se generará:<br />• Cobro pendiente para el doctor<br />• Comisión si aplica (Fidel/porcelana, etc.)<br />• Tarea para mensajería</p>
                  <button
                    onClick={() => {
                      if (confirm('¿Confirmar que esta orden YA fue entregada al doctor? Esto generará el cobro y las comisiones.')) {
                        handleMoverOrden(selectedOrder.id, 'entregado');
                        setDrawerOpen(false);
                      }
                    }}
                    style={{ width: '100%', padding: '14px 16px', background: '#FBBF24', color: '#000', border: 'none', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontWeight: 700, fontSize: '13px' }}
                  >
                    🚚 Marcar como ENTREGADO
                  </button>
                </div>
              )}

              {selectedOrder.estado === 'entregado' && (
                <div style={{ marginBottom: '24px', padding: '16px', background: 'rgba(156, 163, 175, 0.15)', borderRadius: 'var(--radius-md)', border: '1px solid rgba(156, 163, 175, 0.4)' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: 700, color: '#9CA3AF', marginBottom: '8px' }}>✓ ENTREGADA</h3>
                  <p style={{ fontSize: '12px', color: 'var(--text-secondary)', marginBottom: 0 }}>Esta orden ya fue entregada. El cobro está en <strong>Cobros</strong>, la comisión (si aplica) en <strong>Nómina</strong>.</p>
                </div>
              )}

              {selectedOrder.fotos_evidencia && selectedOrder.fotos_evidencia.length > 0 && (
                <div style={{ marginBottom: '24px' }}>
                  <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '12px' }}>📸 EVIDENCIA FOTOGRÁFICA</h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    {selectedOrder.fotos_evidencia.map((foto, idx) => (
                      <div
                        key={idx}
                        onClick={() => setLightboxFoto(foto)}
                        style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius-md)', overflow: 'hidden', border: '2px solid var(--border-subtle)', cursor: 'pointer', transition: 'transform 0.15s, border-color 0.15s' }}
                        onMouseEnter={(e) => { e.currentTarget.style.transform = 'scale(1.02)'; e.currentTarget.style.borderColor = 'var(--mod-produccion)'; }}
                        onMouseLeave={(e) => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.borderColor = 'var(--border-subtle)'; }}
                      >
                        <div style={{ width: '100%', maxHeight: '200px', overflow: 'hidden', background: '#000', position: 'relative' }}>
                          <img src={foto.data} alt={foto.nombre} style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '0' }} />
                          <div style={{ position: 'absolute', top: '8px', right: '8px', background: 'rgba(0,0,0,0.7)', color: '#fff', padding: '4px 8px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>🔍 Click para ampliar</div>
                        </div>
                        <div style={{ padding: '10px', background: 'var(--bg-input)' }}>
                          <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '4px' }}>{foto.nombre}</div>
                          <div style={{ fontSize: '11px', color: 'var(--text-secondary)' }}>⏰ {foto.fecha}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{ marginBottom: '24px' }}>
                <h3 style={{ fontSize: '14px', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '12px' }}>📅 HISTORIAL</h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {selectedOrder.historial.map((h, idx) => (
                    <div key={idx} style={{ background: 'var(--bg-card)', padding: '10px', borderRadius: 'var(--radius-md)', borderLeft: '3px solid var(--mod-produccion)', fontSize: '12px' }}>
                      <div style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{PRODUCTION_PHASES.find(p => p.id === h.fase)?.label}</div>
                      <div style={{ color: 'var(--text-secondary)', marginTop: '4px' }}>⏰ {h.fecha}</div>
                      <div style={{ color: 'var(--text-secondary)' }}>👤 {h.usuario}</div>
                    </div>
                  ))}
                </div>
              </div>

function CheckinModule({ currentUser, onNavigate }) {
  useZeraSync('checkinData');
  const [checkinLocation, setCheckinLocation] = useState(null);
  const [checkinTime, setCheckinTime] = useState(null);
  const [checkoutTime, setCheckoutTime] = useState(null);
  const [gpsEnabled, setGpsEnabled] = useState(false);
  const [horasHoy, setHorasHoy] = useState(0);

  // Cargar registros guardados de check-in (de localStorage / Supabase)
  const CHECKIN_DATA = React.useMemo(() => {
    try {
      return JSON.parse(localStorage.getItem('checkinData') || '[]');
    } catch {
      return [];
    }
  }, []);

  const allTecnicos = ['Rafael','Aram','Fidel','Kevin','Montserrat'];
  const isAdmin = currentUser && (currentUser.id === 'itzel' || currentUser.id === 'montserrat');
  const tecnicos = isAdmin ? allTecnicos : allTecnicos.filter(t => t.toLowerCase() === (currentUser?.name || '').toLowerCase());

  // Generar los 6 días de la semana actual dinámicamente
  const dias = React.useMemo(() => {
    const hoy = new Date();
    const lunes = new Date(hoy);
    const dow = hoy.getDay(); // 0=domingo, 1=lunes
    const diff = dow === 0 ? -6 : 1 - dow;
    lunes.setDate(hoy.getDate() + diff);
    const result = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(lunes);
      d.setDate(lunes.getDate() + i);
      const nombre = ['Lun','Mar','Mié','Jue','Vie','Sáb'][i];
      result.push(`${nombre} ${d.getDate()}`);
    }
    return result;
  }, []);

  const getRecord = (nombre, dia) => CHECKIN_DATA.find(c => c.nombre === nombre && c.dia === dia);
  const totalHoras = (nombre) => {
    const records = CHECKIN_DATA.filter(c => c.nombre === nombre && c.horas && c.horas !== '0:00');
    if (records.length === 0) return '0.0';
    return records.reduce((sum, r) => {
      const [h, m] = r.horas.split(':').map(Number);
      return sum + h + m / 60;
    }, 0).toFixed(1);
  };

  // Día corto: "Lun 28"
  const diaCortoHoy = () => {
    const hoy = new Date();
    const nombres = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    return `${nombres[hoy.getDay()]} ${hoy.getDate()}`;
  };

  // Calcular horas trabajadas entre entrada/salida (HH:MM)
  const calcularHoras = (entrada, salida) => {
    if (!entrada || !salida) return '0:00';
    const [hci, mci] = entrada.split(':').map(Number);
    const [hco, mco] = salida.split(':').map(Number);
    const mins = Math.max(0, (hco * 60 + mco) - (hci * 60 + mci));
    return `${Math.floor(mins / 60)}:${String(mins % 60).padStart(2, '0')}`;
  };

  // Guardar en checkinData unificado (entrada/salida)
  const guardarRegistro = (tipo, hora, gpsOk) => {
    const data = JSON.parse(localStorage.getItem('checkinData') || '[]');
    const dia = diaCortoHoy();
    const idx = data.findIndex(c => c.nombre === currentUser?.name && c.dia === dia);
    if (idx >= 0) {
      data[idx][tipo] = hora;
      if (gpsOk !== undefined) data[idx].gps = gpsOk;
      if (tipo === 'salida') data[idx].horas = calcularHoras(data[idx].entrada, hora);
    } else {
      const nuevo = { id: Date.now(), nombre: currentUser?.name || 'Usuario', dia, entrada: null, salida: null, horas: '0:00', gps: !!gpsOk, fecha: new Date().toISOString() };
      nuevo[tipo] = hora;
      data.push(nuevo);
    }
    localStorage.setItem('checkinData', JSON.stringify(data));
  };

  // Pre-cargar estado del registro de hoy si existe
  React.useEffect(() => {
    const data = JSON.parse(localStorage.getItem('checkinData') || '[]');
    const hoy = data.find(c => c.nombre === currentUser?.name && c.dia === diaCortoHoy());
    if (hoy) {
      if (hoy.entrada) { setCheckinTime(hoy.entrada); setGpsEnabled(true); }
      if (hoy.salida) {
        setCheckoutTime(hoy.salida);
        const [h, m] = (hoy.horas || '0:00').split(':').map(Number);
        setHorasHoy(parseFloat((h + m / 60).toFixed(1)));
      }
    }
  }, [currentUser?.name]);

  const handleGpsCheckin = () => {
    if (navigator.geolocation) {
      setGpsEnabled(true);
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          const distance = Math.sqrt(Math.pow(latitude - 32.5149, 2) + Math.pow(longitude - (-117.0382), 2)) * 111;
          const isNearLab = distance < 2;
          const ahora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
          setCheckinLocation({ lat: latitude, lon: longitude, near: isNearLab, distance: distance.toFixed(1) });
          setCheckinTime(ahora);
          guardarRegistro('entrada', ahora, isNearLab);
          alert(`✅ Check-in registrado a las ${ahora}\n${isNearLab ? '📍 Ubicación: Laboratorio ✓' : `📍 Ubicación: ${distance.toFixed(1)}km del laboratorio (⚠️ revisar)`}`);
        },
        () => {
          // GPS denegado: registrar igualmente sin GPS
          const ahora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
          setCheckinTime(ahora);
          guardarRegistro('entrada', ahora, false);
          alert(`✅ Check-in registrado a las ${ahora} (sin GPS)`);
        }
      );
    } else {
      const ahora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      setCheckinTime(ahora);
      guardarRegistro('entrada', ahora, false);
      alert(`✅ Check-in registrado a las ${ahora} (GPS no disponible)`);
      setGpsEnabled(true);
    }
  };

  const handleGpsCheckout = () => {
    const horaCheckout = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    setCheckoutTime(horaCheckout);
    guardarRegistro('salida', horaCheckout);

    let horasTrabajadas = 0;
    if (checkinTime) {
      const [hci, mci] = checkinTime.split(':').map(Number);
      const [hco, mco] = horaCheckout.split(':').map(Number);
      const diferencia = Math.max(0, (hco * 60 + mco) - (hci * 60 + mci)) / 60;
      horasTrabajadas = parseFloat(diferencia.toFixed(1));
      setHorasHoy(horasTrabajadas);
    }

    alert(`✅ Checkout registrado a las ${horaCheckout}\n⏰ Horas trabajadas hoy: ${horasTrabajadas} horas`);
  };

  return (
    <div style={{ animation:'fadeIn 0.3s' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
        <SectionHeader title="Asistencia y Check-in" subtitle={isAdmin ? 'Vista completa de todo el equipo' : `Tus registros, ${currentUser?.name}`} color="var(--mod-checkin)" icon="📍" />
        <button onClick={() => onNavigate && onNavigate('dashboard')} style={{ padding: '10px 16px', background: 'var(--bg-card)', color: 'var(--text-secondary)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}>
          ← Volver
        </button>
      </div>

      {!isAdmin && (
        <div style={{ marginBottom:20 }}>
          <SubSection title="Asistencia" color="var(--mod-checkin)">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' }}>
              <button onClick={handleGpsCheckin} disabled={gpsEnabled} style={{ padding:14, borderRadius:'var(--radius-md)', background: gpsEnabled ? 'var(--success)' : 'var(--mod-checkin)', border:'none', color:'#fff', cursor: gpsEnabled ? 'not-allowed' : 'pointer', fontSize:14, fontWeight:700 }}>
                {gpsEnabled ? '✅ Entrada' : '📍 Check-in'}
              </button>
              <button onClick={handleGpsCheckout} disabled={!checkinTime || checkoutTime} style={{ padding:14, borderRadius:'var(--radius-md)', background: checkoutTime ? '#34D399' : (checkinTime && !checkoutTime ? 'var(--warning)' : 'var(--bg-card)'), border:'none', color: checkoutTime || (checkinTime && !checkoutTime) ? '#000' : 'var(--text-muted)', cursor: (checkinTime && !checkoutTime) ? 'pointer' : 'not-allowed', fontSize:14, fontWeight:700 }}>
                {checkoutTime ? '✅ Salida' : (checkinTime ? '🚪 Check-out' : '⏳ Espera entrada')}
              </button>
            </div>

            {checkinTime && (
              <div style={{ padding:14, background:'var(--accent-blue-soft)', borderRadius:'var(--radius-md)', marginBottom: '12px' }}>
                <div style={{ fontSize:13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: '8px' }}>📍 ENTRADA</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>Hora: <strong>{checkinTime}</strong></div>
                {checkinLocation && (
                  <div style={{ fontSize:12, marginTop:4 }}>
                    <div style={{ marginBottom:2 }}>📍 Distancia: {checkinLocation.distance}km del lab</div>
                    <div style={{ color: checkinLocation.near ? 'var(--success)' : 'var(--warning)', fontWeight: 600 }}>
                      {checkinLocation.near ? '✓ Dentro' : '⚠️ Fuera'}
                    </div>
                  </div>
                )}
              </div>
            )}

            {checkoutTime && (
              <div style={{ padding:14, background:'rgba(52, 211, 153, 0.1)', borderRadius:'var(--radius-md)' }}>
                <div style={{ fontSize:13, fontWeight: 700, color: '#34D399', marginBottom: '8px' }}>🚪 SALIDA</div>
                <div style={{ fontSize:12, color:'var(--text-secondary)', marginBottom: '8px' }}>Hora: <strong>{checkoutTime}</strong></div>
                <div style={{ fontSize:13, fontWeight: 700, color: '#34D399' }}>⏰ Hoy: {horasHoy}h</div>
              </div>
            )}
          </SubSection>
        </div>
      )}

      <InfoCard icon="📌" title="Sistema de check-in" description="Registra tu entrada y salida del laboratorio. El sistema verifica tu ubicación para mantener un registro de asistencia preciso." color="var(--mod-checkin)" />

      {tecnicos.map(nombre => (
        <div key={nombre} style={{ marginBottom:16 }}>
          <SubSection title={`${nombre} — ${totalHoras(nombre)}h esta semana`} color="var(--mod-checkin)">
            <div style={{ display:'grid', gridTemplateColumns:`repeat(${dias.length}, 1fr)`, gap:8 }}>
              {dias.map(dia => {
                const r = getRecord(nombre, dia);
                return (
                  <div key={dia} style={{ padding:12, background:'var(--bg-primary)', borderRadius:'var(--radius-md)', textAlign:'center', border:r?.excepcion?'1px solid var(--warning)':'1px solid var(--border-subtle)' }}>
                    <div style={{ fontSize:12, fontWeight:700, color:'var(--text-muted)', marginBottom:6 }}>{dia}</div>
                    {r ? (
                      <>
                        <div style={{ fontSize:14, fontWeight:700, color:'var(--success)' }}>{r.entrada}</div>
                        <div style={{ fontSize:12, color:'var(--text-muted)' }}>→ {r.salida}</div>
                        <div style={{ fontSize:13, fontWeight:700, marginTop:4, color:'var(--text-primary)' }}>{r.horas}</div>
                        <div style={{ fontSize:14, marginTop:2 }}>{r.gps?'📍✅':'📍❌'}</div>
                        {r.excepcion && <div style={{ fontSize:10, color:'var(--warning)', marginTop:4, fontWeight:600 }}>{r.excepcion}</div>}
                      </>
                    ) : <div style={{ fontSize:12, color:'var(--text-muted)', padding:'12px 0' }}>—</div>}
                  </div>
                );
              })}
            </div>
          </SubSection>
        </div>
      ))}
    </div>
  );
}

      )}
    </div>
  );
}

// Sub-componente: vista por doctor dentro de CobrosModule
function CobrosVistaPorDoctor({ onNavigate, cobros }) {
  const [tc] = React.useState(parseFloat(localStorage.getItem('tipoCambioUSDMXN')) || 17.5);
  const [busqueda, setBusqueda] = React.useState('');
  const [doctorExpandido, setDoctorExpandido] = React.useState(null);
  const toMXN = (m, mon) => mon === 'USD' ? m * tc : m;

  const doctores = React.useMemo(() => {
    const map = {};
    cobros.forEach(c => {
      const d = c.doctor || 'Sin doctor';
      if (!map[d]) map[d] = { nombre: d, pendientes: [], cobrados: [], totalPendiente: 0, totalCobrado: 0 };
      const monto = toMXN((c.montoFinal ?? c.monto) || 0, c.moneda);
      if (c.estado === 'cobrado') { map[d].cobrados.push(c); map[d].totalCobrado += monto; }
      else { map[d].pendientes.push(c); map[d].totalPendiente += monto; }
    });
    return Object.values(map)
      .filter(d => !busqueda || d.nombre.toLowerCase().includes(busqueda.toLowerCase()))
      .sort((a, b) => b.totalPendiente - a.totalPendiente);
  }, [cobros, busqueda]);

  const card = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const input = { padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 6, color: '#fff', fontSize: 13, width: '100%', boxSizing: 'border-box' };

  return (
    <div>
      <input type="text" placeholder="🔍 Buscar doctor..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={{ ...input, marginBottom: 12 }} />
      {doctores.length === 0 ? (
        <div style={{ ...card, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>📒</div>
          <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{cobros.length === 0 ? 'Sin cobros aún' : 'Sin doctores que coincidan'}</div>
        </div>
      ) : doctores.map(d => {
        const exp = doctorExpandido === d.nombre;
        return (
          <div key={d.nombre} style={card}>
            <div onClick={() => setDoctorExpandido(exp ? null : d.nombre)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15, fontWeight: 700 }}>{d.nombre}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{d.pendientes.length + d.cobrados.length} notas · {d.pendientes.length} pendiente{d.pendientes.length !== 1 ? 's' : ''}</div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, minmax(80px, 1fr))', gap: 12, textAlign: 'center', flex: '0 1 320px' }}>
                <div><div style={{ fontSize: 10, color: 'var(--warning)' }}>Debe</div><div style={{ fontSize: 14, fontWeight: 700, color: d.totalPendiente > 0 ? 'var(--warning)' : 'var(--text-muted)' }}>${d.totalPendiente.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
                <div><div style={{ fontSize: 10, color: 'var(--success)' }}>Cobrado</div><div style={{ fontSize: 14, fontWeight: 700, color: 'var(--success)' }}>${d.totalCobrado.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
                <div><div style={{ fontSize: 10, color: 'var(--mod-cobros)' }}>Total</div><div style={{ fontSize: 18, fontWeight: 900, color: 'var(--mod-cobros)' }}>${(d.totalPendiente + d.totalCobrado).toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div></div>
              </div>
              <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{exp ? '▾' : '▸'}</div>
            </div>
            {exp && (
              <div style={{ borderTop: '1px solid var(--border-subtle)', marginTop: 14, paddingTop: 14 }}>
                {d.pendientes.map(c => (
                  <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(245,158,11,0.08)', borderRadius: 8, fontSize: 12, marginBottom: 6, borderLeft: '3px solid var(--warning)' }}>
                    <div>
                      <div style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{c.folio} · {c.paciente}</div>
                      <div style={{ color: 'var(--text-muted)' }}>{c.trabajo} · {c.fechaEmision}</div>
                    </div>
                    <div style={{ color: 'var(--warning)', fontWeight: 700 }}>${((c.montoFinal ?? c.monto) || 0).toLocaleString('es-MX')} {c.moneda}</div>
                  </div>
                ))}
                {d.cobrados.slice(0, 5).map(c => (
                  <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(52,211,153,0.08)', borderRadius: 8, fontSize: 12, marginBottom: 6, borderLeft: '3px solid var(--success)' }}>
                    <div>
                      <div style={{ color: 'var(--text-primary)', fontWeight: 600 }}>{c.folio} · {c.paciente}</div>
                      <div style={{ color: 'var(--text-muted)' }}>Cobrado: {c.fechaCobro} ({c.metodo})</div>
                    </div>
                    <div style={{ color: 'var(--success)', fontWeight: 700 }}>${((c.montoFinal ?? c.monto) || 0).toLocaleString('es-MX')} {c.moneda}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function CobrosModule({ onNavigate }) {
  useZeraSync('cobrosRegistro');
  const [vistaPor, setVistaPor] = React.useState('nota'); // 'nota' | 'doctor'
  const [cobros, setCobros] = React.useState(() => {
    return JSON.parse(localStorage.getItem('cobrosRegistro') || '[]');
  });
  const guardarCobros = (nuevos) => {
    setCobros(nuevos);
    localStorage.setItem('cobrosRegistro', JSON.stringify(nuevos));
  };

  const [tipoCambio, setTipoCambio] = React.useState(() => {
    const tc = parseFloat(localStorage.getItem('tipoCambioUSDMXN'));
    return isNaN(tc) || tc <= 0 ? 17.5 : tc;
  });

  // Filtros
  const [filtroEstado, setFiltroEstado] = React.useState('pendiente'); // pendiente | cobrado | todos
  const [filtroDoctor, setFiltroDoctor] = React.useState('todos');
  const [busqueda, setBusqueda] = React.useState('');

  // Modal de cobrar
  const [modal, setModal] = React.useState(null); // { cobro, descuento, metodo, notas }
  const [modalManual, setModalManual] = React.useState(false);
  const [nuevoManual, setNuevoManual] = React.useState({
    folio: '', doctor: '', paciente: '', trabajo: '', monto: 0, moneda: 'MXN', notas: ''
  });

  const recargar = () => {
    setCobros(JSON.parse(localStorage.getItem('cobrosRegistro') || '[]'));
  };

  // ---- Filtros calculados ----
  const cobrosFiltrados = React.useMemo(() => {
    return cobros.filter(c => {
      if (filtroEstado !== 'todos' && c.estado !== filtroEstado) return false;
      if (filtroDoctor !== 'todos' && c.doctor !== filtroDoctor) return false;
      if (busqueda.trim()) {
        const q = busqueda.toLowerCase();
        const m = [c.folio, c.doctor, c.paciente, c.trabajo].some(v => (v || '').toLowerCase().includes(q));
        if (!m) return false;
      }
      return true;
    }).sort((a, b) => new Date(b.fechaEmisionISO || b.fechaEmision) - new Date(a.fechaEmisionISO || a.fechaEmision));
  }, [cobros, filtroEstado, filtroDoctor, busqueda]);

  const doctoresUnicos = React.useMemo(() => {
    return Array.from(new Set(cobros.map(c => c.doctor).filter(Boolean))).sort();
  }, [cobros]);

  // ---- KPIs ----
  const pendientes = cobros.filter(c => c.estado === 'pendiente');
  const cobrados = cobros.filter(c => c.estado === 'cobrado');
  const totalPendiente = pendientes.reduce((s, c) => {
    const m = (c.montoFinal !== undefined ? c.montoFinal : c.monto) || 0;
    return s + (c.moneda === 'USD' ? m * tipoCambio : m);
  }, 0);
  const totalCobrado = cobrados.reduce((s, c) => {
    const m = (c.montoFinal !== undefined ? c.montoFinal : c.monto) || 0;
    return s + (c.moneda === 'USD' ? m * tipoCambio : m);
  }, 0);

  // ---- handlers ----
  const abrirCobro = (cobro) => {
    setModal({
      cobro,
      descuento: cobro.descuento || 0,
      metodo: cobro.metodo || 'efectivo',
      notas: cobro.notas || ''
    });
  };

  const confirmarCobro = () => {
    if (!modal) return;
    const monto = (modal.cobro.montoBase || modal.cobro.monto || 0) - (parseFloat(modal.descuento) || 0);
    if (monto < 0) { alert('El descuento no puede ser mayor al monto base'); return; }
    const actualizada = cobros.map(c => c.id === modal.cobro.id ? {
      ...c,
      descuento: parseFloat(modal.descuento) || 0,
      montoFinal: monto,
      metodo: modal.metodo,
      notas: modal.notas,
      estado: 'cobrado',
      fechaCobro: new Date().toLocaleString('es-MX'),
      fechaCobroISO: new Date().toISOString()
    } : c);
    guardarCobros(actualizada);

    // Marcar la comisión asociada como pagable (queda pendiente de pago en Nómina)
    setModal(null);
  };

  const revertirCobro = (id) => {
    if (!confirm('¿Marcar este cobro como pendiente de nuevo?')) return;
    guardarCobros(cobros.map(c => c.id === id ? { ...c, estado: 'pendiente', fechaCobro: null, fechaCobroISO: null } : c));
  };

  const eliminarCobro = (id) => {
    if (!confirm('¿Eliminar este cobro? Si vino de un trabajo en producción, se regenerará si vuelve a llegar a calidad.')) return;
    guardarCobros(cobros.filter(c => c.id !== id));
  };

  const guardarManual = () => {
    if (!nuevoManual.doctor.trim() || !nuevoManual.paciente.trim() || !nuevoManual.monto) {
      alert('Doctor, paciente y monto son obligatorios');
      return;
    }
    const cobro = {
      id: Date.now(),
      ordenId: null,
      folio: nuevoManual.folio.trim() || `MAN-${Date.now().toString().slice(-4)}`,
      paciente: nuevoManual.paciente.trim(),
      doctor: nuevoManual.doctor.trim(),
      trabajo: nuevoManual.trabajo.trim() || 'Manual',
      unidades: 1,
      montoBase: parseFloat(nuevoManual.monto) || 0,
      descuento: 0,
      montoFinal: parseFloat(nuevoManual.monto) || 0,
      moneda: nuevoManual.moneda,
      estado: 'pendiente',
      fechaEmision: new Date().toLocaleString('es-MX'),
      fechaEmisionISO: new Date().toISOString(),
      fechaVencimiento: new Date(Date.now() + 15 * 24 * 60 * 60 * 1000).toLocaleString('es-MX'),
      metodo: null,
      fechaCobro: null,
      notas: nuevoManual.notas.trim(),
      usuario: 'Manual'
    };
    guardarCobros([cobro, ...cobros]);
    setNuevoManual({ folio: '', doctor: '', paciente: '', trabajo: '', monto: 0, moneda: 'MXN', notas: '' });
    setModalManual(false);
  };

  const actualizarTipoCambio = (v) => {
    const num = parseFloat(v) || 0;
    setTipoCambio(num);
    localStorage.setItem('tipoCambioUSDMXN', String(num));
  };

  // ---- Estilos ----
  const cardStyle = { background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 16, marginBottom: 12 };
  const inputBoxStyle = { width: '100%', padding: '10px 12px', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: '#fff', fontSize: 13, boxSizing: 'border-box' };
  const labelStyle = { display: 'block', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px' };

  return (
    <div style={{ animation: 'fadeIn 0.3s' }}>
      <SectionHeader title="Cobros y Pagos" subtitle="Cobros generados automáticamente cuando un trabajo llega a calidad" color="var(--mod-cobros)" icon="💳">
        {vistaPor === 'nota' && <button onClick={() => setModalManual(true)} style={{ padding: '12px 20px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 14, fontWeight: 700 }}>+ Cobro manual</button>}
        <button onClick={recargar} style={{ padding: '12px 20px', background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 14, fontWeight: 700 }}>🔄 Recargar</button>
      </SectionHeader>

      {/* TOGGLE Vista por nota / por doctor */}
      <div style={{ display: 'flex', gap: 4, background: 'var(--bg-card)', borderRadius: 'var(--radius-md)', padding: 4, marginBottom: 16, width: 'fit-content' }}>
        <button onClick={() => setVistaPor('nota')} style={{ padding: '8px 16px', borderRadius: 'var(--radius-sm)', background: vistaPor === 'nota' ? 'var(--mod-cobros)' : 'transparent', border: 'none', color: vistaPor === 'nota' ? '#fff' : 'var(--text-muted)', cursor: 'pointer', fontSize: 13, fontWeight: vistaPor === 'nota' ? 700 : 500 }}>📋 Por nota</button>
        <button onClick={() => setVistaPor('doctor')} style={{ padding: '8px 16px', borderRadius: 'var(--radius-sm)', background: vistaPor === 'doctor' ? 'var(--mod-cobros)' : 'transparent', border: 'none', color: vistaPor === 'doctor' ? '#fff' : 'var(--text-muted)', cursor: 'pointer', fontSize: 13, fontWeight: vistaPor === 'doctor' ? 700 : 500 }}>👨‍⚕️ Por doctor</button>
      </div>

      {/* Si está en vista por doctor: render NotasModule (agregado por doctor) */}
      {vistaPor === 'doctor' && <CobrosVistaPorDoctor onNavigate={onNavigate} cobros={cobros} />}

      {vistaPor === 'nota' && (
      <>


      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12, marginBottom: 20 }}>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Pendiente de cobro</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--warning)' }}>${totalPendiente.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{pendientes.length} cobro{pendientes.length !== 1 ? 's' : ''}</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Cobrado</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--success)' }}>${totalCobrado.toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{cobrados.length} pagos recibidos</div>
        </div>
        <div style={cardStyle}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Tipo de cambio</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 14, color: 'var(--text-muted)' }}>1 USD =</span>
            <input type="number" step="0.1" value={tipoCambio} onChange={(e) => actualizarTipoCambio(e.target.value)} style={{ ...inputBoxStyle, width: 80, padding: '6px 8px', fontSize: 14, fontWeight: 700 }} />
            <span style={{ fontSize: 14, color: 'var(--text-muted)' }}>MXN</span>
          </div>
        </div>
      </div>

      {/* Filtros */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
        <input type="text" placeholder="🔍 Buscar por folio, doctor, paciente..." value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={{ ...inputBoxStyle, flex: '1 1 240px', minWidth: 200 }} />
        <select value={filtroEstado} onChange={(e) => setFiltroEstado(e.target.value)} style={{ ...inputBoxStyle, width: 150, cursor: 'pointer' }}>
          <option value="pendiente">⏳ Pendientes</option>
          <option value="cobrado">✅ Cobrados</option>
          <option value="todos">📋 Todos</option>
        </select>
        <select value={filtroDoctor} onChange={(e) => setFiltroDoctor(e.target.value)} style={{ ...inputBoxStyle, width: 200, cursor: 'pointer' }}>
          <option value="todos">👨‍⚕️ Todos los doctores</option>
          {doctoresUnicos.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      {/* Lista de cobros */}
      {cobrosFiltrados.length === 0 ? (
        <div style={{ ...cardStyle, textAlign: 'center', padding: 40 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>💳</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 4 }}>
            {cobros.length === 0 ? 'Aún no hay cobros' : 'Sin cobros que coincidan con el filtro'}
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
            {cobros.length === 0 ? 'Los cobros aparecerán automáticamente cuando los trabajos lleguen a la fase ✅ Calidad en Producción.' : 'Cambia el filtro o búsqueda.'}
          </div>
        </div>
      ) : (
        <div style={{ display: 'grid', gap: 10 }}>
          {cobrosFiltrados.map(c => {
            const monto = c.montoFinal !== undefined ? c.montoFinal : c.monto;
            const montoBase = c.montoBase || c.monto;
            const tieneDescuento = c.descuento && c.descuento > 0;
            return (
              <div key={c.id} style={cardStyle}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent-blue)' }}>{c.folio}</span>
                      {c.estado === 'pendiente'
                        ? <span style={{ padding: '2px 8px', background: 'rgba(245,158,11,0.2)', color: 'var(--warning)', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>⏳ Pendiente</span>
                        : <span style={{ padding: '2px 8px', background: 'rgba(52,211,153,0.2)', color: 'var(--success)', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>✅ Cobrado</span>
                      }
                      {!c.ordenId && <span style={{ padding: '2px 8px', background: 'rgba(255,255,255,0.05)', color: 'var(--text-muted)', borderRadius: 12, fontSize: 10 }}>Manual</span>}
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{c.paciente} — {c.trabajo}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{c.doctor} · Emisión: {c.fechaEmision}</div>
                    {c.notas && (
                      <div style={{ marginTop: 6, fontSize: 12, color: 'var(--warning)', background: 'rgba(245,158,11,0.1)', padding: '6px 10px', borderRadius: 6 }}>📝 {c.notas}</div>
                    )}
                    {c.estado === 'cobrado' && (
                      <div style={{ marginTop: 6, fontSize: 11, color: 'var(--success)' }}>Cobrado {c.fechaCobro} con {c.metodo}</div>
                    )}
                  </div>
                  <div style={{ textAlign: 'right', flex: '0 0 auto', minWidth: 160 }}>
                    {tieneDescuento && (
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', textDecoration: 'line-through' }}>${montoBase?.toLocaleString('es-MX')} {c.moneda}</div>
                    )}
                    <div style={{ fontSize: 22, fontWeight: 900, color: c.estado === 'cobrado' ? 'var(--success)' : 'var(--mod-cobros)' }}>
                      ${monto?.toLocaleString('es-MX', { maximumFractionDigits: 2 })} {c.moneda}
                    </div>
                    {tieneDescuento && (
                      <div style={{ fontSize: 11, color: 'var(--warning)', marginTop: 2 }}>Desc: ${c.descuento.toLocaleString('es-MX')}</div>
                    )}
                    {c.moneda === 'USD' && (
                      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>≈ ${(monto * tipoCambio).toLocaleString('es-MX', { maximumFractionDigits: 0 })} MXN</div>
                    )}
                    <div style={{ display: 'flex', gap: 6, marginTop: 10, justifyContent: 'flex-end' }}>
                      {c.estado === 'pendiente' ? (
                        <button onClick={() => abrirCobro(c)} style={{ padding: '8px 14px', background: 'var(--mod-cobros)', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 700 }}>💵 Cobrar</button>
                      ) : (
                        <button onClick={() => revertirCobro(c.id)} style={{ padding: '8px 14px', background: 'rgba(245,158,11,0.15)', color: 'var(--warning)', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>↺ Revertir</button>
                      )}
                      <button onClick={() => eliminarCobro(c.id)} style={{ padding: '8px 10px', background: 'rgba(239,68,68,0.15)', color: '#EF4444', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14 }}>🗑️</button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL — Cobrar */}
      {modal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ background: 'var(--bg-primary)', borderRadius: 'var(--radius-lg)', padding: 24, maxWidth: 520, width: '100%', border: '2px solid var(--mod-cobros)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, color: 'var(--text-primary)', margin: 0 }}>💵 Cobrar {modal.cobro.folio}</h2>
              <button onClick={() => setModal(null)} style={{ background: 'transparent', border: 'none', color: 'var(--text-muted)', fontSize: 20, cursor: 'pointer' }}>✕</button>
            </div>

            <div style={{ background: 'var(--bg-card)', padding: 14, borderRadius: 'var(--radius-md)', marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4 }}><strong>{modal.cobro.paciente}</strong> — {modal.cobro.trabajo}</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{modal.cobro.doctor}</div>
              <div style={{ fontSize: 14, marginTop: 8 }}>Monto base: <strong>${(modal.cobro.montoBase || modal.cobro.monto)?.toLocaleString('es-MX')} {modal.cobro.moneda}</strong></div>
            </div>

            <div style={{ display: 'grid', gap: 12, marginBottom: 16 }}>
              <div>
                <label style={labelStyle}>Descuento aplicado ({modal.cobro.moneda})</label>
                <input type="number" min="0" step="0.5" value={modal.descuento} onChange={(e) => setModal({ ...modal, descuento: e.target.value })} placeholder="0" style={inputBoxStyle} />
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>Total a cobrar: <strong style={{ color: 'var(--success)' }}>${((modal.cobro.montoBase || modal.cobro.monto || 0) - (parseFloat(modal.descuento) || 0)).toLocaleString('es-MX')} {modal.cobro.moneda}</strong></div>
              </div>
              <div>
                <label style={labelStyle}>Método de pago</label>
                <select value={modal.metodo} onChange={(e) => setModal({ ...modal, metodo: e.target.value })} style={inputBoxStyle}>
                  <option value="efectivo">💵 Efectivo</option>
                  <option value="tarjeta">💳 Tarjeta</option>
                  <option value="transferencia">🏦 Transferencia</option>
                  <option value="cheque">📃 Cheque</option>
                </select>
              </div>
              <div>
                <label style={labelStyle}>Notas (opcional)</label>
                <textarea value={modal.notas} onChange={(e) => setModal({ ...modal, notas: e.target.value })} rows={2} style={{ ...inputBoxStyle, resize: 'vertical', fontFamily: 'inherit' }} placeholder="Ej: Pago parcial, ref #123" />
              </div>
            </div>
