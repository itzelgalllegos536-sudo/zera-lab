[build]
  command = "echo 'Static site'"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Las funciones serverless tienen precedencia sobre el redirect SPA
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
